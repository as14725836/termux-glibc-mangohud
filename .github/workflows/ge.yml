name: Wine and Proton ge

on:
  schedule:
    # Proton 构建 - 每月1号和15号
    - cron: '0 0 1,15 * *'
    # Wine 构建 - 每月5号和20号
    - cron: '0 2 5,20 * *'
  workflow_dispatch:
    inputs:
      build_type:
        description: '选择构建类型'
        required: true
        default: 'proton'
        type: choice
        options:
        - proton
        - wine-wow64
      proton_branch:
        description: 'Proton 分支 (仅 Proton 构建)'
        required: false
        default: 'proton_8.0'
        type: choice
        options:
        - proton_11.0
        - proton_8.0
        - experimental_10.0
        - ge-proton11-bionic
        - bleeding-edge
      wine_branch:
        description: 'Wine 分支 (仅 Wine 构建)'
        required: false
        default: 'staging'
        type: choice
        options:
        - vanilla
        - staging
        - staging-tkg
        - staging-tkg-fsync
      wine_version:
        description: 'Wine 版本 (仅 Wine 构建)'
        required: false
        default: 'latest'
        type: string

env:
  USE_CCACHE: true
  BUILD_DIR: /tmp/build_wine
  INSTALL_DIR: /tmp/wine-install-proton

permissions:
  contents: write

jobs:
  build-proton:
    runs-on: ubuntu-24.04
    if: github.event.inputs.build_type == 'proton' || (github.event_name == 'schedule' && github.event.schedule == '0 0 1,15 * *')
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: 安装构建依赖
        run: |
          sudo apt update
          sudo apt --fix-broken install -y
          BASE_DEPS="\
            debootstrap \
            perl \
            git \
            wget \
            xz-utils \
            bubblewrap \
            autoconf \
            flex \
            bison \
            gcc-multilib \
            g++-multilib \
            libx11-dev \
            libxext-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxfixes-dev \
            libxxf86vm-dev \
            libxrender-dev \
            libxinerama-dev \
            libgl-dev \
            libsdl2-dev \
            libglu-dev \
            libosmesa6-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libpcap-dev \
            libdbus-1-dev \
            libssl-dev \
            libasound2-dev \
            libswscale-dev \
            libswresample-dev \
            libpulse-dev \
            libudev-dev \
            libcups2-dev \
            libjpeg-dev \
            libpng-dev \
            libtiff-dev \
            libxml2-dev \
            libvulkan-dev \
            vulkan-tools \
            libvulkan1 \
            mesa-vulkan-drivers \
            mingw-w64 \
            gettext \
            libgettextpo-dev \
            locales \
            language-pack-zh-hans"
          sudo apt install -y $BASE_DEPS
          
      - name: 安装多媒体和音频依赖
        run: |
          sudo apt update
          sudo apt install -y \
            libunwind-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-* \
            libmpg123-dev \
            libopenal-dev

      - name: 设置中文语言环境
        run: |
          sudo locale-gen zh_CN.UTF-8
          sudo update-locale LANG=zh_CN.UTF-8
          export LANG=zh_CN.UTF-8
          export LC_ALL=zh_CN.UTF-8

      - name: 构建 Proton WOW64 版本
        run: |
          set -e
          echo "开始构建 Proton WOW64 版本..."
          echo "分支: ${{ github.event.inputs.proton_branch || 'proton_10.0' }}"
          export LANG=zh_CN.UTF-8
          export LC_ALL=zh_CN.UTF-8
          export LANGUAGE=zh_CN:zh:en_US:en
          
          # 清理并创建构建目录
          rm -rf $BUILD_DIR/proton
          mkdir -p $BUILD_DIR/proton
          cd $BUILD_DIR/proton
          
          # 克隆仓库
          git clone https://github.com/GloriousEggroll/wine-ge-custom.git wine
          cd wine
          
          # 拉取子模块
          git submodule update --init proton-wine
          cd proton-wine
          git checkout 39021e6
          
          # 修复 Termux 路径问题
          echo "修复 Termux 路径问题..."
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) -exec grep -l "/tmp" {} \; | xargs -r sed -i 's|/tmp/|/data/data/com.termux/files/usr/tmp/|g' || true
          find server -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + || true
          find . -name "file.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + || true
          find . -name "loader.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + || true
          find . -name "server.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + || true
          
          # 创建构建目录并配置
          echo "生成 configure 脚本..."
          mkdir -p build-wow64
          cd build-wow64
          
          export CROSSCC="x86_64-w64-mingw32-gcc"
          export CROSSCXX="x86_64-w64-mingw32-g++"
          export CFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CXXFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CROSSCFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CROSSCXXFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          
          ../configure \
            --enable-win64 \
            --enable-archs=i386,x86_64 \
            --prefix=$INSTALL_DIR \
            --with-x \
            --with-vulkan \
            --with-alsa \
            --with-pulse \
            --with-freetype \
            --with-fontconfig \
            --with-gstreamer \
            --with-gettext \
            --with-sdl \
            --enable-nls \
            --disable-winemenubuilder \
            --disable-win16 \
            --disable-tests \
            --without-ldap \
            --without-capi \
            --without-oss \
            --without-cups \
            --without-dbus \
            --without-coreaudio \
            --without-gphoto \
            --without-osmesa \
            --without-sane \
            --without-pcap \
            --without-pcsclite \
            --without-udev \
            --without-unwind \
            --without-usb \
            --without-v4l2 \
            --without-wayland
          
          echo "开始构建支持 Vulkan 和完整 GStreamer 的 WOW64 Proton..."
          make -j$(nproc)
          make install
          
          # 回到 wine 根目录提取版本信息
          cd $BUILD_DIR/proton/wine
          VERSION_PROTON=$(git describe --tags --abbrev=0 2>/dev/null || echo "proton-custom")
          COMMIT_HASH=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          PROTON_VERSION="${VERSION_PROTON}-${COMMIT_HASH}"
          echo "PROTON_VERSION=$PROTON_VERSION" >> $GITHUB_ENV
          echo "BUILD_NAME=proton-${PROTON_VERSION}-wow64" >> $GITHUB_ENV
          
          # 回到工作空间
          cd $GITHUB_WORKSPACE
          
          echo "构建完成，版本: $PROTON_VERSION"

      - name: 验证安装目录
        run: |
          echo "检查安装目录: $INSTALL_DIR"
          if [ ! -d "$INSTALL_DIR" ]; then
            echo "错误: 安装目录不存在!"
            ls -la /tmp/
            exit 1
          fi
          echo "安装目录内容:"
          ls -la $INSTALL_DIR/
          echo "bin 目录内容:"
          ls -la $INSTALL_DIR/bin/ || echo "bin 目录不存在"

      - name: 准备打包
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          echo "准备打包: $PACKAGE_NAME"
          
          # 确保安装目录存在
          if [ ! -d "$INSTALL_DIR" ]; then
            echo "错误: $INSTALL_DIR 不存在"
            exit 1
          fi
          
          mkdir -p wine-package/$PACKAGE_NAME
          cp -r $INSTALL_DIR/* wine-package/$PACKAGE_NAME/
          
          echo "打包目录内容:"
          ls -la wine-package/$PACKAGE_NAME/
          
          # 验证关键文件
          if [ -f "wine-package/$PACKAGE_NAME/bin/wine" ]; then
            echo "✓ wine 二进制文件存在"
          else
            echo "警告: wine 二进制文件未找到"
            ls -la wine-package/$PACKAGE_NAME/bin/ || echo "bin 目录为空"
          fi

      - name: 创建打包文件
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          echo "创建压缩包: $PACKAGE_NAME.tar.xz"
          tar -cJf $PACKAGE_NAME.tar.xz -C wine-package $PACKAGE_NAME
          ls -lh *.tar.xz
          
          # 显示文件信息
          echo "压缩包大小:"
          du -h $PACKAGE_NAME.tar.xz

      - name: Generate checksums
        run: |
          echo "生成校验和..."
          sha256sum *.tar.xz > checksums.txt
          cat checksums.txt

      - name: Upload Proton artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Proton-${{ github.event.inputs.proton_branch || 'proton_10.0' }}-WoW64
          path: |
            ${{ github.workspace }}/*.tar.xz
            ${{ github.workspace }}/checksums.txt
          retention-days: 30

      - name: 发布 Proton 到 GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'proton'
        with:
          tag_name: proton-${{ github.event.inputs.proton_branch || 'proton_10.0' }}-wow64
          name: Proton ${{ github.event.inputs.proton_branch || 'proton_10.0' }} (WOW64 with Vulkan & GStreamer for Termux)
          body: |
            # Proton ${{ github.event.inputs.proton_branch || 'proton_10.0' }} - WOW64 with Vulkan & GStreamer for Termux
            ## 版本信息
            - **Proton 分支**: ${{ github.event.inputs.proton_branch || 'proton_10.0' }}
            - **版本**: ${{ env.PROTON_VERSION }}
            - **架构**: True WOW64 (同时支持 32 位和 64 位 Windows 应用程序)
            - **平台**: Termux (Android)
            - **图形 API**: Vulkan 支持已启用
            - **多媒体**: 完整 GStreamer 支持
            
            ## 特性
            ✓ 真正的 WOW64 架构
            ✓ 同时支持 32 位和 64 位 Windows 应用程序
            ✓ Vulkan 图形 API 支持
            ✓ 完整的 GStreamer 支持
            ✓ 中文环境支持
            ✓ 基于 Valve Proton，专为游戏优化
            
            ## 安装说明
            解压后，将 `${{ env.BUILD_NAME }}` 文件夹放置在 Termux 的合适位置，并设置环境变量。
            
            ## 构建信息
            - 构建时间: ${{ github.event.head_commit.timestamp }}
            - 提交: ${{ github.sha }}
            - 工作流: ${{ github.workflow }}
          files: |
            ${{ github.workspace }}/${{ env.BUILD_NAME }}.tar.xz
            ${{ github.workspace }}/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
