name: Wine 官方 ARM 构建（基于 llvm-mingw，Debian 12 容器）

on:
  schedule:
    - cron: '0 2 5,20 * *'
  workflow_dispatch:
    inputs:
      wine_branch:
        description: 'Wine 分支'
        required: false
        default: 'vanilla'
        type: choice
        options:
        - vanilla
        - staging
        - staging-tkg
        - staging-tkg-fsync
      wine_version:
        description: 'Wine 版本 (例如 9.22，或 latest)'
        required: false
        default: 'latest'
        type: string

env:
  LLVMMINGW_DATE: 20251202
  LLVMMINGW_NAME: llvm-mingw-20251202-ucrt-ubuntu-22.04-x86_64
  WINE64_DIR: /opt/wine64
  WINE_SOURCE_DIR: /opt/wine-src
  DEBIAN_FRONTEND: noninteractive

permissions:
  contents: write

jobs:
  build-wine-wow64:
    runs-on: ubuntu-latest
    container:
      image: debian:12
      options: --user root
    timeout-minutes: 180

    steps:
      - name: 安装基础工具
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates wget git curl gnupg sudo xz-utils g++ file

      - uses: actions/checkout@v4

      # ------------------------------------------------------------
      # 1. 配置 APT 源（支持 amd64 和 arm64）
      # ------------------------------------------------------------
      - name: 配置 APT 源
        run: |
          if [ -f /etc/apt/sources.list ]; then
            cp /etc/apt/sources.list /etc/apt/sources.list.bak
          else
            echo "deb http://deb.debian.org/debian bookworm main contrib non-free" > /etc/apt/sources.list
            echo "deb http://deb.debian.org/debian bookworm-updates main contrib non-free" >> /etc/apt/sources.list
            echo "deb http://security.debian.org/debian-security bookworm-security main contrib non-free" >> /etc/apt/sources.list
          fi
          grep -v '^#' /etc/apt/sources.list | sed 's/^deb /deb [arch=amd64] /g' > /tmp/amd64.list
          sed -e 's/\[arch=amd64\]/[arch=arm64]/g' /tmp/amd64.list > /tmp/arm64.list
          cat /tmp/amd64.list /tmp/arm64.list > /etc/apt/sources.list
          dpkg --add-architecture arm64
          apt-get update
          apt-get install -y --no-install-recommends hello:arm64 || { echo "arm64 源测试失败"; exit 1; }

      # ------------------------------------------------------------
      # 2. 安装所有依赖
      # ------------------------------------------------------------
      - name: 安装构建依赖
        run: |
          apt-get install -y --no-install-recommends \
            binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu \
            ca-certificates nano python3 python3-setuptools clang screen llvm lld wget curl \
            flex bison nasm \
            libfreetype6-dev \
            libglib2.0-dev \
            libltdl-dev \
            libxcb1-dev \
            libx11-dev \
            librsvg2-bin \
            git gettext make automake autoconf pkg-config libtool gtk-doc-tools clang \
            dpkg-dev \
            libglib2.0-dev:arm64 \
            libfreetype6-dev:arm64 \
            libltdl-dev:arm64 \
            libxcb1-dev:arm64 \
            libx11-dev:arm64 \
            build-essential libc-dev-arm64-cross less libc-devtools libidn2-0:arm64 \
            libx11-dev libxinerama-dev libfreetype-dev libfontconfig-dev \
            cmake \
            libstdc++6-arm64-cross \
            libstdc++-12-dev-arm64-cross \
            libepoxy-dev:arm64 \
            libsdl2-dev:arm64 \
            ninja-build \
            dpkg-dev fakeroot debhelper dh-make \
            libxcursor-dev:arm64 \
            libxi-dev:arm64 \
            libxshmfence-dev:arm64 \
            libxxf86vm-dev:arm64 \
            libxrandr-dev:arm64 \
            libxrender-dev:arm64 \
            libxfixes-dev:arm64 \
            libxcomposite-dev:arm64 \
            libdbus-1-dev:arm64 \
            libsane-dev:arm64 \
            libusb-1.0-0-dev:arm64 \
            libv4l-dev:arm64 \
            libpulse-dev:arm64 \
            libgstreamer1.0-dev:arm64 \
            libgstreamer-plugins-base1.0-dev:arm64 \
            libgstreamer-plugins-bad1.0-dev:arm64 \
            libudev-dev:arm64 \
            libunwind-dev:arm64 \
            libfontconfig1-dev:arm64 \
            libkrb5-dev:arm64 \
            libvulkan-dev:arm64 \
            libgl-dev:arm64 \
            libgnutls28-dev:arm64 \
            libcups2-dev:arm64 \
            libxkbcommon-dev:arm64 \
            libxkbregistry-dev:arm64 \
            libwayland-dev:arm64

      # ------------------------------------------------------------
      # 3. 安装 llvm-mingw 交叉编译工具链
      # ------------------------------------------------------------
      - name: 下载并安装 llvm-mingw
        run: |
          mkdir -p /opt
          cd /opt
          wget https://github.com/mstorsjo/llvm-mingw/releases/download/${{ env.LLVMMINGW_DATE }}/${{ env.LLVMMINGW_NAME }}.tar.xz
          tar -xJf ${{ env.LLVMMINGW_NAME }}.tar.xz
          rm ${{ env.LLVMMINGW_NAME }}.tar.xz
          echo "/opt/${{ env.LLVMMINGW_NAME }}/bin" >> $GITHUB_PATH

      # ------------------------------------------------------------
      # 4. 设置中文语言环境
      # ------------------------------------------------------------
      - name: 设置中文语言环境
        run: |
          apt-get install -y locales
          sed -i '/zh_CN.UTF-8/s/^# //g' /etc/locale.gen
          locale-gen
          echo "LANG=zh_CN.UTF-8" >> $GITHUB_ENV
          echo "LC_ALL=zh_CN.UTF-8" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # 5. 获取 Wine 源码
      # ------------------------------------------------------------
      - name: 获取 Wine 源码
        run: |
          set -e
          WINE_BRANCH="${{ github.event.inputs.wine_branch || 'vanilla' }}"
          WINE_VERSION="${{ github.event.inputs.wine_version || 'latest' }}"
          mkdir -p ${{ env.WINE_SOURCE_DIR }}
          cd ${{ env.WINE_SOURCE_DIR }}
          
          case "$WINE_BRANCH" in
            staging-tkg|staging-tkg-fsync)
              echo "处理 TKG 系列分支: $WINE_BRANCH"
              git clone https://github.com/Kron4ek/wine-tkg.git source
              cd source
              if [ "$WINE_BRANCH" = "staging-tkg-fsync" ]; then
                git checkout fsync
              fi
              if [ "$WINE_VERSION" != "latest" ]; then
                git checkout "$WINE_VERSION" 2>/dev/null || git checkout "wine-$WINE_VERSION" 2>/dev/null || echo "使用默认分支"
              fi
              if [ -f "VERSION" ]; then
                WINE_VERSION_ACTUAL="$(cat VERSION | tail -c +14)"
              else
                WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              fi
              ;;
            staging)
              echo "处理 Staging 分支"
              git clone https://github.com/wine-mirror/wine.git source
              cd source
              git config advice.detachedHead false
              if [ "$WINE_VERSION" != "latest" ]; then
                git checkout "wine-$WINE_VERSION"
              fi
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              PURE_VERSION=$(echo "$WINE_VERSION_ACTUAL" | sed 's/^wine-//')
              STAGING_VERSION="v${PURE_VERSION}"
              wget -O "wine-staging-${PURE_VERSION}.tar.gz" "https://github.com/wine-staging/wine-staging/archive/refs/tags/${STAGING_VERSION}.tar.gz" || \
              wget -O "wine-staging-${PURE_VERSION}.tar.gz" "https://github.com/wine-staging/wine-staging/archive/refs/tags/v${PURE_VERSION}.tar.gz"
              if [ -f "wine-staging-${PURE_VERSION}.tar.gz" ]; then
                tar -xzf "wine-staging-${PURE_VERSION}.tar.gz"
                STAGING_DIR=$(find . -maxdepth 1 -type d -name "*staging*" | head -1)
                if [ -n "$STAGING_DIR" ] && [ -d "$STAGING_DIR/staging" ]; then
                  cd "$STAGING_DIR/staging"
                  chmod +x patchinstall.py
                  ./patchinstall.py --all --destdir=../../
                  cd ../..
                else
                  echo "警告: 未找到 staging 补丁目录，跳过补丁应用"
                fi
              else
                echo "警告: 无法下载 staging 补丁，继续构建无补丁版本"
              fi
              ;;
            vanilla)
              echo "处理 Vanilla 分支"
              git clone https://github.com/wine-mirror/wine.git source
              cd source
              git config advice.detachedHead false
              if [ "$WINE_VERSION" != "latest" ]; then
                git checkout "wine-$WINE_VERSION"
              fi
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              ;;
            *)
              echo "未知的 Wine 分支: $WINE_BRANCH"
              exit 1
              ;;
          esac
          
          COMMIT_HASH=$(git rev-parse --short HEAD)
          BUILD_NAME="wine-${WINE_VERSION_ACTUAL}-${COMMIT_HASH}-${WINE_BRANCH}-arm64-wow64"
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "WINE_VERSION_ACTUAL=$WINE_VERSION_ACTUAL" >> $GITHUB_ENV
          echo "源码准备完成，构建名称: $BUILD_NAME"

      # ------------------------------------------------------------
      # 6. 修复 Termux 路径问题
      # ------------------------------------------------------------
      - name: 修复 Termux 路径问题
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) -exec grep -l "/tmp" {} \; 2>/dev/null | xargs sed -i 's|/tmp/|/data/data/com.termux/files/usr/tmp/|g' 2>/dev/null || true
          find server -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "file.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "loader.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "server.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          echo "路径修复完成"

      # ------------------------------------------------------------
      # 7. 生成 configure 脚本
      # ------------------------------------------------------------
      - name: 生成 configure 脚本
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          if [ ! -f "configure" ]; then
            ./autogen.sh
          fi

      # ------------------------------------------------------------
      # 8. 构建 native wine64 工具
      # ------------------------------------------------------------
      - name: 构建 native wine64 工具和 NLS
        run: |
          set -e
          mkdir -p ${{ env.WINE64_DIR }}
          cp -r ${{ env.WINE_SOURCE_DIR }}/source ${{ env.WINE64_DIR }}/source
          cd ${{ env.WINE64_DIR }}
          mkdir -p amd64
          cd amd64
          ../source/configure --enable-win64 --prefix=/usr/local
          make __tooldeps__ -j$(nproc)
          echo "构建 NLS 目录..."
          make -C nls
          
          # 备份整个 nls 目录
          mkdir -p /opt/nls-backup
          cp -aL nls/. /opt/nls-backup/
          echo "nls 目录已完整备份到 /opt/nls-backup"
          
          # 复制构建目录作为工具目录
          mkdir -p /opt/wine64-native
          cp -aL . /opt/wine64-native/
          chmod -R +x /opt/wine64-native/tools/*/
          chmod -R +r /opt/wine64-native/nls

      # ------------------------------------------------------------
      # 9. 分离构建 PE 文件（解决 syswow64 为空的问题）
      # ------------------------------------------------------------
      - name: 构建 64 位 PE 文件
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          export PATH="/opt/${{ env.LLVMMINGW_NAME }}/bin:$PATH"
          
          mkdir -p build-pe-x86_64
          cd build-pe-x86_64
          
          ../configure \
            --prefix=/tmp/wine-pe-install \
            --host=x86_64-w64-mingw32 \
            --with-mingw=clang \
            --enable-win64 \
            --disable-tests \
            --without-x \
            --without-freetype \
            CC=x86_64-w64-mingw32-clang \
            CXX=x86_64-w64-mingw32-clang++ \
            STRIP=x86_64-w64-mingw32-strip \
            CFLAGS="-O2 -g" \
            LDFLAGS="-Wl,--strip-debug"
          
          echo "构建 64 位 DLL 和程序..."
          make -j$(nproc) dlls programs
          
          echo "安装 64 位 PE 文件..."
          make install-lib
          
          # 验证生成的文件
          echo "生成的 64 位 PE 文件："
          find /tmp/wine-pe-install -name "*.dll" -o -name "*.exe" | head -20

      - name: 构建 32 位 PE 文件（关键步骤：生成 syswow64）
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          export PATH="/opt/${{ env.LLVMMINGW_NAME }}/bin:$PATH"
          
          mkdir -p build-pe-i386
          cd build-pe-i386
          
          ../configure \
            --prefix=/tmp/wine-pe-install \
            --host=i686-w64-mingw32 \
            --with-mingw=clang \
            --enable-win32 \
            --disable-tests \
            --without-x \
            --without-freetype \
            CC=i686-w64-mingw32-clang \
            CXX=i686-w64-mingw32-clang++ \
            STRIP=i686-w64-mingw32-strip \
            CFLAGS="-O2 -g" \
            LDFLAGS="-Wl,--strip-debug"
          
          echo "构建 32 位 DLL 和程序（这些会出现在 syswow64 中）..."
          make -j$(nproc) dlls programs
          
          echo "安装 32 位 PE 文件..."
          make install-lib
          
          # 验证 syswow64 目录
          echo "=== 验证 syswow64 目录内容 ==="
          if [ -d /tmp/wine-pe-install/lib/wine/i386-windows ]; then
            echo "32 位 PE 文件目录存在，文件数量:"
            ls -la /tmp/wine-pe-install/lib/wine/i386-windows/ | head -20
            echo "DLL 文件数量: $(find /tmp/wine-pe-install/lib/wine/i386-windows -name "*.dll" | wc -l)"
          else
            echo "警告: i386-windows 目录不存在！"
          fi

      - name: 构建 ARM64EC PE 文件
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          export PATH="/opt/${{ env.LLVMMINGW_NAME }}/bin:$PATH"
          
          mkdir -p build-pe-arm64ec
          cd build-pe-arm64ec
          
          ../configure \
            --prefix=/tmp/wine-pe-install \
            --host=aarch64-w64-mingw32 \
            --with-mingw=clang \
            --enable-win64 \
            --enable-archs=arm64ec \
            --disable-tests \
            --without-x \
            --without-freetype \
            CC=aarch64-w64-mingw32-clang \
            CXX=aarch64-w64-mingw32-clang++ \
            STRIP=aarch64-w64-mingw32-strip \
            CFLAGS="-O2 -g -marm64ec" \
            LDFLAGS="-Wl,--strip-debug"
          
          echo "构建 ARM64EC DLL..."
          make -j$(nproc) dlls
          make install-lib
          
          echo "生成的 ARM64EC PE 文件："
          find /tmp/wine-pe-install/lib/wine -name "*arm64ec*" -o -name "*aarch64*" | head -20

      # ------------------------------------------------------------
      # 10. 交叉编译 ARM64 原生组件
      # ------------------------------------------------------------
      - name: 交叉编译 ARM64 原生组件
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          mkdir -p build-arm64
          cd build-arm64
          
          export PATH="/opt/${{ env.LLVMMINGW_NAME }}/bin:$PATH"
          export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig
          export CFLAGS="-O2 -pipe"
          export CXXFLAGS="-O2 -pipe"
          export LDFLAGS="-L/usr/lib/aarch64-linux-gnu -Wl,--dynamic-linker=/data/data/com.termux/files/usr/glibc/lib/ld-linux-aarch64.so.1 -Wl,-rpath=/data/data/com.termux/files/usr/glibc/lib"
          
          ../configure \
            --prefix=/tmp/wine-install-wow64 \
            --with-mingw=clang \
            --enable-archs=arm64ec,aarch64,i386 \
            --enable-tools \
            --disable-tests \
            --with-vulkan \
            --with-gstreamer \
            --host=aarch64-linux-gnu \
            host_alias=aarch64-linux-gnu \
            build_alias=x86_64-linux-gnu \
            --with-wine-tools=/opt/wine64-native \
            --with-wine64=/tmp/wine-pe-install \
            CC=aarch64-linux-gnu-gcc
          
          make -j$(nproc)
          make install

      # ------------------------------------------------------------
      # 11. 合并 PE 文件到最终安装目录
      # ------------------------------------------------------------
      - name: 合并所有组件到最终安装目录
        run: |
          set -e
          TARGET_DIR="/tmp/wine-install-wow64"
          PE_INSTALL="/tmp/wine-pe-install"
          
          echo "=== 合并 PE 文件到最终安装目录 ==="
          
          # 复制所有 PE 文件
          if [ -d "$PE_INSTALL/lib/wine" ]; then
            mkdir -p "$TARGET_DIR/lib/wine"
            cp -r "$PE_INSTALL/lib/wine/"* "$TARGET_DIR/lib/wine/"
            echo "PE 文件已复制到 $TARGET_DIR/lib/wine/"
          fi
          
          # 确保 syswow64 符号链接正确
          if [ -d "$TARGET_DIR/lib/wine/i386-windows" ]; then
            mkdir -p "$TARGET_DIR/lib/wine/x86_64-windows"
            
            # 创建 syswow64 链接（如果需要）
            if [ ! -d "$TARGET_DIR/lib/wine/x86_64-windows/syswow64" ]; then
              ln -sf ../i386-windows "$TARGET_DIR/lib/wine/x86_64-windows/syswow64"
            fi
            
            echo "=== syswow64 内容验证 ==="
            ls -la "$TARGET_DIR/lib/wine/x86_64-windows/" | grep syswow64
            if [ -L "$TARGET_DIR/lib/wine/x86_64-windows/syswow64" ]; then
              echo "syswow64 符号链接存在，目标: $(readlink $TARGET_DIR/lib/wine/x86_64-windows/syswow64)"
              echo "syswow64 中的文件数量: $(ls -1 $TARGET_DIR/lib/wine/x86_64-windows/syswow64/ 2>/dev/null | wc -l)"
            fi
          fi
          
          # 复制 wine 加载器
          if [ -f "$TARGET_DIR/bin/wine" ]; then
            cp "$TARGET_DIR/bin/wine" "$TARGET_DIR/bin/wine64" 2>/dev/null || true
          fi
          
          echo "=== 最终目录结构 ==="
          echo "lib/wine 目录内容:"
          ls -la "$TARGET_DIR/lib/wine/" | head -30
          
          echo "=== 统计信息 ==="
          echo "64位 DLL 数量: $(find $TARGET_DIR/lib/wine/x86_64-windows -name "*.dll" 2>/dev/null | wc -l)"
          echo "32位 DLL 数量: $(find $TARGET_DIR/lib/wine/i386-windows -name "*.dll" 2>/dev/null | wc -l)"
          echo "ARM64EC DLL 数量: $(find $TARGET_DIR/lib/wine -name "*arm64ec*" 2>/dev/null | wc -l)"

      # ------------------------------------------------------------
      # 12. 补全运行时文件
      # ------------------------------------------------------------
      - name: 补全运行时文件
        run: |
          set -e
          TARGET_PREFIX="/tmp/wine-install-wow64"
          SOURCE_DIR="${{ env.WINE_SOURCE_DIR }}/source"
          NATIVE_NLS_DIR="/opt/wine64-native/nls"
          
          echo "=== 补全 share/wine/nls ==="
          mkdir -p "$TARGET_PREFIX/share/wine/nls"
          if [ -d "$NATIVE_NLS_DIR" ]; then
            cp -v "$NATIVE_NLS_DIR"/*.nls "$TARGET_PREFIX/share/wine/nls/" 2>/dev/null || true
          fi
          if [ -d "/opt/nls-backup" ]; then
            cp -v /opt/nls-backup/*.nls "$TARGET_PREFIX/share/wine/nls/" 2>/dev/null || true
          fi
          
          echo "=== 补全 share/wine/fonts ==="
          if [ -d "$SOURCE_DIR/fonts" ]; then
            mkdir -p "$TARGET_PREFIX/share/wine/fonts"
            cp -v "$SOURCE_DIR/fonts"/*.ttf "$SOURCE_DIR/fonts"/*.fon "$TARGET_PREFIX/share/wine/fonts/" 2>/dev/null || true
          fi
          
          echo "=== 补全 wine.inf ==="
          WINE_INF_SRC="$SOURCE_DIR/loader/wine.inf.in"
          if [ -f "$WINE_INF_SRC" ]; then
            mkdir -p "$TARGET_PREFIX/share/wine"
            cp -v "$WINE_INF_SRC" "$TARGET_PREFIX/share/wine/wine.inf"
          fi
          
          echo "=== 最终验证 ==="
          echo "bin 目录内容:"
          ls -la "$TARGET_PREFIX/bin/" | grep -E "wine|reg"
          echo ""
          echo "syswow64 最终内容（前 20 个文件）:"
          ls -la "$TARGET_PREFIX/lib/wine/i386-windows/" 2>/dev/null | head -20 || echo "警告: i386-windows 目录不存在"
          echo ""
          echo "64位 windows 目录内容（前 20 个文件）:"
          ls -la "$TARGET_PREFIX/lib/wine/x86_64-windows/" 2>/dev/null | head -20 || echo "警告: x86_64-windows 目录不存在"

      # ------------------------------------------------------------
      # 13. 打包
      # ------------------------------------------------------------
      - name: 准备打包
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          mkdir -p wine-package/$PACKAGE_NAME
          cp -r /tmp/wine-install-wow64/* wine-package/$PACKAGE_NAME/
          
          # 创建版本信息文件
          cat > wine-package/$PACKAGE_NAME/BUILD_INFO.txt << EOF
          Wine Build Information
          ======================
          Branch: ${{ github.event.inputs.wine_branch || 'vanilla' }}
          Version: ${{ env.WINE_VERSION_ACTUAL }}
          Build Date: $(date)
          Architecture: ARM64 with WOW64 support
          PE Support: x86_64, i386, ARM64EC
          EOF

      - name: 创建打包文件
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          cd wine-package
          tar -cJf ../$PACKAGE_NAME.tar.xz $PACKAGE_NAME
          cd ..
          ls -lh *.tar.xz

      - name: Generate checksums
        run: |
          sha256sum *.tar.xz > checksums.txt
          cat checksums.txt

      - name: Upload Wine WoW64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Wine-${{ github.event.inputs.wine_branch || 'vanilla' }}-${{ github.event.inputs.wine_version || 'latest' }}-ARM64
          path: |
            *.tar.xz
            checksums.txt
          retention-days: 30

      - name: 发布 Wine 到 GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: wine-${{ github.event.inputs.wine_branch || 'vanilla' }}-${{ github.event.inputs.wine_version || 'latest' }}-arm64
          name: Wine ${{ github.event.inputs.wine_branch || 'vanilla' }} ${{ github.event.inputs.wine_version || 'latest' }} (ARM64 WOW64 for Termux)
          body: |
            # Wine ${{ github.event.inputs.wine_branch || 'vanilla' }} ${{ github.event.inputs.wine_version || 'latest' }} - ARM64 WOW64 for Termux
            
            ## 版本信息
            - **Wine 分支**: ${{ github.event.inputs.wine_branch || 'vanilla' }}
            - **Wine 版本**: ${{ env.WINE_VERSION_ACTUAL }}
            - **主机架构**: ARM64 (aarch64)
            - **目标 Windows 架构**: i386, x86_64, arm64ec (通过 WOW64 模拟)
            - **平台**: Termux (Android)
            - **图形 API**: Vulkan 支持已启用
            - **多媒体**: GStreamer 支持已启用
            - **工具链**: llvm-mingw + 系统 gcc
            
            ## 特性
