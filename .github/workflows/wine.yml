name: Build Wine Staging

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # 每天检查更新
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 手动触发

env:
  PKGNAME: wine-staging

jobs:
  check-version:
    runs-on: ubuntu-22.04
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      current_version: ${{ steps.check.outputs.current_version }}
      need_build: ${{ steps.check.outputs.need_build }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Check latest version
        id: check
        run: |
          # 获取最新版本
          LATEST_VERSION=$(curl -s https://api.github.com/repos/wine-staging/wine-staging/releases/latest | grep tag_name | cut -d '"' -f 4 | sed 's/v//')
          echo "new_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          
          # 获取当前版本（如果有）
          NEED_BUILD="true"
          if [ -f version.txt ]; then
            CURRENT_VERSION=$(cat version.txt)
            echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            if [ "$LATEST_VERSION" = "$CURRENT_VERSION" ]; then
              NEED_BUILD="false"
            fi
          fi
          echo "need_build=$NEED_BUILD" >> $GITHUB_OUTPUT

  build:
    needs: check-version
    if: needs.check-version.outputs.need_build == 'true'
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            git \
            curl \
            wget \
            flex \
            bison \
            python3 \
            python3-pip \
            gettext \
            autoconf \
            automake \
            libtool \
            pkg-config \
            cmake \
            ninja-build \
            mesa-common-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxcomposite-dev \
            libxinerama-dev \
            libxxf86vm-dev \
            libxkbcommon-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            libxcb-shape0-dev \
            libxcb-randr0-dev \
            libxcb-composite0-dev \
            libxcb-keysyms1-dev \
            libxcb-xkb-dev \
            libxcb-xinput-dev \
            libxcb-xv0-dev \
            libxcb-sync-dev \
            libxcb-dri3-dev \
            libxcb-present-dev \
            libxcb-glx0-dev \
            libxcb-dri2-0-dev \
            libxcb1-dev \
            libxv-dev \
            libxtst-dev \
            libxmu-dev \
            libxmuu-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxcomposite-dev \
            libxinerama-dev \
            libxxf86vm-dev \
            libxkbcommon-x11-dev \
            libxrender-dev \
            libxdamage-dev \
            libxss-dev \
            libxt-dev \
            libgl1-mesa-dri \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libwayland-dev \
            wayland-protocols \
            libwayland-egl-backend-dev \
            libdbus-1-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgnutls28-dev \
            libgcrypt20-dev \
            libpulse-dev \
            libasound2-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libmpg123-dev \
            libopenal-dev \
            libsdl2-dev \
            libv4l-dev \
            libpcap-dev \
            libusb-1.0-0-dev \
            libcups2-dev \
            libsane-dev \
            libgphoto2-dev \
            libvulkan-dev \
            libvulkan1 \
            mesa-vulkan-drivers \
            libspa-0.2-dev \
            pipewire \
            libpipewire-0.3-dev \
            libpcsclite-dev \
            libldap2-dev \
            libkrb5-dev \
            libosmesa6-dev \
            ocl-icd-opencl-dev \
            opencl-headers \
            libunwind-dev \
            valgrind \
            llvm-dev \
            clang \
            lld \
            mingw-w64 \
            mingw-w64-tools \
            g++-mingw-w64 \
            gcc-mingw-w64 \
            upx-ucl \
            binfmt-support \
            desktop-file-utils \
            libcap-dev \
            libffi-dev \
            libssl-dev \
            libxml2-dev \
            libxslt1-dev \
            libjpeg-dev \
            libpng-dev \
            libtiff-dev \
            libncurses-dev \
            libvkd3d-dev \
            libfaudio-dev \
            liblcms2-dev \
            libcapi20-dev \
            libodbc1 \
            unixodbc-dev
      
      - name: Install MinGW for ARM64
        run: |
          # 下载并安装ARM64 MinGW工具链
          wget https://github.com/mstorsjo/llvm-mingw/releases/download/20250114/llvm-mingw-20250114-ucrt-ubuntu-20.04-x86_64.tar.xz
          tar -xf llvm-mingw-20250114-ucrt-ubuntu-20.04-x86_64.tar.xz
          sudo mv llvm-mingw-20250114-ucrt-ubuntu-20.04-x86_64 /opt/llvm-mingw
          echo "/opt/llvm-mingw/bin" >> $GITHUB_PATH
      
      - name: Setup build environment
        run: |
          # 创建构建目录
          mkdir -p $HOME/wine-build
          mkdir -p $HOME/wine-source
          
          # 设置环境变量
          echo "CROSSCFLAGS=-O2 -pipe" >> $GITHUB_ENV
          echo "CROSSCXXFLAGS=-O2 -pipe" >> $GITHUB_ENV
          echo "CROSSLDFLAGS=-Wl,-O1" >> $GITHUB_ENV
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV
      
      - name: Download Wine source
        run: |
          cd $HOME/wine-source
          git clone https://gitlab.winehq.org/wine/wine.git
          git clone https://gitlab.winehq.org/wine/wine-staging.git
          
          # 切换到指定版本
          cd wine
          git checkout wine-${{ needs.check-version.outputs.new_version }}
          cd ../wine-staging
          git checkout v${{ needs.check-version.outputs.new_version }}
      
      - name: Apply Wine-Staging patches
        run: |
          cd $HOME/wine-source/wine
          python3 ../wine-staging/staging/patchinstall.py --backend=git-apply --all
      
      - name: Configure Wine
        run: |
          cd $HOME/wine-build
          $HOME/wine-source/wine/configure \
            --prefix=/usr \
            --libdir=/usr/lib \
            --with-dbus \
            --with-x \
            --enable-win64 \
            --enable-archs=arm64ec,aarch64,i386 \
            --with-mingw=clang \
            --with-xattr \
            --with-wayland \
            --disable-tests
      
      - name: Build Wine
        run: |
          cd $HOME/wine-build
          make -j$(nproc)
      
      - name: Install to temporary directory
        run: |
          cd $HOME/wine-build
          make install DESTDIR=$HOME/wine-install
      
      - name: Create package structure
        run: |
          # 创建类似Arch Linux的包结构
          mkdir -p $HOME/package/usr/{bin,lib,share}
          
          # 复制文件
          cp -r $HOME/wine-install/usr/* $HOME/package/usr/
          
          # 创建fontconfig配置
          mkdir -p $HOME/package/usr/share/fontconfig/conf.avail
          mkdir -p $HOME/package/usr/share/fontconfig/conf.default
          
          # 创建30-win32-aliases.conf
          cat > $HOME/package/usr/share/fontconfig/conf.avail/30-win32-aliases.conf << 'EOF'
          <?xml version="1.0"?>
          <!DOCTYPE fontconfig SYSTEM "fonts.dtd">
          <fontconfig>
            <alias>
              <family>Times New Roman</family>
              <prefer>
                <family>Liberation Serif</family>
                <family>Nimbus Roman No9 L</family>
              </prefer>
            </alias>
            <alias>
              <family>Arial</family>
              <prefer>
                <family>Liberation Sans</family>
                <family>Nimbus Sans L</family>
              </prefer>
            </alias>
            <alias>
              <family>Courier New</family>
              <prefer>
                <family>Liberation Mono</family>
                <family>Nimbus Mono L</family>
              </prefer>
            </alias>
          </fontconfig>
          EOF
          
          ln -s ../conf.avail/30-win32-aliases.conf $HOME/package/usr/share/fontconfig/conf.default/
          
          # 创建binfmt配置
          mkdir -p $HOME/package/usr/lib/binfmt.d
          cat > $HOME/package/usr/lib/binfmt.d/wine.conf << 'EOF'
          # Wine binfmt support for Windows executables
          :DOSWin:M::MZ::/usr/bin/wine:
          EOF
      
      - name: Strip DLLs
        run: |
          # 使用MinGW工具strip DLL文件
          if [ -d "$HOME/package/usr/lib/wine/i386-windows" ]; then
            i686-w64-mingw32-strip --strip-unneeded $HOME/package/usr/lib/wine/i386-windows/*.dll || true
          fi
          
          if [ -d "$HOME/package/usr/lib/wine/x86_64-windows" ]; then
            x86_64-w64-mingw32-strip --strip-unneeded $HOME/package/usr/lib/wine/x86_64-windows/*.dll || true
          fi
          
          if [ -d "$HOME/package/usr/lib/wine/aarch64-windows" ]; then
            /opt/llvm-mingw/bin/aarch64-w64-mingw32-strip --strip-unneeded $HOME/package/usr/lib/wine/aarch64-windows/*.dll || true
          fi
      
      - name: Create tarball
        run: |
          cd $HOME
          tar -czf wine-staging-${{ needs.check-version.outputs.new_version }}-ubuntu22.04.tar.gz -C package .
      
      - name: Save version info
        run: |
          echo "${{ needs.check-version.outputs.new_version }}" > version.txt
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wine-staging-${{ needs.check-version.outputs.new_version }}
          path: |
            $HOME/wine-staging-${{ needs.check-version.outputs.new_version }}-ubuntu22.04.tar.gz
            version.txt
      
      - name: Create Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.check-version.outputs.new_version }}
          name: Wine Staging ${{ needs.check-version.outputs.new_version }}
          body: |
            Automated build of Wine Staging ${{ needs.check-version.outputs.new_version }} for Ubuntu 22.04
            
            ## 安装说明
            ```bash
            # 解压到根目录
            sudo tar -xzf wine-staging-${{ needs.check-version.outputs.new_version }}-ubuntu22.04.tar.gz -C /
            
            # 配置 binfmt (可选)
            sudo systemctl restart systemd-binfmt
            ```
            
            ## 包含的组件
            - Wine Staging ${{ needs.check-version.outputs.new_version }}
            - ARM64EC, AArch64, i386 支持
            - Wayland 支持
            - Fontconfig 配置
            - binfmt 支持
            
            ## 系统要求
            - Ubuntu 22.04 或兼容系统
            - 已安装必要的运行时库 (可通过 `apt install wine-development` 安装依赖)
          files: |
            $HOME/wine-staging-${{ needs.check-version.outputs.new_version }}-ubuntu22.04.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
