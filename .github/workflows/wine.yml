name: glibc-Wine ARM64 WOW64 构建（基于 llvm-mingw，Debian 12 容器）

on:
  schedule:
    - cron: '0 2 5,20 * *'
  workflow_dispatch:
    inputs:
      wine_branch:
        description: 'Wine 分支'
        required: false
        default: 'staging'
        type: choice
        options:
        - vanilla
        - staging
        - staging-tkg
        - staging-tkg-fsync
      wine_version:
        description: 'Wine 版本 (例如 9.22，或 latest)'
        required: false
        default: 'latest'
        type: string

env:
  LLVMMINGW_DATE: 20251202
  LLVMMINGW_NAME: llvm-mingw-20251202-ucrt-ubuntu-22.04-x86_64
  WINE64_DIR: /opt/wine64
  WINE_SOURCE_DIR: /opt/wine-src
  DEBIAN_FRONTEND: noninteractive

permissions:
  contents: write

jobs:
  build-wine-wow64:
    runs-on: ubuntu-latest
    container:
      image: debian:12
      options: --user root
    timeout-minutes: 300

    steps:
      - name: 安装基础工具
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates wget git curl gnupg sudo xz-utils g++ file
      - uses: actions/checkout@v4

      # ------------------------------------------------------------
      # 1. 配置 APT 源（支持 amd64 和 arm64）
      # ------------------------------------------------------------
      - name: 配置 APT 源
        run: |
          sed -i 's/# deb-src/deb-src/' /etc/apt/sources.list || true
          sed -i 's/Types: deb/Types: deb deb-src/' /etc/apt/sources.list.d/*.sources 2>/dev/null || true
          apt update
          dpkg --add-architecture arm64
          apt update
          apt install -y --no-install-recommends libc6:arm64

      # ------------------------------------------------------------
      # 2. 安装所有依赖
      # ------------------------------------------------------------
      - name: 安装构建依赖
        run: |
          apt-get install -y --no-install-recommends \
            binutils-aarch64-linux-gnu \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            ca-certificates nano python3 python3-setuptools clang screen llvm lld wget curl \
            flex bison nasm \
            libfreetype6-dev \
            libglib2.0-dev \
            libltdl-dev \
            libxcb1-dev \
            libx11-dev \
            librsvg2-bin \
            git gettext make automake autoconf pkg-config libtool gtk-doc-tools \
            dpkg-dev \
            libglib2.0-dev:arm64 \
            libfreetype6-dev:arm64 \
            libltdl-dev:arm64 \
            libxcb1-dev:arm64 \
            libssl-dev:arm64 \
            libx11-dev:arm64 \
            build-essential libc-dev-arm64-cross less libc-devtools libidn2-0:arm64 \
            libx11-dev libxinerama-dev libfreetype-dev libfontconfig-dev \
            cmake \
            libstdc++6-arm64-cross \
            libstdc++-12-dev-arm64-cross \
            libepoxy-dev:arm64 \
            libsdl2-dev:arm64 \
            ninja-build \
            dpkg-dev fakeroot debhelper dh-make \
            libxcursor-dev:arm64 \
            libxi-dev:arm64 \
            libxshmfence-dev:arm64 \
            libxxf86vm-dev:arm64 \
            libxrandr-dev:arm64 \
            libxrender-dev:arm64 \
            libxfixes-dev:arm64 \
            libxcomposite-dev:arm64 \
            libdbus-1-dev:arm64 \
            libsane-dev:arm64 \
            libusb-1.0-0-dev:arm64 \
            libv4l-dev:arm64 \
            libpulse-dev:arm64 \
            libgstreamer1.0-dev:arm64 \
            libgstreamer-plugins-base1.0-dev:arm64 \
            libgstreamer-plugins-bad1.0-dev:arm64 \
            gstreamer1.0-tools \
            libudev-dev:arm64 \
            libunwind-dev:arm64 \
            libfontconfig1-dev:arm64 \
            libkrb5-dev:arm64 \
            libvulkan-dev:arm64 \
            libgl-dev:arm64 \
            libgnutls28-dev:arm64 \
            libcups2-dev:arm64 \
            libxkbcommon-dev:arm64 \
            libxkbregistry-dev:arm64 \
            libwayland-dev:arm64 \
            meson ninja-build \
            python3-pip bison flex gettext libtool \
            liborc-0.4-dev:arm64 \
            libavcodec-dev:arm64 \
            libavformat-dev:arm64 \
            libavutil-dev:arm64 \
            libswresample-dev:arm64

          apt build-dep wine -y || true

      # ------------------------------------------------------------
      # 3. 安装 llvm-mingw 交叉编译工具链
      # ------------------------------------------------------------
      - name: 下载并安装 llvm-mingw
        run: |
          mkdir -p /opt
          cd /opt
          wget https://github.com/mstorsjo/llvm-mingw/releases/download/${{ env.LLVMMINGW_DATE }}/${{ env.LLVMMINGW_NAME }}.tar.xz
          tar -xJf ${{ env.LLVMMINGW_NAME }}.tar.xz
          rm ${{ env.LLVMMINGW_NAME }}.tar.xz
          echo "/opt/${{ env.LLVMMINGW_NAME }}/bin" >> $GITHUB_PATH

      # ------------------------------------------------------------
      # 3.5 编译 ARM64 GStreamer 解码器（不指定版本，使用主分支）
      # ------------------------------------------------------------
      - name: 编译 ARM64 GStreamer 解码器
        run: |
          apt-get install -y python3-pip python3-setuptools
          pip3 install --upgrade meson --break-system-packages
          set -e
          
          echo "=== 开始编译 ARM64 GStreamer 解码器 ==="
          
          # 设置交叉编译环境变量
          export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig
          export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
          export CC=aarch64-linux-gnu-gcc
          export CXX=aarch64-linux-gnu-g++
          export AR=aarch64-linux-gnu-ar
          export STRIP=aarch64-linux-gnu-strip
          
          # 设置安装前缀
          GST_PREFIX=/opt/gstreamer-arm64/install
          mkdir -p $GST_PREFIX
          
          # 创建固定的交叉编译文件（绝对路径）
          CROSS_FILE="/opt/gstreamer-arm64/cross_file_arm64.txt"
          cat > $CROSS_FILE << 'EOF'
          [binaries]
          c = 'aarch64-linux-gnu-gcc'
          cpp = 'aarch64-linux-gnu-g++'
          ar = 'aarch64-linux-gnu-ar'
          strip = 'aarch64-linux-gnu-strip'
          pkgconfig = 'pkg-config'

          [host_machine]
          system = 'linux'
          cpu_family = 'aarch64'
          cpu = 'armv8-a'
          endian = 'little'

          [properties]
          pkg_config_libdir = '/usr/lib/aarch64-linux-gnu/pkgconfig'
          root_libdir = '/usr/lib/aarch64-linux-gnu'
          EOF
          
          cd /opt/gstreamer-arm64
          
          # ==================== 1. GStreamer 核心库 ====================
          echo "=== 1/7 编译 GStreamer 核心库 ==="
          git clone --depth 1 https://gitlab.freedesktop.org/gstreamer/gstreamer.git
          cd gstreamer
          
          meson setup build \
            --prefix=$GST_PREFIX \
            --libdir=lib/aarch64-linux-gnu \
            -Dintrospection=disabled \
            -Dtests=disabled \
            -Dexamples=disabled \
            -Dgtk_doc=disabled \
            --buildtype=release \
            --cross-file=$CROSS_FILE
          
          meson compile -C build -j$(nproc)
          meson install -C build
          cd ..
          
          # ==================== 2. Base 插件 ====================
          echo "=== 2/7 编译 GStreamer Base 插件 ==="
          git clone --depth 1 https://gitlab.freedesktop.org/gstreamer/gst-plugins-base.git
          cd gst-plugins-base
          meson setup build \
            --prefix=$GST_PREFIX \
            --libdir=lib/aarch64-linux-gnu \
            -Dintrospection=disabled \
            -Dtests=disabled \
            -Dexamples=disabled \
            -Dpango=disabled \
            -Dgl=disabled \
            -Dopus=disabled \
            -Dogg=disabled \
            -Dvorbis=disabled \
            --buildtype=release \
            --cross-file=$CROSS_FILE
          meson compile -C build -j$(nproc)
          meson install -C build
          cd ..
          
          # ==================== 4. Bad 插件 ====================
          echo "=== 4/7 编译 GStreamer Bad 插件 ==="
          git clone --depth 1 https://gitlab.freedesktop.org/gstreamer/gst-plugins-bad.git
          cd gst-plugins-bad
          meson setup build \
            --prefix=$GST_PREFIX \
            --libdir=lib/aarch64-linux-gnu \
            -Dintrospection=disabled \
            -Dtests=disabled \
            -Dexamples=disabled \
            -Daes=disabled \
            -Dd3d11=disabled \
            -Dvulkan=disabled \
            -Dmsdk=disabled \
            -Dnvcodec=disabled \
            -Dva=disabled \
            --buildtype=release \
            --cross-file=$CROSS_FILE
          meson compile -C build -j$(nproc) || echo "警告: Bad 插件部分编译失败，继续..."
          meson install -C build || echo "警告: Bad 插件安装失败，继续..."
          cd ..
          
          # ==================== 5. Ugly 插件 ====================
          echo "=== 5/7 编译 GStreamer Ugly 插件 ==="
          git clone --depth 1 https://gitlab.freedesktop.org/gstreamer/gst-plugins-ugly.git
          cd gst-plugins-ugly
          meson setup build \
            --prefix=$GST_PREFIX \
            --libdir=lib/aarch64-linux-gnu \
            -Dintrospection=disabled \
            -Dtests=disabled \
            --buildtype=release \
            --cross-file=$CROSS_FILE
          meson compile -C build -j$(nproc)
          meson install -C build
          cd ..
          
          # ==================== 6. libav 插件（FFmpeg） ====================
          echo "=== 6/7 编译 GStreamer libav 插件 ==="
          git clone --depth 1 https://gitlab.freedesktop.org/gstreamer/gst-libav.git
          cd gst-libav
          meson setup build \
            --prefix=$GST_PREFIX \
            --libdir=lib/aarch64-linux-gnu \
            -Dintrospection=disabled \
            -Dtests=disabled \
            --buildtype=release \
            --cross-file=$CROSS_FILE
          meson compile -C build -j$(nproc)
          meson install -C build
          cd ..
          
          # ==================== 7. RTSP Server ====================
          echo "=== 7/7 编译 GStreamer RTSP Server ==="
          git clone --depth 1 https://gitlab.freedesktop.org/gstreamer/gst-rtsp-server.git
          cd gst-rtsp-server
          meson setup build \
            --prefix=$GST_PREFIX \
            --libdir=lib/aarch64-linux-gnu \
            -Dintrospection=disabled \
            -Dtests=disabled \
            --buildtype=release \
            --cross-file=$CROSS_FILE
          meson compile -C build -j$(nproc)
          meson install -C build
          cd ..
          
          # 设置环境变量供后续步骤使用
          echo "GST_PREFIX=$GST_PREFIX" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$GST_PREFIX/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$GST_PREFIX/lib/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "GST_PLUGIN_PATH=$GST_PREFIX/lib/aarch64-linux-gnu/gstreamer-1.0" >> $GITHUB_ENV
          
          # 验证编译结果
          echo "=== 验证 GStreamer 编译结果 ==="
          echo "安装的文件总数: $(find $GST_PREFIX -type f | wc -l)"
          echo "共享库文件:"
          find $GST_PREFIX -name "*.so" | head -20
          echo "GStreamer 插件:"
          ls -la $GST_PREFIX/lib/aarch64-linux-gnu/gstreamer-1.0/ 2>/dev/null | head -20
          
          # 创建环境设置脚本
          cat > $GST_PREFIX/gst-env.sh << 'EOF'
          # GStreamer 环境变量
          export GST_PREFIX=/opt/gstreamer-arm64/install
          export PKG_CONFIG_PATH=$GST_PREFIX/lib/aarch64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH
          export LD_LIBRARY_PATH=$GST_PREFIX/lib/aarch64-linux-gnu:$LD_LIBRARY_PATH
          export GST_PLUGIN_PATH=$GST_PREFIX/lib/aarch64-linux-gnu/gstreamer-1.0
          export PATH=$GST_PREFIX/bin:$PATH
          EOF
          
          echo "GStreamer 编译完成！"
          echo "安装位置: $GST_PREFIX"

      # ------------------------------------------------------------
      # 4. 设置中文语言环境
      # ------------------------------------------------------------
      - name: 设置中文语言环境
        run: |
          apt-get install -y locales
          sed -i '/zh_CN.UTF-8/s/^# //g' /etc/locale.gen
          locale-gen
          echo "LANG=zh_CN.UTF-8" >> $GITHUB_ENV
          echo "LC_ALL=zh_CN.UTF-8" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # 5. 获取 Wine 源码
      # ------------------------------------------------------------
      - name: 获取 Wine 源码
        run: |
          set -e
          WINE_BRANCH="${{ github.event.inputs.wine_branch || 'staging' }}"
          WINE_VERSION="${{ github.event.inputs.wine_version || 'latest' }}"
          mkdir -p ${{ env.WINE_SOURCE_DIR }}
          cd ${{ env.WINE_SOURCE_DIR }}
          case "$WINE_BRANCH" in
            staging-tkg|staging-tkg-fsync)
              echo "处理 TKG 系列分支: $WINE_BRANCH"
              git clone https://github.com/Kron4ek/wine-tkg.git source
              cd source
              if [ "$WINE_BRANCH" = "staging-tkg-fsync" ]; then
                git checkout fsync
              fi
              if [ "$WINE_VERSION" != "latest" ]; then
                git checkout "$WINE_VERSION" 2>/dev/null || echo "使用默认分支"
              fi
              if [ -f "VERSION" ]; then
                WINE_VERSION_ACTUAL="$(cat VERSION | tail -c +14)"
              else
                WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              fi
              ;;
            staging)
              echo "处理 Staging 分支"
              git clone https://github.com/afeimod/wine-arm.git source
              cd source
              git config advice.detachedHead false
              if [ "$WINE_VERSION" != "latest" ]; then
                git checkout "$WINE_VERSION"
              fi
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              PURE_VERSION=$(echo "$WINE_VERSION_ACTUAL" | sed 's/^wine-//')
              STAGING_VERSION="v${PURE_VERSION}"
              wget -O "wine-staging-${PURE_VERSION}.tar.gz" "https://github.com/wine-staging/wine-staging/archive/refs/tags/${STAGING_VERSION}.tar.gz" || \
              wget -O "wine-staging-${PURE_VERSION}.tar.gz" "https://github.com/wine-staging/wine-staging/archive/refs/tags/v${PURE_VERSION}.tar.gz" || true
              if [ -f "wine-staging-${PURE_VERSION}.tar.gz" ]; then
                tar -xzf "wine-staging-${PURE_VERSION}.tar.gz"
                STAGING_DIR=$(find . -maxdepth 1 -type d -name "*staging*" | head -1)
                if [ -n "$STAGING_DIR" ] && [ -d "$STAGING_DIR/staging" ]; then
                  cd "$STAGING_DIR/staging"
                  chmod +x patchinstall.py
                  ./patchinstall.py --all --destdir=../../
                  cd ../..
                else
                  echo "警告: 未找到 staging 补丁目录，跳过补丁应用"
                fi
              else
                echo "警告: 无法下载 staging 补丁，继续构建无补丁版本"
              fi
              ;;
            vanilla)
              echo "处理 Vanilla 分支"
              git clone https://github.com/ValveSoftware/wine.git source
              cd source
              git config advice.detachedHead false
              if [ "$WINE_VERSION" != "latest" ]; then
                git checkout "$WINE_VERSION"
              fi
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              ;;
            *)
              echo "未知的 Wine 分支: $WINE_BRANCH"
              exit 1
              ;;
          esac
          COMMIT_HASH=$(git rev-parse --short HEAD)
          BUILD_NAME="wine-${WINE_VERSION_ACTUAL}-${COMMIT_HASH}-${WINE_BRANCH}-arm64-wow64"
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "WINE_VERSION_ACTUAL=$WINE_VERSION_ACTUAL" >> $GITHUB_ENV
          echo "源码准备完成，构建名称: $BUILD_NAME"

      # ------------------------------------------------------------
      # 6. 修复 Termux 路径问题
      # ------------------------------------------------------------
      - name: 修复 Termux 路径问题
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) -exec grep -l "/tmp" {} \; 2>/dev/null | xargs sed -i 's|/tmp/|/data/data/com.termux/files/usr/tmp/|g' 2>/dev/null || true
          find server -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "file.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "loader.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          find . -name "server.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} + 2>/dev/null || true
          echo "路径修复完成"

      # ------------------------------------------------------------
      # 7. 应用 mfplat 补丁
      # ------------------------------------------------------------
      - name: 应用 mfplat 补丁
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          PURE_VERSION=$(echo "${{ env.WINE_VERSION_ACTUAL }}" | sed 's/^wine-//')
          VERSION_MAJOR=$(echo "$PURE_VERSION" | cut -d. -f1)
          VERSION_MINOR=$(echo "$PURE_VERSION" | cut -d. -f2)
          if [ "$VERSION_MAJOR" -gt 9 ] || [ "$VERSION_MAJOR" -eq 9 -a "$VERSION_MINOR" -ge 10 ]; then
            echo "应用 9.10+ 补丁 (wine_do_not_create_dxgi_manager2.patch)"
            wget -q https://github.com/afeimod/linbox/raw/main/path/wine_do_not_create_dxgi_manager2.patch
            if [ -f "dlls/mfplat/main.c" ]; then
              patch -p1 < wine_do_not_create_dxgi_manager2.patch || { echo "补丁应用失败"; exit 1; }
            else
              echo "错误: dlls/mfplat/main.c 不存在"
              exit 1
            fi
          else
            echo "应用 9.10 以下补丁 (fix_wine9.2_mfplat.sh)"
            wget -q -O fix_wine9.2_mfplat.sh https://github.com/afeimod/linbox/raw/main/path/fix_wine9.2_mfplat.sh
            chmod +x fix_wine9.2_mfplat.sh
            ./fix_wine9.2_mfplat.sh
          fi

      # ------------------------------------------------------------
      # 8. 生成 configure 脚本
      # ------------------------------------------------------------
      - name: 生成 configure 脚本
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          if [ ! -f "configure" ]; then
            ./autogen.sh
          fi

      # ------------------------------------------------------------
      # 9. 构建 native wine64
      # ------------------------------------------------------------
      - name: 构建 native wine64 工具和 NLS
        run: |
          set -e
          mkdir -p ${{ env.WINE64_DIR }}
          cp -r ${{ env.WINE_SOURCE_DIR }}/source ${{ env.WINE64_DIR }}/source
          cd ${{ env.WINE64_DIR }}
          mkdir -p amd64
          cd amd64
          ../source/configure --enable-win64 --prefix=/usr/local
          make __tooldeps__ -j$(nproc)
          echo "构建 NLS 目录..."
          make -C nls
          mkdir -p /opt/nls-backup
          cp -aL nls/. /opt/nls-backup/
          echo "nls 目录已完整备份到 /opt/nls-backup"

      # ------------------------------------------------------------
      # 10. 复制构建目录
      # ------------------------------------------------------------
      - name: 复制构建目录并验证 NLS
        run: |
          set -e
          mkdir -p /opt/wine64-native
          if [ ! -f ${{ env.WINE64_DIR }}/amd64/nls/locale.nls ] && [ ! -L ${{ env.WINE64_DIR }}/amd64/nls/locale.nls ]; then
            echo "警告: 源目录中 nls/locale.nls 不存在，尝试从备份恢复"
            if [ -d /opt/nls-backup ]; then
              mkdir -p ${{ env.WINE64_DIR }}/amd64/nls
              cp -af /opt/nls-backup/. ${{ env.WINE64_DIR }}/amd64/nls/
              echo "已从备份恢复完整 nls 目录"
            else
              echo "错误: 无法恢复 nls 目录"
              exit 1
            fi
          fi
          cp -aL ${{ env.WINE64_DIR }}/amd64/. /opt/wine64-native/
          chmod -R +x /opt/wine64-native/tools/*/
          chmod -R +r /opt/wine64-native/nls
          if [ ! -f /opt/wine64-native/nls/locale.nls ]; then
            echo "警告: 复制后 locale.nls 丢失，尝试从备份恢复"
            if [ -d /opt/nls-backup ]; then
              mkdir -p /opt/wine64-native/nls
              cp -af /opt/nls-backup/. /opt/wine64-native/nls/
              echo "已从备份恢复 nls 目录到目标目录"
            fi
          fi
          echo "复制后 locale.nls 存在，大小: $(wc -c < /opt/wine64-native/nls/locale.nls) 字节"

      # ------------------------------------------------------------
      # 11. 交叉编译 ARM64 WOW64
      # ------------------------------------------------------------
      - name: 交叉编译 ARM64 WOW64
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          mkdir -p build-arm64
          cd build-arm64
          export PATH="/opt/${{ env.LLVMMINGW_NAME }}/bin:$PATH"
          
          # 设置 pkg-config 路径（优先使用编译的 GStreamer）
          export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig
          if [ -n "$GST_PREFIX" ] && [ -d "$GST_PREFIX/lib/aarch64-linux-gnu/pkgconfig" ]; then
            export PKG_CONFIG_PATH=$GST_PREFIX/lib/aarch64-linux-gnu/pkgconfig
            export GST_PLUGIN_PATH=$GST_PREFIX/lib/aarch64-linux-gnu/gstreamer-1.0
            echo "使用编译的 GStreamer: $GST_PREFIX"
          fi
          
          # 验证 GStreamer
          echo "=== 验证 GStreamer 开发包 ==="
          export PKG_CONFIG_PATH=${PKG_CONFIG_PATH:-}
          pkg-config --exists gstreamer-1.0 && echo "gstreamer-1.0 found" || echo "gstreamer-1.0 not found"
          pkg-config --exists gstreamer-base-1.0 && echo "gstreamer-base-1.0 found" || echo "gstreamer-base-1.0 not found"
          
          export CFLAGS="-O2 -pipe"
          export CXXFLAGS="-O2 -pipe"
          export LDFLAGS="-L/usr/lib/aarch64-linux-gnu -Wl,--dynamic-linker=/data/data/com.termux/files/usr/glibc/lib/ld-linux-aarch64.so.1 -Wl,-rpath=/data/data/com.termux/files/usr/glibc/lib"
          export WINE_NLS_DIR=/opt/wine64-native/nls
          
          ../configure \
            --prefix=/tmp/wine-install-wow64 \
            --with-mingw=clang \
            --enable-archs=arm64ec,aarch64,i386 \
            --enable-tools \
            --disable-tests \
            --with-vulkan \
            --with-gstreamer \
            --host=aarch64-linux-gnu \
            host_alias=aarch64-linux-gnu \
            build_alias=x86_64-linux-gnu \
            --with-wine64=${{ env.WINE64_DIR }}/amd64 \
            --with-wine-tools=/opt/wine64-native \
            CC=aarch64-linux-gnu-gcc
          
          make -j$(nproc)
          make install
          
          if [ ! -d /tmp/wine-install-wow64/bin ]; then
            echo "错误: /tmp/wine-install-wow64/bin 目录不存在"
            exit 1
          fi

      # ------------------------------------------------------------
      # 12. 补全安装目录
      # ------------------------------------------------------------
      - name: 全面补全安装目录的运行时文件
        run: |
          set -e
          TARGET_PREFIX="/tmp/wine-install-wow64"
          BUILD_DIR="${{ env.WINE_SOURCE_DIR }}/source/build-arm64"
          SOURCE_DIR="${{ env.WINE_SOURCE_DIR }}/source"
          NATIVE_NLS_DIR="/opt/wine64-native/nls"
          SOURCE_FONTS_DIR="$SOURCE_DIR/fonts"
          
          echo "=== 补全 share/wine/nls ==="
          mkdir -p "$TARGET_PREFIX/share/wine/nls"
          if [ -d "$NATIVE_NLS_DIR" ]; then
              cp -v "$NATIVE_NLS_DIR"/*.nls "$TARGET_PREFIX/share/wine/nls/" 2>/dev/null || echo "没有找到 .nls 文件"
          fi
          if [ ! -f "$TARGET_PREFIX/share/wine/nls/locale.nls" ] && [ -f "/opt/nls-backup/locale.nls" ]; then
              cp -v "/opt/nls-backup/locale.nls" "$TARGET_PREFIX/share/wine/nls/"
          fi
          
          echo "=== 补全 share/wine/fonts ==="
          if [ -d "$SOURCE_FONTS_DIR" ]; then
              mkdir -p "$TARGET_PREFIX/share/wine/fonts"
              cp -v "$SOURCE_FONTS_DIR"/*.ttf "$SOURCE_FONTS_DIR"/*.fon "$TARGET_PREFIX/share/wine/fonts/" 2>/dev/null || echo "字体复制完成"
          fi
          
          echo "=== 补全 wine.inf ==="
          WINE_INF_SRC=$(find "$BUILD_DIR" -name "wine.inf" -type f 2>/dev/null | head -1)
          if [ -z "$WINE_INF_SRC" ]; then
              if [ -f "$SOURCE_DIR/dlls/wine.inf/wine.inf" ]; then
                  WINE_INF_SRC="$SOURCE_DIR/dlls/wine.inf/wine.inf"
              elif [ -f "$SOURCE_DIR/dlls/wine.inf/wine.inf.in" ]; then
                  WINE_INF_SRC="$SOURCE_DIR/dlls/wine.inf/wine.inf.in"
              fi
          fi
          if [ -n "$WINE_INF_SRC" ]; then
              mkdir -p "$TARGET_PREFIX/share/wine"
              cp -v "$WINE_INF_SRC" "$TARGET_PREFIX/share/wine/wine.inf"
          fi
          
          echo "=== 补全关键程序 ==="
          BIN_DIR="$TARGET_PREFIX/bin"
          mkdir -p "$BIN_DIR"
          for prog in wineboot winecfg regedit wineconsole wineserver wine wine64; do
              if [ ! -f "$BIN_DIR/$prog" ]; then
                  found=$(find "$BUILD_DIR" -type f -name "$prog" -executable 2>/dev/null | head -1)
                  if [ -n "$found" ]; then
                      cp -v "$found" "$BIN_DIR/"
                  fi
              fi
          done
          if [ ! -f "$BIN_DIR/wine" ] && [ -f "$BIN_DIR/wine64" ]; then
              ln -sv wine64 "$BIN_DIR/wine"
          fi
          
          echo "=== 复制 GStreamer ==="
          if [ -n "$GST_PREFIX" ] && [ -d "$GST_PREFIX" ]; then
              mkdir -p "$TARGET_PREFIX/opt/gstreamer"
              cp -r "$GST_PREFIX"/* "$TARGET_PREFIX/opt/gstreamer/"
              echo "GStreamer 已复制"
          fi

      # ------------------------------------------------------------
      # 13. 验证安装目录
      # ------------------------------------------------------------
      - name: 验证安装目录内容
        run: |
          echo "安装目录内容："
          ls -la /tmp/wine-install-wow64/
          if [ -d /tmp/wine-install-wow64/bin ]; then
            echo "bin 目录："
            ls -la /tmp/wine-install-wow64/bin/
          fi
          if [ -d /tmp/wine-install-wow64/opt/gstreamer ]; then
            echo "GStreamer 目录："
            ls -la /tmp/wine-install-wow64/opt/gstreamer/
          fi

      # ------------------------------------------------------------
      # 14. 打包
      # ------------------------------------------------------------
      - name: 准备打包
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          mkdir -p wine-package/$PACKAGE_NAME
          cp -r /tmp/wine-install-wow64/* wine-package/$PACKAGE_NAME/
          
      - name: 创建打包文件
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          tar -cJf $PACKAGE_NAME.tar.xz -C wine-package $PACKAGE_NAME
          ls -lh *.tar.xz
          
      - name: Generate checksums
        run: |
          sha256sum *.tar.xz > checksums.txt
          cat checksums.txt
          
      - name: Upload Wine WoW64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Wine-${{ github.event.inputs.wine_branch || 'staging' }}-${{ github.event.inputs.wine_version || 'latest' }}-ARM64
          path: |
            *.tar.xz
            checksums.txt
          retention-days: 30

      - name: 发布 Wine 到 GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: wine-${{ github.event.inputs.wine_branch || 'staging' }}-${{ github.event.inputs.wine_version || 'latest' }}-arm64
          name: Wine ${{ github.event.inputs.wine_branch || 'staging' }} ${{ github.event.inputs.wine_version || 'latest' }} (ARM64 WOW64 for Termux)
          body: |
            # Wine ${{ github.event.inputs.wine_branch || 'staging' }} ${{ github.event.inputs.wine_version || 'latest' }} - ARM64 WOW64 for Termux
            
            ## 版本信息
            - **Wine 分支**: ${{ github.event.inputs.wine_branch || 'staging' }}
            - **Wine 版本**: ${{ github.event.inputs.wine_version || 'latest' }}
            - **主机架构**: ARM64 (aarch64)
            - **目标 Windows 架构**: i386, x86_64, arm64ec
            - **平台**: Termux (Android)
            - **图形 API**: Vulkan 支持
            - **多媒体**: GStreamer 最新版 + FFmpeg 解码器
            - **工具链**: llvm-mingw + 系统 gcc
            
            ## 特性
            ✓ ARM64 原生 Wine 可执行文件
            ✓ 支持运行 32/64 位 Windows 应用程序
            ✓ Vulkan 渲染支持
            ✓ GStreamer 多媒体后端（包含 FFmpeg 解码器）
            ✓ 中文环境支持
            ✓ 包含完整运行时文件
            
            ## 安装说明
            解压后，将 `${{ env.BUILD_NAME }}` 文件夹放置在 Termux 的合适位置。
          files: |
            ${{ github.workspace }}/${{ env.BUILD_NAME }}.tar.xz
            ${{ github.workspace }}/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
