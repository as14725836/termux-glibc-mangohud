name: Wine ARM64 WoW64 完整构建

on:
  schedule:
    - cron: '0 2 5,20 * *'
  workflow_dispatch:
    inputs:
      wine_branch:
        description: 'Wine 分支'
        required: false
        default: 'vanilla'
        type: choice
        options:
        - vanilla
        - staging
        - staging-tkg
        - staging-tkg-fsync
      wine_version:
        description: 'Wine 版本 (例如 9.22，或 latest)'
        required: false
        default: 'latest'

env:
  LLVMMINGW_DATE: 20251202
  LLVMMINGW_NAME: llvm-mingw-20251202-ucrt-ubuntu-22.04-x86_64
  DEBIAN_FRONTEND: noninteractive

permissions:
  contents: write

jobs:
  build-wine-wow64:
    runs-on: ubuntu-latest
    container:
      image: debian:12
      options: --user root
    timeout-minutes: 240

    steps:
      - name: 安装基础工具
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates wget git curl gnupg sudo xz-utils g++ file bzip2

      - uses: actions/checkout@v4

      - name: 配置多架构 APT 源
        run: |
          cat > /etc/apt/sources.list <<'EOF'
          deb [arch=amd64] http://deb.debian.org/debian bookworm main contrib non-free
          deb [arch=amd64] http://deb.debian.org/debian bookworm-updates main contrib non-free
          deb [arch=amd64] http://security.debian.org/debian-security bookworm-security main contrib non-free
          deb [arch=arm64] http://deb.debian.org/debian bookworm main contrib non-free
          deb [arch=arm64] http://deb.debian.org/debian bookworm-updates main contrib non-free
          deb [arch=arm64] http://security.debian.org/debian-security bookworm-security main contrib non-free
          EOF
          dpkg --add-architecture arm64
          apt-get update

      - name: 安装编译依赖
        run: |
          apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            build-essential cmake ninja-build \
            flex bison nasm gettext automake autoconf libtool pkg-config \
            python3 python3-setuptools clang llvm lld \
            libfreetype6-dev:arm64 libglib2.0-dev:arm64 libltdl-dev:arm64 \
            libxcb1-dev:arm64 libx11-dev:arm64 libxinerama-dev:arm64 \
            libxcursor-dev:arm64 libxi-dev:arm64 libxrandr-dev:arm64 \
            libxrender-dev:arm64 libxfixes-dev:arm64 libxcomposite-dev:arm64 \
            libdbus-1-dev:arm64 libusb-1.0-0-dev:arm64 libvulkan-dev:arm64 \
            libgstreamer1.0-dev:arm64 libgstreamer-plugins-base1.0-dev:arm64 \
            libpulse-dev:arm64 libunwind-dev:arm64 libfontconfig1-dev:arm64 \
            libgl-dev:arm64 libgnutls28-dev:arm64 libcups2-dev:arm64 \
            libwayland-dev:arm64 libxkbcommon-dev:arm64

      - name: 安装 llvm-mingw
        run: |
          mkdir -p /opt
          cd /opt
          wget -q https://github.com/mstorsjo/llvm-mingw/releases/download/${{ env.LLVMMINGW_DATE }}/${{ env.LLVMMINGW_NAME }}.tar.xz
          tar -xJf ${{ env.LLVMMINGW_NAME }}.tar.xz
          rm -f ${{ env.LLVMMINGW_NAME }}.tar.xz
          echo "/opt/${{ env.LLVMMINGW_NAME }}/bin" >> $GITHUB_PATH

      - name: 设置中文 locale
        run: |
          apt-get install -y locales
          sed -i '/zh_CN.UTF-8/s/^# //g' /etc/locale.gen
          locale-gen
          echo "LANG=zh_CN.UTF-8" >> $GITHUB_ENV
          echo "LC_ALL=zh_CN.UTF-8" >> $GITHUB_ENV

      - name: 获取 Wine 源码
        run: |
          set -e
          mkdir -p /opt/wine
          cd /opt/wine
          WINE_BRANCH="${{ github.event.inputs.wine_branch || 'staging' }}"
          WINE_VERSION="${{ github.event.inputs.wine_version || 'latest' }}"

          if [ "$WINE_BRANCH" = "vanilla" ]; then
            git clone https://github.com/wine-mirror/wine.git source
          elif [ "$WINE_BRANCH" = "staging" ]; then
            git clone https://github.com/wine-mirror/wine.git source
          else
            git clone https://github.com/Kron4ek/wine-tkg.git source
          fi

          cd source
          if [ "$WINE_VERSION" != "latest" ]; then
            git checkout wine-$WINE_VERSION 2>/dev/null || true
          fi

          VER=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^wine-//')
          echo "WINE_FINAL_VER=$VER" >> $GITHUB_ENV
          echo "BUILD_NAME=wine-$VER-$WINE_BRANCH-arm64-wow64" >> $GITHUB_ENV

      - name: 修复 Termux 路径
        run: |
          cd /opt/wine/source
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.spec" \) | xargs sed -i \
            's|/data/data/com.winlator/files/rootfs/tmp|/data/data/com.termux/files/usr/tmp|g' || true

      - name: 生成 configure
        run: |
          cd /opt/wine/source
          

      - name: 构建 ARM64 (64位)
        run: |
          set -e
          mkdir -p /opt/wine/build64
          cd /opt/wine/build64
          export PATH="/opt/${{ env.LLVMMINGW_NAME }}/bin:$PATH"
          export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig
          export CFLAGS="-O2"
          export CXXFLAGS="-O2"
          export LDFLAGS="-L/usr/lib/aarch64-linux-gnu"

          ../source/configure \
            --prefix=/opt/wine/final \
            --enable-win64 \
            --enable-archs=arm64ec,aarch64,i386 \
            --with-mingw=clang \
            --host=aarch64-linux-gnu \
            --disable-tests \
            CC=aarch64-linux-gnu-gcc

          make -j$(nproc)
          make install install-libs

      - name: 构建 i386 (32位 WOW64)
        run: |
          set -e
          mkdir -p /opt/wine/build32
          cd /opt/wine/build32
          export PATH="/opt/${{ env.LLVMMINGW_NAME }}/bin:$PATH"
          export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig
          export CFLAGS="-O2"
          export CXXFLAGS="-O2"
          export LDFLAGS="-L/usr/lib/aarch64-linux-gnu"

          ../source/configure \
            --prefix=/opt/wine/final \
            --with-wine64=/opt/wine/build64 \
            --enable-archs=i386 \
            --with-mingw=clang \
            --host=aarch64-linux-gnu \
            --disable-tests \
            CC=aarch64-linux-gnu-gcc

          make -j$(nproc)
          make install install-libs

      - name: 补全 nls / fonts / wine.inf
        run: |
          mkdir -p /opt/wine/final/share/wine/{nls,fonts}
          cp -rn /opt/wine/build64/nls/. /opt/wine/final/share/wine/nls/ || true
          cp -rn /opt/wine/source/fonts/*.ttf /opt/wine/final/share/wine/fonts/ || true
          cp -n /opt/wine/source/dlls/wine.inf/wine.inf /opt/wine/final/share/wine/ || true

      - name: 打包
        run: |
          mkdir -p pkg
          mv /opt/wine/final pkg/${{ env.BUILD_NAME }}
          tar -cJf ${{ env.BUILD_NAME }}.tar.xz -C pkg ${{ env.BUILD_NAME }}
          sha256sum *.tar.xz > checksums.txt

      - name: 上传构件
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_NAME }}
          path: |
            *.tar.xz
            checksums.txt

      - name: 发布到 Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ env.BUILD_NAME }}
          name: Wine ${{ env.WINE_FINAL_VER }} ARM64 WoW64 完整版
          body: |
            ✅ 完整 WoW64 结构
            ✅ system32 + syswow64 均正常生成
            ✅ 32位程序可正常运行
          files: |
            *.tar.xz
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
