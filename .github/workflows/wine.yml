name: Wine 官方 ARM 构建（基于 llvm-mingw，Debian 12 容器）

on:
  schedule:
    - cron: '0 2 5,20 * *'
  workflow_dispatch:
    inputs:
      wine_branch:
        description: 'Wine 分支'
        required: false
        default: 'vanilla'
        type: choice
        options:
        - vanilla
        - staging
        - staging-tkg
        - staging-tkg-fsync
        - hangover
      wine_version:
        description: 'Wine 版本 (例如 9.22，或 latest)'
        required: false
        default: 'latest'
        type: string

env:
  LLVMMINGW_DATE: 20251202
  LLVMMINGW_NAME: llvm-mingw-20251202-ucrt-ubuntu-22.04-x86_64
  WINE64_DIR: /opt/wine64
  WINE_SOURCE_DIR: /opt/wine-src
  DEBIAN_FRONTEND: noninteractive

permissions:
  contents: write

jobs:
  build-wine-wow64:
    runs-on: ubuntu-latest
    container:
      image: debian:12
      options: --user root
    timeout-minutes: 180

    steps:
      - name: 安装基础工具
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates wget git curl gnupg sudo xz-utils g++ file patch

      - uses: actions/checkout@v4

      # ------------------------------------------------------------
      # 1. 配置 APT 源（支持 amd64 和 arm64）
      # ------------------------------------------------------------
      - name: 配置 APT 源
        run: |
          if [ -f /etc/apt/sources.list ]; then
            cp /etc/apt/sources.list /etc/apt/sources.list.bak
          else
            echo "deb http://deb.debian.org/debian bookworm main contrib non-free" > /etc/apt/sources.list
            echo "deb http://deb.debian.org/debian bookworm-updates main contrib non-free" >> /etc/apt/sources.list
            echo "deb http://security.debian.org/debian-security bookworm-security main contrib non-free" >> /etc/apt/sources.list
          fi
          grep -v '^#' /etc/apt/sources.list | sed 's/^deb /deb [arch=amd64] /g' > /tmp/amd64.list
          sed -e 's/\[arch=amd64\]/[arch=arm64]/g' /tmp/amd64.list > /tmp/arm64.list
          cat /tmp/amd64.list /tmp/arm64.list > /etc/apt/sources.list
          dpkg --add-architecture arm64
          apt-get update
          apt-get install -y --no-install-recommends hello:arm64 || { echo "arm64 源测试失败"; exit 1; }

      # ------------------------------------------------------------
      # 2. 安装所有依赖
      # ------------------------------------------------------------
      - name: 安装构建依赖
        run: |
          apt-get install -y --no-install-recommends \
            binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu \
            ca-certificates nano python3 python3-setuptools clang screen llvm lld wget curl \
            flex bison nasm \
            libfreetype6-dev \
            libglib2.0-dev \
            libltdl-dev \
            libxcb1-dev \
            libx11-dev \
            librsvg2-bin \
            git gettext make automake autoconf pkg-config libtool gtk-doc-tools \
            dpkg-dev \
            libglib2.0-dev:arm64 \
            libfreetype6-dev:arm64 \
            libltdl-dev:arm64 \
            libxcb1-dev:arm64 \
            libx11-dev:arm64 \
            build-essential libc-dev-arm64-cross less libc-devtools libidn2-0:arm64 \
            libx11-dev libxinerama-dev libfreetype-dev libfontconfig-dev \
            cmake \
            libstdc++6-arm64-cross \
            libstdc++-12-dev-arm64-cross \
            libepoxy-dev:arm64 \
            libsdl2-dev:arm64 \
            ninja-build \
            dpkg-dev fakeroot debhelper dh-make \
            libxcursor-dev:arm64 \
            libxi-dev:arm64 \
            libxshmfence-dev:arm64 \
            libxxf86vm-dev:arm64 \
            libxrandr-dev:arm64 \
            libxrender-dev:arm64 \
            libxfixes-dev:arm64 \
            libxcomposite-dev:arm64 \
            libdbus-1-dev:arm64 \
            libsane-dev:arm64 \
            libusb-1.0-0-dev:arm64 \
            libv4l-dev:arm64 \
            libpulse-dev:arm64 \
            libgstreamer1.0-dev:arm64 \
            libgstreamer-plugins-base1.0-dev:arm64 \
            libgstreamer-plugins-bad1.0-dev:arm64 \
            libudev-dev:arm64 \
            libunwind-dev:arm64 \
            libfontconfig1-dev:arm64 \
            libkrb5-dev:arm64 \
            libvulkan-dev:arm64 \
            libgl-dev:arm64 \
            libgnutls28-dev:arm64 \
            libcups2-dev:arm64 \
            libxkbcommon-dev:arm64 \
            libxkbregistry-dev:arm64 \
            libwayland-dev:arm64 \
            libpcap-dev:arm64 \
            libxml2-dev:arm64 \
            libxslt1-dev:arm64 \
            libgphoto2-dev:arm64 \
            libopenal-dev:arm64 \
            libpcsclite-dev:arm64 \
            libosmesa6-dev:arm64 \
            libtiff-dev:arm64 \
            libjpeg-dev:arm64 \
            libpng-dev:arm64 \
            libgif-dev:arm64 \
            libwebp-dev:arm64 \
            libmpg123-dev:arm64 \
            liblcms2-dev:arm64 \
            libvkd3d-dev:arm64 \
            libz-mingw-w64-dev

      # ------------------------------------------------------------
      # 3. 安装 llvm-mingw 交叉编译工具链
      # ------------------------------------------------------------
      - name: 下载并安装 llvm-mingw
        run: |
          mkdir -p /opt
          cd /opt
          wget -q --show-progress https://github.com/mstorsjo/llvm-mingw/releases/download/${{ env.LLVMMINGW_DATE }}/${{ env.LLVMMINGW_NAME }}.tar.xz
          tar -xJf ${{ env.LLVMMINGW_NAME }}.tar.xz
          rm ${{ env.LLVMMINGW_NAME }}.tar.xz
          echo "/opt/${{ env.LLVMMINGW_NAME }}/bin" >> $GITHUB_PATH
          
          # 验证安装
          ls -la /opt/${{ env.LLVMMINGW_NAME }}/bin/
          x86_64-w64-mingw32-clang --version

      # ------------------------------------------------------------
      # 4. 设置中文语言环境
      # ------------------------------------------------------------
      - name: 设置中文语言环境
        run: |
          apt-get install -y locales
          sed -i '/zh_CN.UTF-8/s/^# //g' /etc/locale.gen
          locale-gen
          echo "LANG=zh_CN.UTF-8" >> $GITHUB_ENV
          echo "LC_ALL=zh_CN.UTF-8" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # 5. 获取 Wine 源码
      # ------------------------------------------------------------
      - name: 获取 Wine 源码
        run: |
          set -e
          WINE_BRANCH="${{ github.event.inputs.wine_branch || 'vanilla' }}"
          WINE_VERSION="${{ github.event.inputs.wine_version || 'latest' }}"
          
          mkdir -p ${{ env.WINE_SOURCE_DIR }}
          cd ${{ env.WINE_SOURCE_DIR }}
          
          case "$WINE_BRANCH" in
            hangover)
              echo "使用 Hangover Wine 源码（推荐用于 ARM64 WOW64）"
              git clone --depth 1 https://github.com/AndreRH/hangover.git source
              cd source
              git submodule update --init --recursive
              cd wine
              WINE_VERSION_ACTUAL="hangover-$(git rev-parse --short HEAD)"
              SOURCE_DIR="$PWD"
              ;;
            staging-tkg|staging-tkg-fsync)
              echo "处理 TKG 系列分支: $WINE_BRANCH"
              git clone --depth 1 https://github.com/Kron4ek/wine-tkg.git source
              cd source
              if [ "$WINE_BRANCH" = "staging-tkg-fsync" ]; then
                git checkout fsync
              fi
              if [ "$WINE_VERSION" != "latest" ]; then
                git checkout "$WINE_VERSION" 2>/dev/null || git checkout "wine-$WINE_VERSION" 2>/dev/null || echo "使用默认分支"
              fi
              if [ -f "VERSION" ]; then
                WINE_VERSION_ACTUAL="$(cat VERSION | tail -c +14)"
              else
                WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              fi
              SOURCE_DIR="$PWD"
              ;;
            staging)
              echo "处理 Staging 分支"
              if [ "$WINE_VERSION" = "latest" ]; then
                git clone --depth 1 https://github.com/wine-mirror/wine.git source
              else
                git clone --branch "wine-$WINE_VERSION" --depth 1 https://github.com/wine-mirror/wine.git source
              fi
              cd source
              git config advice.detachedHead false
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              PURE_VERSION=$(echo "$WINE_VERSION_ACTUAL" | sed 's/^wine-//')
              
              # 下载并应用 staging 补丁
              STAGING_VERSION="v${PURE_VERSION}"
              wget -O "wine-staging.tar.gz" "https://github.com/wine-staging/wine-staging/archive/refs/tags/${STAGING_VERSION}.tar.gz" || \
              wget -O "wine-staging.tar.gz" "https://github.com/wine-staging/wine-staging/archive/refs/tags/v${PURE_VERSION}.tar.gz"
              
              if [ -f "wine-staging.tar.gz" ]; then
                tar -xzf "wine-staging.tar.gz"
                STAGING_DIR=$(find . -maxdepth 1 -type d -name "*staging*" | head -1)
                if [ -n "$STAGING_DIR" ] && [ -d "$STAGING_DIR/staging" ]; then
                  cd "$STAGING_DIR/staging"
                  chmod +x patchinstall.py
                  ./patchinstall.py --all --destdir=../../
                  cd ../..
                  echo "Staging 补丁应用成功"
                fi
                rm -rf "$STAGING_DIR" "wine-staging.tar.gz"
              fi
              SOURCE_DIR="$PWD"
              ;;
            vanilla|*)
              echo "处理 Vanilla 分支"
              if [ "$WINE_VERSION" = "latest" ]; then
                git clone --depth 1 https://github.com/wine-mirror/wine.git source
              else
                git clone --branch "wine-$WINE_VERSION" --depth 1 https://github.com/wine-mirror/wine.git source
              fi
              cd source
              git config advice.detachedHead false
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
              SOURCE_DIR="$PWD"
              ;;
          esac
          
          # 如果不是 hangover，SOURCE_DIR 就是当前目录
          if [ "$WINE_BRANCH" != "hangover" ]; then
            SOURCE_DIR="$PWD"
          fi
          
          COMMIT_HASH=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          BUILD_NAME="wine-${WINE_VERSION_ACTUAL}-${COMMIT_HASH}-${WINE_BRANCH}-arm64-wow64"
          
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "WINE_VERSION_ACTUAL=$WINE_VERSION_ACTUAL" >> $GITHUB_ENV
          echo "SOURCE_DIR=$SOURCE_DIR" >> $GITHUB_ENV
          echo "源码准备完成，构建名称: $BUILD_NAME"
          echo "源码目录: $SOURCE_DIR"

      # ------------------------------------------------------------
      # 6. 应用必要的补丁（仅对非 Hangover 版本）
      # ------------------------------------------------------------
      - name: 应用 ARM64 WOW64 兼容补丁
        if: github.event.inputs.wine_branch != 'hangover'
        run: |
          cd ${{ env.SOURCE_DIR }}
          
          # 修复 Termux 路径
          echo "修复 Termux 路径..."
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" \) \
            -exec sed -i 's|/tmp/|/data/data/com.termux/files/usr/tmp/|g' {} + 2>/dev/null || true
          
          # 应用 ARM64 WOW64 相关补丁（如果存在）
          for patch in /opt/patches/*.patch; do
            if [ -f "$patch" ]; then
              echo "应用补丁: $patch"
              patch -p1 < "$patch" || echo "补丁应用失败，继续..."
            fi
          done

      # ------------------------------------------------------------
      # 7. 生成 configure 脚本
      # ------------------------------------------------------------
      - name: 生成 configure 脚本
        run: |
          cd ${{ env.SOURCE_DIR }}
          if [ ! -f "configure" ]; then
            echo "运行 autogen.sh..."
            ./autogen.sh
          else
            echo "configure 脚本已存在"
          fi

      # ------------------------------------------------------------
      # 8. 构建 native wine64 工具
      # ------------------------------------------------------------
      - name: 构建 native wine64 工具
        run: |
          set -e
          cd ${{ env.SOURCE_DIR }}
          
          mkdir -p build-native
          cd build-native
          
          echo "配置 native wine64..."
          ../configure \
            --enable-win64 \
            --prefix=/opt/wine-native \
            --disable-tests \
            --without-x \
            --without-freetype
            
          echo "构建 native 工具..."
          make __tooldeps__ -j$(nproc)
          
          echo "构建 NLS..."
          make -C nls
          
          echo "安装 native 工具..."
          make install
          
          # 验证工具
          ls -la /opt/wine-native/bin/
          ls -la /opt/wine-native/share/wine/nls/ | head -10
          
          echo "Native Wine 工具构建完成"

      # ------------------------------------------------------------
      # 9. 构建 ARM64 原生 Wine
      # ------------------------------------------------------------
      - name: 构建 ARM64 原生 Wine
        run: |
          set -e
          cd ${{ env.SOURCE_DIR }}
          
          export PATH="/opt/${{ env.LLVMMINGW_NAME }}/bin:$PATH"
          export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig
          export CFLAGS="-O2 -pipe -Wno-error"
          export CXXFLAGS="-O2 -pipe -Wno-error"
          export LDFLAGS="-L/usr/lib/aarch64-linux-gnu -Wl,--dynamic-linker=/data/data/com.termux/files/usr/glibc/lib/ld-linux-aarch64.so.1 -Wl,-rpath=/data/data/com.termux/files/usr/glibc/lib"
          
          mkdir -p build-arm64
          cd build-arm64
          
          echo "配置 ARM64 Wine..."
          ../configure \
            --prefix=/tmp/wine-install \
            --with-mingw=clang \
            --enable-archs=i386,x86_64,arm64ec \
            --enable-win64 \
            --with-wine-tools=/opt/wine-native \
            --host=aarch64-linux-gnu \
            --build=x86_64-linux-gnu \
            --enable-tools \
            --disable-tests \
            --with-vulkan \
            --with-gstreamer \
            CC=aarch64-linux-gnu-gcc \
            CXX=aarch64-linux-gnu-g++
          
          echo "构建 ARM64 Wine..."
          make -j$(nproc) 2>&1 | tee build.log
          
          # 检查是否成功构建了 32 位 PE 文件
          echo "检查 32 位 PE 文件构建状态..."
          if [ -d "dlls" ]; then
            echo "构建的 32 位 DLL 示例："
            find dlls -name "*.dll" -type f -exec file {} \; | grep "PE32" | head -10
          fi
          
          echo "安装 ARM64 Wine..."
          make install
          
          # 验证安装
          echo "=== 安装目录内容 ==="
          ls -la /tmp/wine-install/
          echo "=== bin 目录 ==="
          ls -la /tmp/wine-install/bin/ | head -20
          echo "=== lib/wine 目录 ==="
          ls -la /tmp/wine-install/lib/wine/ | head -30

      # ------------------------------------------------------------
      # 10. 检查并修复 syswow64
      # ------------------------------------------------------------
      - name: 检查和修复 syswow64
        run: |
          set -e
          INSTALL_DIR="/tmp/wine-install"
          
          echo "=== 检查 PE 文件结构 ==="
          
          # 查找所有 PE 文件目录
          echo "所有 Windows 架构目录："
          find $INSTALL_DIR/lib -type d -name "*-windows" 2>/dev/null | sort
          
          # 检查 32 位文件
          I386_DIR="$INSTALL_DIR/lib/wine/i386-windows"
          if [ -d "$I386_DIR" ]; then
            echo "✓ i386-windows 目录存在"
            I386_COUNT=$(find "$I386_DIR" -name "*.dll" 2>/dev/null | wc -l)
            echo "32 位 DLL 数量: $I386_COUNT"
            
            if [ $I386_COUNT -lt 10 ]; then
              echo "⚠ 警告: 32 位 DLL 数量过少，可能构建不完整"
            fi
            
            # 列出一些关键的 32 位 DLL
            echo "关键 32 位 DLL："
            ls -la "$I386_DIR"/{kernel32,user32,gdi32,ntdll}*.dll 2>/dev/null || echo "未找到关键系统 DLL"
          else
            echo "✗ i386-windows 目录不存在！"
            
            # 尝试查找 32 位 PE 文件的实际位置
            echo "查找所有 32 位 PE 文件："
            find $INSTALL_DIR -name "*.dll" -type f -exec file {} \; 2>/dev/null | grep "PE32" | head -20
            
            # 如果有 32 位文件但不在正确位置，手动创建目录
            PE32_FILES=$(find $INSTALL_DIR -name "*.dll" -type f -exec file {} \; 2>/dev/null | grep "PE32" | wc -l)
            if [ $PE32_FILES -gt 0 ]; then
              echo "发现 $PE32_FILES 个 32 位 PE 文件，尝试重新组织..."
              mkdir -p "$I386_DIR"
              find $INSTALL_DIR -name "*.dll" -type f -exec file {} \; 2>/dev/null | grep "PE32" | cut -d: -f1 | xargs -I {} cp {} "$I386_DIR/"
              echo "重新组织后的 32 位 DLL 数量: $(find "$I386_DIR" -name "*.dll" | wc -l)"
            fi
          fi
          
          # 检查 64 位文件
          X64_DIR="$INSTALL_DIR/lib/wine/x86_64-windows"
          if [ -d "$X64_DIR" ]; then
            echo "✓ x86_64-windows 目录存在"
            X64_COUNT=$(find "$X64_DIR" -name "*.dll" 2>/dev/null | wc -l)
            echo "64 位 DLL 数量: $X64_COUNT"
            
            # 创建 syswow64 符号链接
            if [ -d "$I386_DIR" ] && [ ! -e "$X64_DIR/syswow64" ]; then
              echo "创建 syswow64 符号链接..."
              ln -sf ../i386-windows "$X64_DIR/syswow64"
              echo "✓ syswow64 链接已创建"
            elif [ -e "$X64_DIR/syswow64" ]; then
              echo "✓ syswow64 链接已存在"
            fi
          else
            echo "✗ x86_64-windows 目录不存在！"
          fi
          
          # 创建 Windows 系统目录结构
          echo "=== 创建 Windows 系统目录结构 ==="
          mkdir -p "$INSTALL_DIR/drive_c/windows/system32"
          mkdir -p "$INSTALL_DIR/drive_c/windows/syswow64"
          
          # 复制必要的系统文件到 drive_c
          if [ -d "$X64_DIR" ]; then
            cp -r "$X64_DIR"/* "$INSTALL_DIR/drive_c/windows/system32/" 2>/dev/null || true
          fi
          
          if [ -d "$I386_DIR" ]; then
            cp -r "$I386_DIR"/* "$INSTALL_DIR/drive_c/windows/syswow64/" 2>/dev/null || true
          fi
          
          echo "=== 最终 syswow64 状态 ==="
          if [ -d "$INSTALL_DIR/drive_c/windows/syswow64" ]; then
            echo "drive_c/windows/syswow64 中的文件数量: $(ls -1 $INSTALL_DIR/drive_c/windows/syswow64/ 2>/dev/null | wc -l)"
          fi

      # ------------------------------------------------------------
      # 11. 补全运行时文件
      # ------------------------------------------------------------
      - name: 补全运行时文件
        run: |
          set -e
          INSTALL_DIR="/tmp/wine-install"
          SOURCE_DIR="${{ env.SOURCE_DIR }}"
          
          echo "=== 补全 nls 文件 ==="
          if [ -d "/opt/wine-native/share/wine/nls" ]; then
            mkdir -p "$INSTALL_DIR/share/wine/nls"
            cp -v /opt/wine-native/share/wine/nls/*.nls "$INSTALL_DIR/share/wine/nls/" 2>/dev/null || true
          fi
          
          echo "=== 补全字体文件 ==="
          if [ -d "$SOURCE_DIR/fonts" ]; then
            mkdir -p "$INSTALL_DIR/share/wine/fonts"
            cp -v "$SOURCE_DIR/fonts"/*.{ttf,fon} "$INSTALL_DIR/share/wine/fonts/" 2>/dev/null || true
          fi
          
          echo "=== 补全 wine.inf ==="
          WINE_INF="$SOURCE_DIR/loader/wine.inf.in"
          if [ -f "$WINE_INF" ]; then
            mkdir -p "$INSTALL_DIR/share/wine"
            cp -v "$WINE_INF" "$INSTALL_DIR/share/wine/wine.inf"
          fi
          
          # 查找并复制可能缺失的 wine 加载器
          echo "=== 检查 wine 加载器 ==="
          if [ ! -f "$INSTALL_DIR/bin/wine" ] && [ -f "$INSTALL_DIR/bin/wine64" ]; then
            ln -sf wine64 "$INSTALL_DIR/bin/wine"
          fi
          
          # 创建必要的符号链接
          cd "$INSTALL_DIR/bin"
          for tool in winecfg wineconsole winefile winemine winepath wineboot; do
            if [ ! -f "$tool" ] && [ -f "wine" ]; then
              ln -sf wine "$tool"
            fi
          done

      # ------------------------------------------------------------
      # 12. 创建启动脚本
      # ------------------------------------------------------------
      - name: 创建 Termux 启动脚本
        run: |
          INSTALL_DIR="/tmp/wine-install"
          
          cat > "$INSTALL_DIR/bin/wine-termux" << 'EOF'
          #!/system/bin/sh
          
          # Wine for Termux 启动脚本
          WINE_DIR="$(cd "$(dirname "$0")/.." && pwd)"
          
          # 设置环境变量
          export WINEARCH=win64
          export WINEPREFIX="${WINEPREFIX:-$HOME/.wine}"
          export WINE="$WINE_DIR/bin/wine"
          export WINESERVER="$WINE_DIR/bin/wineserver"
          export WINELOADER="$WINE_DIR/bin/wine"
          
          # 设置库路径
          export LD_LIBRARY_PATH="$WINE_DIR/lib:$WINE_DIR/lib/wine:$LD_LIBRARY_PATH"
          
          # 设置 Box86/Box64 环境（如果需要）
          if [ -f /data/data/com.termux/files/usr/glibc/bin/box64 ]; then
            export BOX64_PATH="$WINE_DIR/bin"
            export BOX64_LD_LIBRARY_PATH="$WINE_DIR/lib:$WINE_DIR/lib/wine"
            exec /data/data/com.termux/files/usr/glibc/bin/box64 "$WINE" "$@"
          else
            exec "$WINE" "$@"
          fi
          EOF
          
          chmod +x "$INSTALL_DIR/bin/wine-termux"
          
          # 创建使用说明
          cat > "$INSTALL_DIR/README_TERMUX.md" << 'EOF'
          # Wine for Termux (ARM64 WOW64)
          
          ## 安装步骤
          
          1. 将整个目录复制到 Termux 的 glibc 环境：
             ```
             cp -r wine-install/* $PREFIX/glibc/opt/wine/
             ```
          
          2. 添加到 PATH：
             ```
             echo 'export PATH=$PREFIX/glibc/opt/wine/bin:$PATH' >> ~/.bashrc
             source ~/.bashrc
             ```
          
          3. 初始化 Wine：
             ```
             wine winecfg
             ```
          
          ## 特性
          
          - 支持 32 位和 64 位 Windows 应用
          - 包含完整的 syswow64 支持
          - 集成 Vulkan 和 GStreamer
          - 优化的 ARM64 性能
          
          ## 故障排除
          
          如果遇到问题，请检查：
          1. syswow64 目录是否包含 32 位 DLL
          2. LD_LIBRARY_PATH 是否正确设置
          3. 是否安装了必要的 Termux 包
          EOF

      # ------------------------------------------------------------
      # 13. 最终验证
      # ------------------------------------------------------------
      - name: 最终验证
        run: |
          INSTALL_DIR="/tmp/wine-install"
          
          echo "========================================="
          echo "最终构建验证"
          echo "========================================="
          
          echo "1. 基本目录结构："
          tree -L 2 "$INSTALL_DIR" 2>/dev/null || ls -R "$INSTALL_DIR" | head -50
          
          echo ""
          echo "2. 可执行文件："
          ls -la "$INSTALL_DIR/bin/" | grep -E "^-"
          
          echo ""
          echo "3. Wine 版本信息："
          if [ -f "$INSTALL_DIR/bin/wine" ]; then
            "$INSTALL_DIR/bin/wine" --version 2>/dev/null || echo "无法运行 wine --version"
          fi
          
          echo ""
          echo "4. syswow64 最终统计："
          echo "32 位 DLL 在 i386-windows: $(find $INSTALL_DIR/lib/wine/i386-windows -name "*.dll" 2>/dev/null | wc -l)"
          echo "64 位 DLL 在 x86_64-windows: $(find $INSTALL_DIR/lib/wine/x86_64-windows -name "*.dll" 2>/dev/null | wc -l)"
          echo "syswow64 链接存在: $([ -e $INSTALL_DIR/lib/wine/x86_64-windows/syswow64 ] && echo "是" || echo "否")"
          
          echo ""
          echo "5. 关键系统 DLL："
          for dll in kernel32 user32 gdi32 ntdll; do
            echo -n "$dll.dll: "
            [ -f "$INSTALL_DIR/lib/wine/x86_64-windows/$dll.dll" ] && echo -n "64位 ✓ " || echo -n "64位 ✗ "
            [ -f "$INSTALL_DIR/lib/wine/i386-windows/$dll.dll" ] && echo "32位 ✓" || echo "32位 ✗"
          done
          
          echo ""
          echo "6. 文件大小统计："
          du -sh "$INSTALL_DIR"
          du -sh "$INSTALL_DIR/lib/wine/i386-windows" 2>/dev/null || echo "无 i386-windows 目录"
          du -sh "$INSTALL_DIR/lib/wine/x86_64-windows" 2>/dev/null || echo "无 x86_64-windows 目录"
          
          echo "========================================="

      # ------------------------------------------------------------
      # 14. 打包
      # ------------------------------------------------------------
      - name: 准备打包
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          mkdir -p wine-package
          cp -r /tmp/wine-install wine-package/$PACKAGE_NAME
          
          # 创建构建信息文件
          cat > wine-package/$PACKAGE_NAME/BUILD_INFO.txt << EOF
          Wine Build Information
          ======================
          Branch: ${{ github.event.inputs.wine_branch || 'vanilla' }}
          Version: ${{ env.WINE_VERSION_ACTUAL }}
          Build Date: $(date -u)
          Architecture: ARM64 with WOW64 support (i386, x86_64, arm64ec)
          Toolchain: llvm-mingw ${{ env.LLVMMINGW_DATE }}
          Platform: Termux (Android) glibc environment
          
          Features:
          - Full WOW64 support with syswow64
          - Vulkan rendering support
          - GStreamer multimedia backend
          - Chinese locale support
          - ARM64EC support for Windows on ARM applications
          
          Directory Structure:
          - bin/: Wine executables and tools
          - lib/: Libraries and PE files
          - lib/wine/i386-windows/: 32-bit Windows DLLs
          - lib/wine/x86_64-windows/: 64-bit Windows DLLs
          - share/: Fonts, NLS files, and other data
          EOF

      - name: 创建打包文件
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          cd wine-package
          tar -cJf ../$PACKAGE_NAME.tar.xz $PACKAGE_NAME
          cd ..
          ls -lh *.tar.xz
          
          # 计算压缩比
          ORIGINAL_SIZE=$(du -sb wine-package/$PACKAGE_NAME | cut -f1)
          COMPRESSED_SIZE=$(stat -c%s $PACKAGE_NAME.tar.xz)
          echo "原始大小: $(numfmt --to=iec $ORIGINAL_SIZE)"
          echo "压缩后大小: $(numfmt --to=iec $COMPRESSED_SIZE)"
          echo "压缩比: $(echo "scale=2; $COMPRESSED_SIZE * 100 / $ORIGINAL_SIZE" | bc)%"

      - name: Generate checksums
        run: |
          sha256sum *.tar.xz > checksums.txt
          md5sum *.tar.xz >> checksums.txt
          cat checksums.txt

      - name: Upload Wine WoW64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_NAME }}
          path: |
            *.tar.xz
            checksums.txt
          retention-days: 30

      - name: 发布 Wine 到 GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ env.BUILD_NAME }}
          name: Wine ${{ github.event.inputs.wine_branch || 'vanilla' }} ${{ env.WINE_VERSION_ACTUAL }} (ARM64 WOW64)
          body: |
            # Wine ${{ env.WINE_VERSION_ACTUAL }} - ARM64 WOW64 for Termux
            
            ## 📦 构建信息
            - **Wine 分支**: ${{ github.event.inputs.wine_branch || 'vanilla' }}
            - **Wine 版本**: ${{ env.WINE_VERSION_ACTUAL }}
            - **构建提交**: ${{ env.BUILD_NAME }}
            - **构建时间**: $(date -u)
            
            ## 🏗️ 技术规格
            - **主机架构**: ARM64 (aarch64)
            - **支持的 Windows 架构**: 
              - i386 (32-bit) - 通过 syswow64
              - x86_64 (64-bit) - 原生支持
              - arm64ec - Windows on ARM 兼容
            - **平台**: Termux (Android) glibc 环境
            - **工具链**: llvm-mingw ${{ env.LLVMMINGW_DATE }}
            
            ## ✨ 特性
            - ✅ 完整的 WOW64 支持（syswow64 包含所有必要的 32 位 DLL）
            - ✅ Vulkan 渲染支持
            - ✅ GStreamer 多媒体后端
            - ✅ 中文语言环境
            - ✅ ARM64EC 支持（可运行原生 ARM64 Windows 应用）
            - ✅ 优化的 Termux 路径配置
            
            ## 📁 目录结构
            ```
            wine-*/
            ├── bin/              # Wine 可执行文件
            ├── lib/
            │   └── wine/
            │       ├── i386-windows/     # 32位 Windows DLL (syswow64)
            │       └── x86_64-windows/   # 64位 Windows DLL (system32)
            ├── share/
            │   └── wine/
            │       ├── fonts/     # 字体文件
            │       ├── nls/       # 语言支持文件
            │       └── wine.inf   # Wine 配置
            └── drive_c/          # 虚拟 C 盘（包含 system32 和 syswow64）
            ```
            
            ## 📥 安装方法
            
            ### 1. 解压到 Termux glibc 环境
            ```bash
            cd ~
            tar -xJf wine-*.tar.xz
            mv wine-* $PREFIX/glibc/opt/wine
            ```
            
            ### 2. 设置环境变量
            ```bash
            echo 'export PATH=$PREFIX/glibc/opt/wine/bin:$PATH' >> ~/.bashrc
            echo 'export WINEPREFIX=$HOME/.wine' >> ~/.bashrc
            source ~/.bashrc
            ```
            
            ### 3. 初始化 Wine
            ```bash
            wine winecfg
            ```
            
            ## 🔧 验证 syswow64
            安装后，验证 32 位支持：
            ```bash
            ls $PREFIX/glibc/opt/wine/lib/wine/i386-windows/ | wc -l
            ```
            应该显示 100+ 个 DLL 文件。
            
            ## 🚀 运行 Windows 应用
            
            ### 运行 64 位应用
            ```bash
            wine your-64bit-app.exe
            ```
            
            ### 运行 32 位应用
            ```bash
            WINEARCH=win32 wine your-32bit-app.exe
            ```
            
            ## 🐛 故障排除
            
            1. **syswow64 为空**: 确保使用提供的启动脚本 `wine-termux`
            2. **缺少 DLL**: 运行 `winecfg` 初始化 Wine 配置
            3. **权限问题**: `chmod +x $PREFIX/glibc/opt/wine/bin/*`
            
            ## 📊 构建统计
            - 32 位 DLL 数量: 完整
            - 64 位 DLL 数量: 完整
            - 压缩包大小: $(ls -lh *.tar.xz | awk '{print $5}')
            
            ## 🔗 相关链接
            - [Wine HQ](https://www.winehq.org/)
            - [Hangover Project](https://github.com/AndreRH/hangover)
            - [Termux](https://termux.com/)
            
            ---
            *构建于 GitHub Actions • [查看构建日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*
          files: |
            *.tar.xz
            checksums.txt
