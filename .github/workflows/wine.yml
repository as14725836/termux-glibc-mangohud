name: Proton 官方 ARM64 原生构建（llvm-mingw + Ubuntu 22.04 容器）

on:
  schedule:
    - cron: '0 2 5,20 * *'
  workflow_dispatch:
    inputs:
      proton_branch:
        description: 'Proton 分支'
        required: false
        default: 'proton_10.0'
        type: choice
        options:
        - proton_11.0
        - proton_10.0
        - proton_9.0
        - experimental_10.0
        - proton-9.0-arm64ec
        - bleeding-edge

env:
  LLVMMINGW_DATE: 20251202
  LLVMMINGW_NAME: llvm-mingw-20251202-ucrt-ubuntu-22.04-aarch64
  WINE_SOURCE_DIR: /opt/wine-src
  DEBIAN_FRONTEND: noninteractive

permissions:
  contents: write

jobs:
  build-proton-wow64:
    runs-on: ubuntu-24.04-arm
    container:
      image: ubuntu:22.04
      options: --user root
    timeout-minutes: 180

    steps:
      # ============================================================
      # 0. 安装基础工具
      # ============================================================
      - name: 安装基础工具
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates wget git curl gnupg sudo xz-utils g++ file \
            make binutils pkg-config autoconf automake libtool flex bison \
            nasm cmake ninja-build patch gettext \
            python3 python3-setuptools python3-lxml \
            dpkg-dev fakeroot debhelper dh-make build-essential \
            patchelf

      - uses: actions/checkout@v4

      # ============================================================
      # 1. 安装构建依赖（纯 ARM64，无架构后缀，无跨架构冲突）
      # ============================================================
      - name: 安装构建依赖
        run: |
          apt-get install -y --no-install-recommends \
            libfreetype-dev \
            libglib2.0-dev \
            libltdl-dev \
            libxcb1-dev \
            libx11-dev \
            libxinerama-dev \
            libfontconfig-dev \
            librsvg2-bin \
            libepoxy-dev \
            libsdl2-dev \
            libxcursor-dev \
            libxi-dev \
            libxshmfence-dev \
            libxxf86vm-dev \
            libxrandr-dev \
            libxrender-dev \
            libxfixes-dev \
            libxcomposite-dev \
            libdbus-1-dev \
            libsane-dev \
            libusb-1.0-0-dev \
            libv4l-dev \
            libpulse-dev \
            libunwind-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-tools \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            libgstreamer-plugins-bad1.0-dev \
            libgstreamer-plugins-good1.0-dev \
            libudev-dev \
            libfontconfig1-dev \
            libkrb5-dev \
            libvulkan-dev \
            libgl-dev \
            libgnutls28-dev \
            libcups2-dev \
            libxkbcommon-dev \
            libxkbregistry-dev \
            libmpg123-dev \
            libopenal-dev \
            libwayland-dev \
            libidn2-0 \
            libstdc++-12-dev \
            less

      # ============================================================
      # 2. 下载 llvm-mingw（ARM64 原生工具链）
      # ============================================================
      - name: 下载并安装 llvm-mingw
        run: |
          mkdir -p /opt
          cd /opt
          wget https://github.com/mstorsjo/llvm-mingw/releases/download/${{ env.LLVMMINGW_DATE }}/${{ env.LLVMMINGW_NAME }}.tar.xz
          tar -xJf ${{ env.LLVMMINGW_NAME }}.tar.xz
          rm ${{ env.LLVMMINGW_NAME }}.tar.xz
          echo "/opt/${{ env.LLVMMINGW_NAME }}/bin" >> $GITHUB_PATH

      # ============================================================
      # 3. 中文语言环境
      # ============================================================
      - name: 设置中文语言环境
        run: |
          apt-get install -y locales
          sed -i '/zh_CN.UTF-8/s/^# //g' /etc/locale.gen
          locale-gen
          echo "LANG=zh_CN.UTF-8" >> $GITHUB_ENV
          echo "LC_ALL=zh_CN.UTF-8" >> $GITHUB_ENV

      # ============================================================
      # 4. 获取 Proton 源码
      # ============================================================
      - name: 获取 Proton 源码
        run: |
          set -e
          PROTON_BRANCH="${{ github.event.inputs.proton_branch || 'proton-9.0-arm64ec' }}"
          mkdir -p ${{ env.WINE_SOURCE_DIR }}
          cd ${{ env.WINE_SOURCE_DIR }}
          git clone https://github.com/Pipetto-crypto/wine.git source
          cd source
          git checkout "$PROTON_BRANCH"
          PROTON_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$PROTON_BRANCH")
          COMMIT_HASH=$(git rev-parse --short HEAD)
          BUILD_NAME="proton-${PROTON_VERSION_ACTUAL}-${COMMIT_HASH}-${PROTON_BRANCH}-arm64-wow64"
          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "PROTON_VERSION_ACTUAL=$PROTON_VERSION_ACTUAL" >> $GITHUB_ENV
          echo "源码准备完成，构建名称: $BUILD_NAME"

          echo "修复 Termux glibc 路径问题（/tmp → /data/data/com.termux/files/usr/tmp）..."
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) -exec grep -l "/tmp" {} \; | xargs sed -i 's|/tmp/|/data/data/com.termux/files/usr/tmp/|g'
          find server -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} +
          find . -name "file.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} +
          find . -name "loader.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} +
          find . -name "server.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} +

      # ============================================================
      # 5. 应用 Proton 构建补丁（ffmpeg + GstMapInfo typo 修复）
      # ============================================================
      - name: 应用 fix-build_ffmpeg.patch
        run: |
          set -e
          cd ${{ env.WINE_SOURCE_DIR }}/source
          wget -q -O fix-build_ffmpeg.patch https://raw.githubusercontent.com/Waim908/wine-termux/main/proton/10.0/fix-build_ffmpeg.patch
          # 非交互式：跳过不存在的文件，不阻塞 CI
          patch -p1 -N -t < fix-build_ffmpeg.patch || true
          rm fix-build_ffmpeg.patch

      - name: 修复 GstMapInfo 拼写错误（GstBufferMapInfo → GstMapInfo）
        run: |
          set -e
          cd ${{ env.WINE_SOURCE_DIR }}/source
          # 第 1023 行: GstBufferMapInfo 是 typo，正确类型是 GstMapInfo
          sed -i 's/GstBufferMapInfo/GstMapInfo/g' dlls/winegstreamer/media-converter/videoconv.c
          echo "已修复 GstBufferMapInfo → GstMapInfo"

      - name: 修复 SELinux 兼容性（PAGE_READWRITE → PAGE_EXECUTE_READWRITE）
        run: |
          set -e
          cd ${{ env.WINE_SOURCE_DIR }}/source
          sed -i 's/&size, PAGE_READWRITE, &protect_old\[i\]/\&size, PAGE_EXECUTE_READWRITE, \&protect_old[i]/' dlls/ntdll/loader.c
          echo "已修复 perform_relocations: PAGE_READWRITE → PAGE_EXECUTE_READWRITE"

      - name: 缩减虚拟地址空间上限（适配 Android/Termux 受限地址空间）
        run: |
          set -e
          cd ${{ env.WINE_SOURCE_DIR }}/source
          sed -i 's/0x7fffffff0000/0x7fffff0000/g' dlls/ntdll/unix/virtual.c
          echo "已缩减 address_space_limit / user_space_limit / working_set_limit / reserve_area 上限 0x7fffffff0000 → 0x7fffff0000"

      - name: 排除 Termux 下的 JNI 代码路径（unix/loader.c）
        run: |
          set -e
          cd ${{ env.WINE_SOURCE_DIR }}/source
          # 修复1: init_paths() 中 Termux 下使用 /proc/self/exe
          sed -i 's/defined(__linux__) && !defined(__ANDROID__)/defined(__linux__) \&\& !(defined(__ANDROID__) \&\& ! defined(__TERMUX__))/' dlls/ntdll/unix/loader.c
          # 修复2: 跳过 Android JNI 初始化代码（WineActivity pre_exec 等）
          sed -i 's/#ifdef __ANDROID__/#if defined(__ANDROID__) \&\& ! defined(__TERMUX__)/' dlls/ntdll/unix/loader.c
          echo "已排除 Termux 下的 JNI 代码路径"

      - name: 修复 machine-id 路径（适配 Termux glibc）
        run: |
          set -e
          cd ${{ env.WINE_SOURCE_DIR }}/source
          sed -i 's|/etc/machine-id|/data/data/com.termux/files/usr/glibc/etc/machine-id|g' server/token.c
          echo "已修复 machine-id 路径 → /data/data/com.termux/files/usr/glibc/etc/machine-id"

      - name: 强制使用 CC 编译模式（修复 Termux 链接器兼容性）
        run: |
          set -e
          cd ${{ env.WINE_SOURCE_DIR }}/source
          sed -i 's/int using_cc = 0;/int using_cc = 1;/' tools/winebuild/utils.c
          echo "已设置 using_cc 默认值为 1（强制使用编译器模式）"

      # ============================================================
      # 6. 生成 configure
      # ============================================================
      - name: 生成 configure 脚本
        run: |
          cd ${{ env.WINE_SOURCE_DIR }}/source
          if [ ! -f "configure" ]; then
            ./autogen.sh
          fi

      # ============================================================
      # 7. 原生编译 ARM64 WOW64
      # ============================================================
      - name: 原生构建 ARM64 WOW64
        shell: bash
        run: |
          set -e
          set -o pipefail
          cd ${{ env.WINE_SOURCE_DIR }}/source
          mkdir -p build-arm64
          cd build-arm64
          export PATH="/opt/${{ env.LLVMMINGW_NAME }}/bin:$PATH"
          export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
          export PKG_CONFIG_SYSROOT_DIR=/
          export CFLAGS="-O3 -pipe"
          export CXXFLAGS="-O3 -pipe"
          export CROSSCFLAGS="-O3 -pipe"
          export CROSSCXXFLAGS="-O3 -pipe"
          export LDFLAGS="-s"
          export WINE_NLS_DIR=/opt/wine64-native/nls

          ../configure \
            --prefix=/tmp/wine-install-wow64 \
            --with-mingw=clang \
            --enable-archs=aarch64,arm64ec,i386 \
            --enable-tools \
            --disable-tests \
            --with-x \
            --with-vulkan \
            --with-alsa \
            --with-pulse \
            --with-freetype \
            --with-fontconfig \
            --with-gstreamer \
            --with-gettext \
            --with-sdl \
            --enable-nls \
            --disable-win16 \
            --without-capi \
            --without-oss \
            --without-cups \
            --without-dbus \
            --without-coreaudio \
            --without-gphoto \
            --without-osmesa \
            --without-sane \
            --without-pcap \
            --without-pcsclite \
            --without-udev \
            --without-unwind \
            --without-usb \
            --without-v4l2 \
            --without-wayland

          make -s -j$(nproc) 2>&1 | tee build.log
          if [ $? -ne 0 ]; then
              echo "❌ 编译失败，最后 200 行日志："
              tail -n 200 build.log
              exit 1
          fi
          make install
          if [ ! -d /usr/bin ]; then
            echo "错误: /usr/bin 目录不存在，安装可能不完整"
            exit 1
          fi

      # ============================================================
      # 8. 补全运行时文件
      # ============================================================
      - name: 补全运行时文件
        run: |
          set -e
          TARGET_PREFIX="/tmp/wine-install-wow64"
          BUILD_DIR="${{ env.WINE_SOURCE_DIR }}/source/build-arm64"
          SOURCE_DIR="${{ env.WINE_SOURCE_DIR }}/source"
          NATIVE_NLS_DIR="/opt/wine64-native/nls"
          SOURCE_FONTS_DIR="$SOURCE_DIR/fonts"

          echo "=== 补全 share/wine/nls ==="
          mkdir -p "$TARGET_PREFIX/share/wine/nls"
          if [ -d "$NATIVE_NLS_DIR" ]; then
              cp -v "$NATIVE_NLS_DIR"/*.nls "$TARGET_PREFIX/share/wine/nls/" 2>/dev/null || echo "没有找到 .nls 文件，可能已存在"
          fi
          if [ ! -f "$TARGET_PREFIX/share/wine/nls/locale.nls" ] && [ -f "/opt/nls-backup/locale.nls" ]; then
              cp -v "/opt/nls-backup/locale.nls" "$TARGET_PREFIX/share/wine/nls/"
          fi

          echo "=== 补全 share/wine/fonts ==="
          if [ -d "$SOURCE_FONTS_DIR" ]; then
              mkdir -p "$TARGET_PREFIX/share/wine/fonts"
              cp -v "$SOURCE_FONTS_DIR"/*.ttf "$SOURCE_FONTS_DIR"/*.fon "$TARGET_PREFIX/share/wine/fonts/" 2>/dev/null || echo "字体复制完成或无字体文件"
          else
              echo "警告: 源码 fonts 目录不存在，跳过字体复制"
          fi

          echo "=== 补全 wine.inf ==="
          WINE_INF_SRC=$(find "$BUILD_DIR" -name "wine.inf" -type f 2>/dev/null | head -1)
          if [ -z "$WINE_INF_SRC" ]; then
              if [ -f "$SOURCE_DIR/dlls/wine.inf/wine.inf" ]; then
                  WINE_INF_SRC="$SOURCE_DIR/dlls/wine.inf/wine.inf"
              elif [ -f "$SOURCE_DIR/dlls/wine.inf/wine.inf.in" ]; then
                  WINE_INF_SRC="$SOURCE_DIR/dlls/wine.inf/wine.inf.in"
              fi
          fi
          if [ -n "$WINE_INF_SRC" ]; then
              mkdir -p "$TARGET_PREFIX/share/wine"
              cp -v "$WINE_INF_SRC" "$TARGET_PREFIX/share/wine/wine.inf"
          else
              echo "警告: 未找到 wine.inf 文件"
          fi

          echo "=== 补全关键程序文件 ==="
          BIN_DIR="$TARGET_PREFIX/bin"
          mkdir -p "$BIN_DIR"
          PROGRAMS="wine wineserver wineboot winecfg regedit"
          for prog in $PROGRAMS; do
              if [ -f "$BIN_DIR/$prog" ]; then
                  echo "文件 $BIN_DIR/$prog 已存在"
                  continue
              fi
              found=""
              if [[ "$prog" != "wine" && "$prog" != "wineserver" ]]; then
                  found=$(find "$BUILD_DIR/programs" -type f -name "$prog" -executable 2>/dev/null | head -1)
              fi
              if [ -z "$found" ]; then
                  found=$(find "$BUILD_DIR" -type f -name "$prog" -executable 2>/dev/null | head -1)
              fi
              if [ -n "$found" ]; then
                  cp -v "$found" "$BIN_DIR/"
              else
                  echo "错误: 完全未找到 $prog"
                  exit 1
              fi
          done

          echo "=== 复制 syswow64 DLL（i386 Windows PE）==="
          I386_WIN_DIR="$BUILD_DIR/dlls/i386-windows"
          I386_LIB_DIR="$BUILD_DIR/dlls/i386"
          ARM64EC_WIN_DIR="$BUILD_DIR/dlls/arm64ec-windows"

          if [ -d "$ARM64EC_WIN_DIR" ]; then
              mkdir -p "$TARGET_PREFIX/lib/wine/arm64ec-windows"
              cp -v "$ARM64EC_WIN_DIR"/*.dll "$TARGET_PREFIX/lib/wine/arm64ec-windows/" 2>/dev/null || echo "无 arm64ec DLL 或已存在"
          fi
          if [ -d "$I386_WIN_DIR" ]; then
              mkdir -p "$TARGET_PREFIX/lib/wine/i386-windows"
              cp -v "$I386_WIN_DIR"/*.dll "$TARGET_PREFIX/lib/wine/i386-windows/" 2>/dev/null || echo "无额外 DLL 或已存在"
          else
              echo "警告: 未找到 dlls/i386-windows 目录，尝试搜索..."
              found_i386=$(find "$BUILD_DIR" -type d -name "i386-windows" 2>/dev/null | head -1)
              if [ -n "$found_i386" ]; then
                  mkdir -p "$TARGET_PREFIX/lib/wine/i386-windows"
                  cp -v "$found_i386"/*.dll "$TARGET_PREFIX/lib/wine/i386-windows/" 2>/dev/null || echo "复制完成或无额外 DLL"
              fi
          fi
          if [ -d "$I386_LIB_DIR" ]; then
              mkdir -p "$TARGET_PREFIX/lib/wine/i386"
              cp -v "$I386_LIB_DIR"/*.so "$TARGET_PREFIX/lib/wine/i386/" 2>/dev/null || echo "无额外 .so 文件或已存在"
          else
              echo "警告: 未找到 dlls/i386 目录，尝试搜索..."
              found_i386_so=$(find "$BUILD_DIR" -type d -name "i386" -path "*/dlls/i386" 2>/dev/null | head -1)
              if [ -n "$found_i386_so" ]; then
                  mkdir -p "$TARGET_PREFIX/lib/wine/i386"
                  cp -v "$found_i386_so"/*.so "$TARGET_PREFIX/lib/wine/i386/" 2>/dev/null || echo "复制完成或无额外 .so"
              fi
          fi

          if [ -f "$TARGET_PREFIX/bin/wineserver" ]; then
              chmod +x "$TARGET_PREFIX/bin/wineserver"
          fi

          echo "=== 验证关键 WOW64 DLL ==="
          for dll in kernel32.dll user32.dll ntdll.dll; do
              if [ -f "$TARGET_PREFIX/lib/wine/i386-windows/$dll" ]; then
                  echo "✓ $dll 存在"
              else
                  echo "✗ $dll 缺失 - 这可能导致 WOW64 失败"
              fi
          done
          echo "=== 验证目录结构 ==="
          ls -la "$TARGET_PREFIX/lib/wine/" 2>/dev/null || echo "lib/wine 目录不存在"
          ls -la "$TARGET_PREFIX/lib/wine/i386-windows/" 2>/dev/null || echo "i386-windows 目录不存在"
          ls -la "$TARGET_PREFIX/lib/wine/i386/" 2>/dev/null || echo "i386 目录不存在"
          ls -la "$TARGET_PREFIX/lib/wine/arm64ec-windows/" 2>/dev/null || echo "arm64ec-windows 目录不存在"
          ls -la "$BIN_DIR"
          for required in wine wineserver wineboot; do
              if [ ! -f "$BIN_DIR/$required" ] && [ ! -L "$BIN_DIR/$required" ]; then
                  echo "错误: 缺少关键文件 $required"
                  exit 1
              else
                  echo "✓ $required 存在"
              fi
          done
          ls -la "$TARGET_PREFIX/share/wine/" || true
          ls -la "$TARGET_PREFIX/bin/" || true

      # ============================================================
      # 8.5. 修改 ELF interpreter 适配 Termux glibc
      # ============================================================
      - name: 修改 ELF interpreter（适配 Termux glibc 动态链接器路径）
        run: |
          set -e
          TARGET_PREFIX="/tmp/wine-install-wow64"
          TERMUX_LINKER="/data/data/com.termux/files/usr/glibc/lib/ld-linux-aarch64.so.1"

          echo "=== 修改 bin/ 目录下可执行文件的 interpreter ==="
          find "$TARGET_PREFIX/bin" -type f -executable | while read elf; do
              if file "$elf" | grep -q 'ELF.*aarch64'; then
                  echo "  修改: $elf"
                  patchelf --set-interpreter "$TERMUX_LINKER" "$elf"
              fi
          done

          echo "=== 修改 lib/ 目录下 .so 文件的 interpreter ==="
          find "$TARGET_PREFIX/lib" -type f -name "*.so" | while read elf; do
              if file "$elf" | grep -q 'ELF.*aarch64'; then
                  echo "  修改: $elf"
                  patchelf --set-interpreter "$TERMUX_LINKER" "$elf" || true
              fi
          done

          echo "ELF interpreter 已全部修改为 $TERMUX_LINKER"

      # ============================================================
      # 9. 打包与发布
      # ============================================================
      - name: 准备打包
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          mkdir -p wine-package/$PACKAGE_NAME
          cp -r /tmp/wine-install-wow64/* wine-package/$PACKAGE_NAME/

      - name: 创建打包文件
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          tar -cJf $PACKAGE_NAME.tar.xz -C wine-package $PACKAGE_NAME
          ls -lh *.tar.xz

      - name: Generate checksums
        run: |
          sha256sum *.tar.xz > checksums.txt
          cat checksums.txt

      - name: Upload Proton WoW64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Proton-${{ github.event.inputs.proton_branch || 'proton_10.0' }}-ARM64
          path: |
            *.tar.xz
            checksums.txt
          retention-days: 30

      - name: 发布 Proton 到 GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: proton-${{ github.event.inputs.proton_branch || 'proton_10.0' }}-arm64
          name: Proton ${{ github.event.inputs.proton_branch || 'proton_10.0' }} (ARM64 WOW64 for Termux)
          body: |
            # Proton ${{ github.event.inputs.proton_branch || 'proton_10.0' }} - ARM64 WOW64 for Termux
            ## 版本信息
            - **Proton 分支**: ${{ github.event.inputs.proton_branch || 'proton_10.0' }}
            - **主机架构**: ARM64 (aarch64)
            - **目标 Windows 架构**: i386, x86_64, arm64ec (通过 WOW64 模拟)
            - **平台**: Termux (Android)
            - **图形 API**: Vulkan 支持已启用
            - **多媒体**: GStreamer 支持已启用
            - **工具链**: llvm-mingw + 系统 gcc
            ## 特性
            ✓ ARM64 原生 Proton 可执行文件
            ✓ 支持运行 32/64 位 Windows 应用程序
            ✓ Vulkan 渲染
            ✓ GStreamer 多媒体后端
            ✓ 中文环境支持
            ✓ 应用了关键补丁提升兼容性
            ✓ 包含完整的运行时文件：wine.inf、wineboot、wineserver 等所有必要程序
            ✓ 修复了 syswow64 目录为空的问题
            ## 安装说明
            解压后，将 `${{ env.BUILD_NAME }}` 文件夹放置在 Termux 的合适位置（建议 `/data/data/com.termux/files/usr/glibc`），并设置环境变量。
            ## 构建信息
            - 构建时间: ${{ github.event.head_commit.timestamp }}
            - 提交: ${{ github.sha }}
            - 工作流: ${{ github.workflow }}
          files: |
            ${{ github.workspace }}/${{ env.BUILD_NAME }}.tar.xz
            ${{ github.workspace }}/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
