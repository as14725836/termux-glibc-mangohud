name: Wine and Proton жЧ†bootBuilder

on:
  schedule:
    # Proton жЮДеїЇ - жѓПжЬИ1еПЈеТМ15еПЈ
    - cron: '0 0 1,15 * *'
    # Wine жЮДеїЇ - жѓПжЬИ5еПЈеТМ20еПЈ
    - cron: '0 2 5,20 * *'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'йАЙжЛ©жЮДеїЇз±їеЮЛ'
        required: true
        default: 'proton'
        type: choice
        options:
        - proton
        - wine-wow64
      proton_branch:
        description: 'Proton еИЖжФѓ (дїЕ Proton жЮДеїЇ)'
        required: false
        default: 'proton-9.0-arm64ec'
        type: choice
        options:
        - proton-9.0-arm64ec
        - proton_9.0
        - experimental_10.0
        - bleeding-edge
      wine_branch:
        description: 'Wine еИЖжФѓ (дїЕ Wine жЮДеїЇ)'
        required: false
        default: 'staging'
        type: choice
        options:
        - vanilla
        - staging
        - staging-tkg
        - staging-tkg-fsync
      wine_version:
        description: 'Wine зЙИжЬђ (дїЕ Wine жЮДеїЇ)'
        required: false
        default: 'latest'
        type: string

env:
  USE_CCACHE: true
  BUILD_DIR: /tmp/build_wine

permissions:
  contents: write

jobs:
  build-proton:
    runs-on: ubuntu-24.04
    if: github.event.inputs.build_type == 'proton' || (github.event_name == 'schedule' && github.event.schedule == '0 0 1,15 * *')
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: еЃЙи£ЕжЮДеїЇдЊЭиµЦ
        run: |
          sudo apt update
          sudo apt --fix-broken install -y

          BASE_DEPS="\
            debootstrap \
            perl \
            git \
            wget \
            xz-utils \
            bubblewrap \
            autoconf \
            flex \
            bison \
            gcc-multilib \
            g++-multilib \
            libx11-dev \
            libxext-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxfixes-dev \
            libxxf86vm-dev \
            libxrender-dev \
            libxinerama-dev \
            libgl-dev \
            libsdl2-dev \
            libglu-dev \
            libosmesa6-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libpcap-dev \
            libdbus-1-dev \
            libssl-dev \
            libasound2-dev \
            libpulse-dev \
            libudev-dev \
            libcups2-dev \
            libjpeg-dev \
            libpng-dev \
            libtiff-dev \
            libxml2-dev \
            libvulkan-dev \
            vulkan-tools \
            libvulkan1 \
            mesa-vulkan-drivers \
            mingw-w64 \
            gettext \
            libgettextpo-dev \
            locales \
            language-pack-zh-hans"

          sudo apt install -y $BASE_DEPS

      - name: еЃЙи£Ее§Ъе™ТдљУеТМйЯ≥йҐСдЊЭиµЦ
        run: |
          sudo apt update
          sudo apt install -y \
            libunwind-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-* \
            libmpg123-dev \
            libopenal-dev

      - name: иЃЊзљЃдЄ≠жЦЗиѓ≠и®АзОѓеҐГ
        run: |
          sudo locale-gen zh_CN.UTF-8
          sudo update-locale LANG=zh_CN.UTF-8
          export LANG=zh_CN.UTF-8
          export LC_ALL=zh_CN.UTF-8

      - name: жЮДеїЇ Proton WOW64 зЙИжЬђ
        run: |
          set -e

          echo "еЉАеІЛжЮДеїЇ Proton WOW64 зЙИжЬђ..."
          echo "еИЖжФѓ: ${{ github.event.inputs.proton_branch || 'proton-9.0-arm64ec' }}"

          export LANG=zh_CN.UTF-8
          export LC_ALL=zh_CN.UTF-8
          export LANGUAGE=zh_CN:zh:en_US:en

          rm -rf $BUILD_DIR/proton
          mkdir -p $BUILD_DIR/proton
          cd $BUILD_DIR/proton

          git clone https://github.com/Pipetto-crypto/wine.git wine
          cd wine
          git checkout "proton-9.0-arm64ec"

          PROTON_BRANCH="${{ github.event.inputs.proton_branch || 'proton-9.0-arm64ec' }}"
          echo "еИЗжНҐеИ∞еИЖжФѓ: $PROTON_BRANCH"
          git checkout $PROTON_BRANCH

          echo "дњЃе§Н Termux иЈѓеЊДйЧЃйҐШ..."
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) -exec grep -l "/tmp" {} \; | xargs sed -i 's|/tmp/|/data/data/com.termux/files/usr/tmp/|g'
          find server -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} +
          find . -name "file.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} +
          find . -name "loader.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} +
          find . -name "server.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} +

          echo "дњЃе§Н memfd иЈѓеЊДйЧЃйҐШ..."
          sed -i '/pread( fd, map_addr, size, offset );/a\    \n    /* After falling back to read(), set executable permission if needed */\n    if (vprot \& VPROT_EXEC)\n        mprotect( map_addr, map_size, PROT_READ | PROT_EXEC );' dlls/ntdll/unix/virtual.c

          echo "дњЃе§Н crypt32 ж†єиѓБдє¶еК†иљљ..."
          python3 << 'PYTHON_SCRIPT'
          import re

          with open('dlls/crypt32/unixlib.c', 'r') as f:
              content = f.read()

          # 1. еЬ® CRYPT_knownLocations жХ∞зїДжЬЂе∞ЊжЈїеК† Termux иЈѓеЊД
          array_pattern = r'(static const char\* CRYPT_knownLocations\[\] = \{)([^}]*)(\};)'
          termux_path = '  "/data/data/com.termux/files/usr/glibc/etc/ca-certificates/cacert.pem",\n'

          def add_path(match):
              before, middle, after = match.group(1), match.group(2), match.group(3)
              if 'termux' not in middle.lower():
                  return before + middle + termux_path + after
              return match.group(0)

          content = re.sub(array_pattern, add_path, content, flags=re.DOTALL)

          # 2. еИ†йЩ§ macOS дї£з†БеЭЧеПКеЕґеѓєеЇФзЪД #endif
          lines = content.splitlines(keepends=True)
          new_lines = []
          i = 0
          while i < len(lines):
              line = lines[i]
              if '#ifdef __APPLE__' in line:
                  depth = 1
                  i += 1
                  while i < len(lines) and depth > 0:
                      if '#ifdef __APPLE__' in lines[i]:
                          depth += 1
                      elif '#endif' in lines[i]:
                          depth -= 1
                          if depth == 0:
                              i += 1
                              break
                      i += 1
                  continue
              new_lines.append(line)
              i += 1
          content = ''.join(new_lines)

          # 3. жЫњжНҐ load_root_certs еЗљжХ∞
          old_func_pattern = r'static void load_root_certs\(void\)\s*\n\{.*?\n\}'
          new_func = '''static void load_root_certs(void)
          {
              unsigned int i;
              const char *cert_path = getenv("WINE_CA_CERT_PATH");

              if (cert_path)
                  import_certs_from_path(cert_path, TRUE);

              if (list_empty(&root_cert_list)) {
                  for (i = 0; i < ARRAY_SIZE(CRYPT_knownLocations); i++) {
                      import_certs_from_path(CRYPT_knownLocations[i], TRUE);
                  }
              }
          }'''
          content = re.sub(old_func_pattern, new_func, content, flags=re.DOTALL)

          # 4. еИ†йЩ§ WINE_ADDITIONAL_CERTS_DIR зЫЄеЕ≥дї£з†Б
          content = re.sub(
              r'\n?\s*if\s*\(\s*\(additional_dir\s*=\s*getenv\(\s*"WINE_ADDITIONAL_CERTS_DIR"\s*\)\s*\)\s*\)\s*\n\s+import_certs_from_path\(\s*additional_dir\s*,\s*TRUE\s*\)\s*;',
              '',
              content
          )

          # 5. жЄЕзРЖе§ЪдљЩз©Їи°М
          content = re.sub(r'\n{3,}', '\n\n', content)

          with open('dlls/crypt32/unixlib.c', 'w') as f:
              f.write(content)

          print("crypt32 дњЃе§НеЃМжИР")
          PYTHON_SCRIPT

          echo "зФЯжИР configure иДЪжЬђ..."
          ./autogen.sh

          mkdir -p build-wow64
          cd build-wow64

          export CROSSCC="x86_64-w64-mingw32-gcc"
          export CROSSCXX="x86_64-w64-mingw32-g++"
          export CFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CXXFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CROSSCFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CROSSCXXFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"

          ../configure \
            --enable-win64 \
            --enable-archs=i386,x86_64 \
            --prefix=/tmp/wine-install-proton \
            --with-x \
            --with-vulkan \
            --with-alsa \
            --with-pulse \
            --with-freetype \
            --with-fontconfig \
            --with-gstreamer \
            --with-gettext \
            --with-sdl \
            --enable-nls \
            --disable-winemenubuilder \
            --disable-win16 \
            --disable-tests \
            --without-ldap \
            --without-capi \
            --without-oss \
            --without-cups \
            --without-dbus \
            --without-coreaudio \
            --without-gphoto \
            --without-osmesa \
            --without-sane \
            --without-pcap \
            --without-pcsclite \
            --without-udev \
            --without-unwind \
            --without-usb \
            --without-v4l2 \
            --without-wayland

          echo "еЉАеІЛжЮДеїЇжФѓжМБ Vulkan еТМеЃМжХі GStreamer зЪД WOW64 Proton..."
          make -j$(nproc)
          make install

          cd ../..

          VERSION_PROTON=$(cd wine && git describe --tags --abbrev=0 2>/dev/null || echo "$PROTON_BRANCH")
          COMMIT_HASH=$(cd wine && git rev-parse --short HEAD)
          PROTON_VERSION="${VERSION_PROTON}-${COMMIT_HASH}"
          echo "PROTON_VERSION=$PROTON_VERSION" >> $GITHUB_ENV
          echo "BUILD_NAME=proton-${PROTON_VERSION}-wow64" >> $GITHUB_ENV

      - name: еЗЖе§ЗжЙУеМЕ
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          mkdir -p wine-package/$PACKAGE_NAME
          cp -r /tmp/wine-install-proton/* wine-package/$PACKAGE_NAME/

      - name: еИЫеїЇжЙУеМЕжЦЗдїґ
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          tar -cJf $PACKAGE_NAME.tar.xz -C wine-package $PACKAGE_NAME
          ls -lh *.tar.xz

      - name: Generate checksums
        run: |
          sha256sum *.tar.xz > checksums.txt
          cat checksums.txt

      - name: Upload Proton artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Proton-${{ github.event.inputs.proton_branch || 'proton_10.0' }}-WoW64
          path: |
            ${{ github.workspace }}/*.tar.xz
            ${{ github.workspace }}/checksums.txt
          retention-days: 30

      - name: еПСеЄГ Proton еИ∞ GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'proton'
        with:
          tag_name: proton-${{ github.event.inputs.proton_branch || 'proton_10.0' }}-wow64
          name: Proton ${{ github.event.inputs.proton_branch || 'proton_10.0' }} (WOW64 with Vulkan & GStreamer for Termux)
          body: |
            # Proton ${{ github.event.inputs.proton_branch || 'proton_10.0' }} - WOW64 with Vulkan & GStreamer for Termux

            ## зЙИжЬђдњ°жБѓ
            - **Proton еИЖжФѓ**: ${{ github.event.inputs.proton_branch || 'proton_10.0' }}
            - **жЮґжЮД**: True WOW64 (еРМжЧґжФѓжМБ 32 дљНеТМ 64 дљН Windows еЇФзФ®з®ЛеЇП)
            - **еє≥еП∞**: Termux (Android)
            - **еЫЊељҐ API**: Vulkan жФѓжМБеЈ≤еРѓзФ®
            - **е§Ъе™ТдљУ**: еЃМжХі GStreamer жФѓжМБ

            ## зЙєжАІ
            вЬУ зЬЯж≠£зЪД WOW64 жЮґжЮД
            вЬУ еРМжЧґжФѓжМБ 32 дљНеТМ 64 дљН Windows еЇФзФ®з®ЛеЇП
            вЬУ Vulkan еЫЊељҐ API жФѓжМБ
            вЬУ еЃМжХізЪД GStreamer жФѓжМБ
            вЬУ дЄ≠жЦЗзОѓеҐГжФѓжМБ
            вЬУ еЯЇдЇО Valve ProtonпЉМдЄУдЄЇжЄЄжИПдЉШеМЦ

            ## еЃЙи£ЕиѓіжШО
            иІ£еОЛеРОпЉМе∞Ж `${{ env.BUILD_NAME }}` жЦЗдїґе§єжФЊзљЃеЬ® Termux зЪДеРИйАВдљНзљЃпЉМеєґиЃЊзљЃзОѓеҐГеПШйЗПгАВ

            ## жЮДеїЇдњ°жБѓ
            - жЮДеїЇжЧґйЧі: ${{ github.event.head_commit.timestamp }}
            - жПРдЇ§: ${{ github.sha }}
            - еЈ•дљЬжµБ: ${{ github.workflow }}
          files: |
            ${{ github.workspace }}/${{ env.BUILD_NAME }}.tar.xz
            ${{ github.workspace }}/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-wine-wow64:
    runs-on: ubuntu-24.04
    if: github.event.inputs.build_type == 'wine-wow64' || (github.event_name == 'schedule' && github.event.schedule == '0 2 5,20 * *')
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: еЃЙи£ЕжЮДеїЇдЊЭиµЦ
        run: |
          sudo apt update
          sudo apt --fix-broken install -y

          BASE_DEPS="\
            debootstrap \
            perl \
            git \
            wget \
            xz-utils \
            bubblewrap \
            autoconf \
            flex \
            bison \
            gcc-multilib \
            g++-multilib \
            libx11-dev \
            libxext-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxfixes-dev \
            libxxf86vm-dev \
            libxrender-dev \
            libxinerama-dev \
            libgl-dev \
            libsdl2-dev \
            libglu-dev \
            libosmesa6-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libpcap-dev \
            libdbus-1-dev \
            libssl-dev \
            libasound2-dev \
            libpulse-dev \
            libudev-dev \
            libcups2-dev \
            libjpeg-dev \
            libpng-dev \
            libtiff-dev \
            libxml2-dev \
            libvulkan-dev \
            vulkan-tools \
            libvulkan1 \
            mesa-vulkan-drivers \
            mingw-w64 \
            gettext \
            libgettextpo-dev \
            locales \
            language-pack-zh-hans"

          sudo apt install -y $BASE_DEPS

      - name: еЃЙи£Ее§Ъе™ТдљУеТМйЯ≥йҐСдЊЭиµЦ
        run: |
          sudo apt update
          sudo apt install -y \
            libunwind-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-good1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            gstreamer1.0-pulseaudio \
            gstreamer1.0-alsa \
            gstreamer1.0-gl \
            gstreamer1.0-qt5 \
            gstreamer1.0-gtk3 \
            libmpg123-dev \
            libopenal-dev \
            libfaad-dev \
            libflac-dev \
            libvorbis-dev \
            libx264-dev \
            libx265-dev \
            libvpx-dev \
            libtheora-dev

      - name: иЃЊзљЃдЄ≠жЦЗиѓ≠и®АзОѓеҐГ
        run: |
          sudo locale-gen zh_CN.UTF-8
          sudo update-locale LANG=zh_CN.UTF-8
          export LANG=zh_CN.UTF-8
          export LC_ALL=zh_CN.UTF-8

      - name: жЮДеїЇ Wine WOW64 зЙИжЬђ
        run: |
          set -e

          export WINE_BRANCH="${{ github.event.inputs.wine_branch || 'staging' }}"
          export WINE_VERSION="${{ github.event.inputs.wine_version || 'latest' }}"
          export BUILD_DIR="/tmp/build_wine_${WINE_BRANCH}_${WINE_VERSION}"

          echo "еЉАеІЛжЮДеїЇ Wine WOW64 зЙИжЬђ..."
          echo "еИЖжФѓ: $WINE_BRANCH"
          echo "зЙИжЬђ: $WINE_VERSION"

          export LANG=zh_CN.UTF-8
          export LC_ALL=zh_CN.UTF-8
          export LANGUAGE=zh_CN:zh:en_US:en

          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR"
          cd "$BUILD_DIR"

          if [ "$WINE_BRANCH" = "staging-tkg" ] || [ "$WINE_BRANCH" = "staging-tkg-fsync" ]; then
            echo "е§ДзРЖ TKG з≥їеИЧеИЖжФѓ: $WINE_BRANCH"

            if [ "$WINE_BRANCH" = "staging-tkg" ]; then
              git clone https://github.com/Kron4ek/wine-tkg.git wine-tkg
              SOURCE_DIR="wine-tkg"
            else
              git clone https://github.com/Kron4ek/wine-tkg.git wine-tkg -b fsync
              SOURCE_DIR="wine-tkg"
            fi

            cd "$SOURCE_DIR"

            if [ "$WINE_VERSION" != "latest" ]; then
              git checkout "$WINE_VERSION" 2>/dev/null || git checkout "wine-$WINE_VERSION" 2>/dev/null || true
            fi

            if [ -f "VERSION" ]; then
              WINE_VERSION_ACTUAL="$(cat VERSION | tail -c +14)"
            else
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
            fi

            COMMIT_HASH=$(git rev-parse --short HEAD)
            BUILD_NAME="wine-${WINE_VERSION_ACTUAL}-${WINE_BRANCH}-wow64"

          elif [ "$WINE_BRANCH" = "staging" ]; then
            echo "е§ДзРЖ Staging еИЖжФѓ"
            git clone https://github.com/wine-mirror/wine.git wine
            SOURCE_DIR="wine"
            cd "$SOURCE_DIR"

            git config advice.detachedHead false

            if [ "$WINE_VERSION" != "latest" ]; then
              git checkout "wine-$WINE_VERSION"
            fi

            WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
            COMMIT_HASH=$(git rev-parse --short HEAD)
            BUILD_NAME="wine-${WINE_VERSION_ACTUAL}-${COMMIT_HASH}-staging-wow64"

            PURE_VERSION=$(echo "$WINE_VERSION_ACTUAL" | sed 's/^wine-//')
            STAGING_VERSION="v${PURE_VERSION}"

            wget -O "wine-staging-${PURE_VERSION}.tar.gz" "https://github.com/wine-staging/wine-staging/archive/refs/tags/${STAGING_VERSION}.tar.gz" || \
            wget -O "wine-staging-${PURE_VERSION}.tar.gz" "https://github.com/wine-staging/wine-staging/archive/refs/tags/v${PURE_VERSION}.tar.gz"

            if [ -f "wine-staging-${PURE_VERSION}.tar.gz" ]; then
              tar -xzf "wine-staging-${PURE_VERSION}.tar.gz"

              if [ -d "wine-staging-${PURE_VERSION}" ]; then
                cd "wine-staging-${PURE_VERSION}/staging"
                chmod +x patchinstall.py
                ./patchinstall.py --all --destdir=../../
                cd "../.."
              elif [ -d "wine-staging-v${PURE_VERSION}" ]; then
                cd "wine-staging-v${PURE_VERSION}/staging"
                chmod +x patchinstall.py
                ./patchinstall.py --all --destdir=../../
                cd "../.."
              fi
            fi

          elif [ "$WINE_BRANCH" = "vanilla" ]; then
            echo "е§ДзРЖ Vanilla еИЖжФѓ"
            git clone https://github.com/wine-mirror/wine.git wine
            SOURCE_DIR="wine"
            cd "$SOURCE_DIR"

            git config advice.detachedHead false

            if [ "$WINE_VERSION" != "latest" ]; then
              git checkout "wine-$WINE_VERSION"
            fi

            WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
            COMMIT_HASH=$(git rev-parse --short HEAD)
            BUILD_NAME="wine-${WINE_VERSION_ACTUAL}-${COMMIT_HASH}-vanilla-wow64"
          else
            echo "жЬ™зЯ•зЪД Wine еИЖжФѓ: $WINE_BRANCH"
            exit 1
          fi

          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "ељУеЙНжЇРз†БзЫЃељХ: $(pwd)"
          echo "жЮДеїЇеРНзІ∞: $BUILD_NAME"

          echo "дњЃе§Н Termux иЈѓеЊДйЧЃйҐШ..."
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) -exec grep -l "/tmp" {} \; | xargs sed -i 's|/tmp/|/data/data/com.termux/files/usr/tmp/|g'
          find server -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} +
          find . -name "file.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} +
          find . -name "loader.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} +
          find . -name "server.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} +

          echo "дњЃе§Н memfd иЈѓеЊДйЧЃйҐШ..."
          sed -i '/pread( fd, map_addr, size, offset );/a\    \n    /* After falling back to read(), set executable permission if needed */\n    if (vprot \& VPROT_EXEC)\n        mprotect( map_addr, map_size, PROT_READ | PROT_EXEC );' dlls/ntdll/unix/virtual.c

          echo "дњЃе§Н crypt32 ж†єиѓБдє¶еК†иљљ..."
          python3 << 'PYTHON_SCRIPT'
          import re

          with open('dlls/crypt32/unixlib.c', 'r') as f:
              content = f.read()

          # 1. еЬ® CRYPT_knownLocations жХ∞зїДжЬЂе∞ЊжЈїеК† Termux иЈѓеЊД
          array_pattern = r'(static const char\* CRYPT_knownLocations\[\] = \{)([^}]*)(\};)'
          termux_path = '  "/data/data/com.termux/files/usr/glibc/etc/ca-certificates/cacert.pem",\n'

          def add_path(match):
              before, middle, after = match.group(1), match.group(2), match.group(3)
              if 'termux' not in middle.lower():
                  return before + middle + termux_path + after
              return match.group(0)

          content = re.sub(array_pattern, add_path, content, flags=re.DOTALL)

          # 2. еИ†йЩ§ macOS дї£з†БеЭЧеПКеЕґеѓєеЇФзЪД #endif
          lines = content.splitlines(keepends=True)
          new_lines = []
          i = 0
          while i < len(lines):
              line = lines[i]
              if '#ifdef __APPLE__' in line:
                  depth = 1
                  i += 1
                  while i < len(lines) and depth > 0:
                      if '#ifdef __APPLE__' in lines[i]:
                          depth += 1
                      elif '#endif' in lines[i]:
                          depth -= 1
                          if depth == 0:
                              i += 1
                              break
                      i += 1
                  continue
              new_lines.append(line)
              i += 1
          content = ''.join(new_lines)

          # 3. жЫњжНҐ load_root_certs еЗљжХ∞
          old_func_pattern = r'static void load_root_certs\(void\)\s*\n\{.*?\n\}'
          new_func = '''static void load_root_certs(void)
          {
              unsigned int i;
              const char *cert_path = getenv("WINE_CA_CERT_PATH");

              if (cert_path)
                  import_certs_from_path(cert_path, TRUE);

              if (list_empty(&root_cert_list)) {
                  for (i = 0; i < ARRAY_SIZE(CRYPT_knownLocations); i++) {
                      import_certs_from_path(CRYPT_knownLocations[i], TRUE);
                  }
              }
          }'''
          content = re.sub(old_func_pattern, new_func, content, flags=re.DOTALL)

          # 4. еИ†йЩ§ WINE_ADDITIONAL_CERTS_DIR зЫЄеЕ≥дї£з†Б
          content = re.sub(
              r'\n?\s*if\s*\(\s*\(additional_dir\s*=\s*getenv\(\s*"WINE_ADDITIONAL_CERTS_DIR"\s*\)\s*\)\s*\)\s*\n\s+import_certs_from_path\(\s*additional_dir\s*,\s*TRUE\s*\)\s*;',
              '',
              content
          )

          # 5. жЄЕзРЖе§ЪдљЩз©Їи°М
          content = re.sub(r'\n{3,}', '\n\n', content)

          with open('dlls/crypt32/unixlib.c', 'w') as f:
              f.write(content)

          print("crypt32 дњЃе§НеЃМжИР")
          PYTHON_SCRIPT

          PURE_VERSION=$(echo "$WINE_VERSION_ACTUAL" | sed 's/^wine-//')
          VERSION_MAJOR=$(echo "$PURE_VERSION" | cut -d. -f1)
          VERSION_MINOR=$(echo "$PURE_VERSION" | cut -d. -f2)

          echo "Wine зЙИжЬђ: $WINE_VERSION_ACTUAL"
          echo "зЇѓзЙИжЬђеПЈ: $PURE_VERSION"
          echo "дЄїзЙИжЬђ: $VERSION_MAJOR, жђ°зЙИжЬђ: $VERSION_MINOR"

          if [ "$VERSION_MAJOR" -gt 9 ] || [ "$VERSION_MAJOR" -eq 9 -a "$VERSION_MINOR" -ge 10 ]; then
            echo "дљњзФ® 9.10+ зЙИжЬђзЪДдњЃе§НжЦєеЉП (wine_do_not_create_dxgi_manager2.patch)"
            wget https://github.com/afeimod/linbox/raw/main/path/wine_do_not_create_dxgi_manager2.patch
            if [ -f "dlls/mfplat/main.c" ]; then
              echo "жЙЊеИ∞зЫЃж†ЗжЦЗдїґ dlls/mfplat/main.cпЉМеЗЖе§ЗеЇФзФ®и°•дЄБ..."
              if patch -p1 < wine_do_not_create_dxgi_manager2.patch; then
                echo "вЬЕ и°•дЄБеЇФзФ®жИРеКЯ"
              else
                echo "вЭМ и°•дЄБеЇФзФ®е§±иі•"
                exit 1
              fi
            else
              echo "вЭМ йФЩиѓѓпЉЪзЫЃж†ЗжЦЗдїґ dlls/mfplat/main.c дЄНе≠ШеЬ®"
              exit 1
            fi
          else
            echo "дљњзФ® 9.10 дї•дЄЛзЙИжЬђзЪДдњЃе§НжЦєеЉП (fix_wine9.2_mfplat.sh)"
            wget -O fix_wine9.2_mfplat.sh https://github.com/afeimod/linbox/raw/main/path/fix_wine9.2_mfplat.sh
            chmod +x fix_wine9.2_mfplat.sh
            ./fix_wine9.2_mfplat.sh
            echo "вЬЕ 9.10 дї•дЄЛзЙИжЬђдњЃе§НеЃМжИР"
          fi

          mkdir -p build-wow64
          cd build-wow64

          export CROSSCC="x86_64-w64-mingw32-gcc"
          export CROSSCXX="x86_64-w64-mingw32-g++"
          export CFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CXXFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CROSSCFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CROSSCXXFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"

          ../configure \
            --enable-win64 \
            --enable-archs=i386,x86_64 \
            --prefix=/tmp/wine-install-wow64 \
            --with-x \
            --with-vulkan \
            --with-alsa \
            --with-pulse \
            --with-freetype \
            --with-fontconfig \
            --with-gstreamer \
            --with-gettext \
            --with-sdl \
            --enable-nls \
            --disable-winemenubuilder \
            --disable-win16 \
            --disable-tests \
            --without-ldap \
            --without-capi \
            --without-oss \
            --without-cups \
            --without-dbus \
            --without-coreaudio \
            --without-gphoto \
            --without-osmesa \
            --without-sane \
            --without-pcap \
            --without-pcsclite \
            --without-udev \
            --without-unwind \
            --without-usb \
            --without-v4l2 \
            --without-wayland

          echo "еЉАеІЛжЮДеїЇжФѓжМБ Vulkan еТМеЃМжХі GStreamer зЪД WOW64 Wine..."
          make -j$(nproc)
          make install

      - name: еЗЖе§ЗжЙУеМЕ
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          mkdir -p wine-package/$PACKAGE_NAME
          cp -r /tmp/wine-install-wow64/* wine-package/$PACKAGE_NAME/

      - name: еИЫеїЇжЙУеМЕжЦЗдїґ
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          tar -cJf $PACKAGE_NAME.tar.xz -C wine-package $PACKAGE_NAME
          ls -lh *.tar.xz

      - name: Generate checksums
        run: |
          sha256sum *.tar.xz > checksums.txt
          cat checksums.txt

      - name: Upload Wine WoW64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Wine-${{ github.event.inputs.wine_branch || 'staging' }}-${{ github.event.inputs.wine_version || 'latest' }}-WoW64
          path: |
            ${{ github.workspace }}/*.tar.xz
            ${{ github.workspace }}/checksums.txt
          retention-days: 30

      - name: еПСеЄГ Wine еИ∞ GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'wine-wow64'
        with:
          tag_name: wine-${{ github.event.inputs.wine_branch || 'staging' }}-${{ github.event.inputs.wine_version || 'latest' }}-wow64
          name: Wine ${{ github.event.inputs.wine_branch || 'staging' }} ${{ github.event.inputs.wine_version || 'latest' }} (WOW64 with Vulkan & GStreamer for Termux)
          body: |
            # Wine ${{ github.event.inputs.wine_branch || 'staging' }} ${{ github.event.inputs.wine_version || 'latest' }} - WOW64 with Vulkan & GStreamer for Termux

            ## зЙИжЬђдњ°жБѓ
            - **Wine еИЖжФѓ**: ${{ github.event.inputs.wine_branch || 'staging' }}
            - **Wine зЙИжЬђ**: ${{ github.event.inputs.wine_version || 'latest' }}
            - **жЮґжЮД**: True WOW64 (еРМжЧґжФѓжМБ 32 дљНеТМ 64 дљН Windows еЇФзФ®з®ЛеЇП)
            - **еє≥еП∞**: Termux (Android)
            - **еЫЊељҐ API**: Vulkan жФѓжМБеЈ≤еРѓзФ®
            - **е§Ъе™ТдљУ**: еЃМжХі GStreamer жФѓжМБ

            ## зЙєжАІ
            вЬУ зЬЯж≠£зЪД WOW64 жЮґжЮД
            вЬУ еРМжЧґжФѓжМБ 32 дљНеТМ 64 дљН Windows еЇФзФ®з®ЛеЇП
            вЬУ Vulkan еЫЊељҐ API жФѓжМБ
            вЬУ еЃМжХізЪД GStreamer жФѓжМБ
            вЬУ дЄ≠жЦЗзОѓеҐГжФѓжМБ
            вЬУ еЇФзФ®дЇЖеЕ≥йФЃи°•дЄБжПРеНЗеЕЉеЃєжАІ

            ## еЃЙи£ЕиѓіжШО
            иІ£еОЛеРОпЉМе∞Ж `${{ env.BUILD_NAME }}` жЦЗдїґе§єжФЊзљЃеЬ® Termux зЪДеРИйАВдљНзљЃпЉМеєґиЃЊзљЃзОѓеҐГеПШйЗПгАВ

            ## жЮДеїЇдњ°жБѓ
            - жЮДеїЇжЧґйЧі: ${{ github.event.head_commit.timestamp }}
            - жПРдЇ§: ${{ github.sha }}
            - еЈ•дљЬжµБ: ${{ github.workflow }}
          files: |
            ${{ github.workspace }}/${{ env.BUILD_NAME }}.tar.xz
            ${{ github.workspace }}/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
