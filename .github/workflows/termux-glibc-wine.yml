name: Wine and Proton 无bootBuilder

on:
  schedule:
    # Proton 构建 - 每月1号和15号
    - cron: '0 0 1,15 * *'
    # Wine 构建 - 每月5号和20号
    - cron: '0 2 5,20 * *'
  workflow_dispatch:
    inputs:
      build_type:
        description: '选择构建类型'
        required: true
        default: 'proton'
        type: choice
        options:
        - proton
        - wine-wow64
      proton_branch:
        description: 'Proton 分支 (仅 Proton 构建)'
        required: false
        default: 'proton-9.0-arm64ec'
        type: choice
        options:
        - proton-9.0-arm64ec
        - proton_9.0
        - experimental_10.0
        - bleeding-edge
      wine_branch:
        description: 'Wine 分支 (仅 Wine 构建)'
        required: false
        default: 'staging'
        type: choice
        options:
        - vanilla
        - staging
        - staging-tkg
        - staging-tkg-fsync
      wine_version:
        description: 'Wine 版本 (仅 Wine 构建)'
        required: false
        default: 'latest'
        type: string

env:
  USE_CCACHE: true
  BUILD_DIR: /tmp/build_wine

permissions:
  contents: write

jobs:
  build-proton:
    runs-on: ubuntu-24.04
    if: github.event.inputs.build_type == 'proton' || (github.event_name == 'schedule' && github.event.schedule == '0 0 1,15 * *')
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: 安装构建依赖
        run: |
          sudo apt update
          sudo apt --fix-broken install -y

          BASE_DEPS="\
            debootstrap \
            perl \
            git \
            wget \
            xz-utils \
            bubblewrap \
            autoconf \
            flex \
            bison \
            gcc-multilib \
            g++-multilib \
            libx11-dev \
            libxext-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxfixes-dev \
            libxxf86vm-dev \
            libxrender-dev \
            libxinerama-dev \
            libgl-dev \
            libsdl2-dev \
            libglu-dev \
            libosmesa6-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libpcap-dev \
            libdbus-1-dev \
            libssl-dev \
            libasound2-dev \
            libpulse-dev \
            libudev-dev \
            libcups2-dev \
            libjpeg-dev \
            libpng-dev \
            libtiff-dev \
            libxml2-dev \
            libvulkan-dev \
            vulkan-tools \
            libvulkan1 \
            mesa-vulkan-drivers \
            mingw-w64 \
            gettext \
            libgettextpo-dev \
            locales \
            language-pack-zh-hans"

          sudo apt install -y $BASE_DEPS

      - name: 安装多媒体和音频依赖
        run: |
          sudo apt update
          sudo apt install -y \
            libunwind-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-* \
            libmpg123-dev \
            libopenal-dev

      - name: 设置中文语言环境
        run: |
          sudo locale-gen zh_CN.UTF-8
          sudo update-locale LANG=zh_CN.UTF-8
          export LANG=zh_CN.UTF-8
          export LC_ALL=zh_CN.UTF-8

      - name: 构建 Proton WOW64 版本
        run: |
          set -e

          echo "开始构建 Proton WOW64 版本..."
          echo "分支: ${{ github.event.inputs.proton_branch || 'proton-9.0-arm64ec' }}"

          export LANG=zh_CN.UTF-8
          export LC_ALL=zh_CN.UTF-8
          export LANGUAGE=zh_CN:zh:en_US:en

          rm -rf $BUILD_DIR/proton
          mkdir -p $BUILD_DIR/proton
          cd $BUILD_DIR/proton

          git clone https://github.com/Pipetto-crypto/wine.git wine
          cd wine
          git checkout "proton-9.0-arm64ec"

          PROTON_BRANCH="${{ github.event.inputs.proton_branch || 'proton-9.0-arm64ec' }}"
          echo "切换到分支: $PROTON_BRANCH"
          git checkout $PROTON_BRANCH

          echo "修复 Termux 路径问题..."
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) -exec grep -l "/tmp" {} \; | xargs sed -i 's|/tmp/|/data/data/com.termux/files/usr/tmp/|g'
          find server -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} +
          find . -name "file.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} +
          find . -name "loader.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} +
          find . -name "server.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} +

          echo "修复 memfd 路径问题..."
          sed -i '/pread( fd, map_addr, size, offset );/a\    \n    /* After falling back to read(), set executable permission if needed */\n    if (vprot \& VPROT_EXEC)\n        mprotect( map_addr, map_size, PROT_READ | PROT_EXEC );' dlls/ntdll/unix/virtual.c

          echo "修复 crypt32 根证书加载..."
          python3 << 'PYTHON_SCRIPT'
          import re

          with open('dlls/crypt32/unixlib.c', 'r') as f:
              lines = f.readlines()

          # 1. 在 CRYPT_knownLocations 数组末尾添加 Termux 路径
          in_array = False
          array_end = -1
          for i, line in enumerate(lines):
              if 'static const char* CRYPT_knownLocations[] = {' in line:
                  in_array = True
              if in_array and line.strip() == '};':
                  array_end = i
                  break

          if array_end != -1:
              lines.insert(array_end, '  "/data/data/com.termux/files/usr/glibc/etc/ca-certificates/cacert.pem",\n')

          # 2. 删除 macOS 代码块
          new_lines = []
          skip_until = -1
          for i, line in enumerate(lines):
              if skip_until > i:
                  continue
              if '#ifdef __APPLE__' in line:
                  depth = 1
                  j = i + 1
                  while j < len(lines) and depth > 0:
                      if '#ifdef __APPLE__' in lines[j] or '#ifndef __APPLE__' in lines[j]:
                          depth += 1
                      elif '#endif' in lines[j]:
                          depth -= 1
                      j += 1
                  skip_until = j - 1
                  continue
              new_lines.append(line)
          lines = new_lines

          # 3. 修改 load_root_certs 函数
          in_func = False
          func_start = -1
          func_end = -1
          brace_count = 0

          for i, line in enumerate(lines):
              if 'static void load_root_certs(void)' in line:
                  func_start = i
                  in_func = True
              if in_func:
                  brace_count += line.count('{')
                  brace_count -= line.count('}')
                  if brace_count == 0 and func_start != -1 and i > func_start:
                      func_end = i
                      break

          if func_start != -1 and func_end != -1:
              new_func = [
                  'static void load_root_certs(void)\n',
                  '{\n',
                  '    unsigned int i;\n',
                  '    const char *cert_path = getenv("WINE_CA_CERT_PATH");\n',
                  '    \n',
                  '    if (cert_path)\n',
                  '        import_certs_from_path(cert_path, TRUE);\n',
                  '    \n',
                  '    if (list_empty(&root_cert_list)) {\n',
                  '        for (i = 0; i < ARRAY_SIZE(CRYPT_knownLocations); i++) {\n',
                  '            import_certs_from_path(CRYPT_knownLocations[i], TRUE);\n',
                  '        }\n',
                  '    }\n',
                  '}\n'
              ]
              lines = lines[:func_start] + new_func + lines[func_end+1:]

          # 4. 删除 WINE_ADDITIONAL_CERTS_DIR 相关代码
          new_lines = []
          skip_next = False
          for i, line in enumerate(lines):
              if 'additional_dir = getenv' in line and 'WINE_ADDITIONAL_CERTS_DIR' in line:
                  skip_next = True
                  continue
              if skip_next and 'import_certs_from_path' in line:
                  skip_next = False
                  continue
              new_lines.append(line)
          lines = new_lines

          with open('dlls/crypt32/unixlib.c', 'w') as f:
              f.writelines(lines)

          print("crypt32 修复完成")
          PYTHON_SCRIPT

          echo "生成 configure 脚本..."
          ./autogen.sh

          mkdir -p build-wow64
          cd build-wow64

          export CROSSCC="x86_64-w64-mingw32-gcc"
          export CROSSCXX="x86_64-w64-mingw32-g++"
          export CFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CXXFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CROSSCFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CROSSCXXFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"

          ../configure \
            --enable-win64 \
            --enable-archs=i386,x86_64 \
            --prefix=/tmp/wine-install-proton \
            --with-x \
            --with-vulkan \
            --with-alsa \
            --with-pulse \
            --with-freetype \
            --with-fontconfig \
            --with-gstreamer \
            --with-gettext \
            --with-sdl \
            --enable-nls \
            --disable-winemenubuilder \
            --disable-win16 \
            --disable-tests \
            --without-ldap \
            --without-capi \
            --without-oss \
            --without-cups \
            --without-dbus \
            --without-coreaudio \
            --without-gphoto \
            --without-osmesa \
            --without-sane \
            --without-pcap \
            --without-pcsclite \
            --without-udev \
            --without-unwind \
            --without-usb \
            --without-v4l2 \
            --without-wayland

          echo "开始构建支持 Vulkan 和完整 GStreamer 的 WOW64 Proton..."
          make -j$(nproc)
          make install

          cd ../..

          VERSION_PROTON=$(cd wine && git describe --tags --abbrev=0 2>/dev/null || echo "$PROTON_BRANCH")
          COMMIT_HASH=$(cd wine && git rev-parse --short HEAD)
          PROTON_VERSION="${VERSION_PROTON}-${COMMIT_HASH}"
          echo "PROTON_VERSION=$PROTON_VERSION" >> $GITHUB_ENV
          echo "BUILD_NAME=proton-${PROTON_VERSION}-wow64" >> $GITHUB_ENV

      - name: 准备打包
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          mkdir -p wine-package/$PACKAGE_NAME
          cp -r /tmp/wine-install-proton/* wine-package/$PACKAGE_NAME/

      - name: 创建打包文件
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          tar -cJf $PACKAGE_NAME.tar.xz -C wine-package $PACKAGE_NAME
          ls -lh *.tar.xz

      - name: Generate checksums
        run: |
          sha256sum *.tar.xz > checksums.txt
          cat checksums.txt

      - name: Upload Proton artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Proton-${{ github.event.inputs.proton_branch || 'proton_10.0' }}-WoW64
          path: |
            ${{ github.workspace }}/*.tar.xz
            ${{ github.workspace }}/checksums.txt
          retention-days: 30

      - name: 发布 Proton 到 GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'proton'
        with:
          tag_name: proton-${{ github.event.inputs.proton_branch || 'proton_10.0' }}-wow64
          name: Proton ${{ github.event.inputs.proton_branch || 'proton_10.0' }} (WOW64 with Vulkan & GStreamer for Termux)
          body: |
            # Proton ${{ github.event.inputs.proton_branch || 'proton_10.0' }} - WOW64 with Vulkan & GStreamer for Termux

            ## 版本信息
            - **Proton 分支**: ${{ github.event.inputs.proton_branch || 'proton_10.0' }}
            - **架构**: True WOW64 (同时支持 32 位和 64 位 Windows 应用程序)
            - **平台**: Termux (Android)
            - **图形 API**: Vulkan 支持已启用
            - **多媒体**: 完整 GStreamer 支持

            ## 特性
            ✓ 真正的 WOW64 架构
            ✓ 同时支持 32 位和 64 位 Windows 应用程序
            ✓ Vulkan 图形 API 支持
            ✓ 完整的 GStreamer 支持
            ✓ 中文环境支持
            ✓ 基于 Valve Proton，专为游戏优化

            ## 安装说明
            解压后，将 `${{ env.BUILD_NAME }}` 文件夹放置在 Termux 的合适位置，并设置环境变量。

            ## 构建信息
            - 构建时间: ${{ github.event.head_commit.timestamp }}
            - 提交: ${{ github.sha }}
            - 工作流: ${{ github.workflow }}
          files: |
            ${{ github.workspace }}/${{ env.BUILD_NAME }}.tar.xz
            ${{ github.workspace }}/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-wine-wow64:
    runs-on: ubuntu-24.04
    if: github.event.inputs.build_type == 'wine-wow64' || (github.event_name == 'schedule' && github.event.schedule == '0 2 5,20 * *')
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: 安装构建依赖
        run: |
          sudo apt update
          sudo apt --fix-broken install -y

          BASE_DEPS="\
            debootstrap \
            perl \
            git \
            wget \
            xz-utils \
            bubblewrap \
            autoconf \
            flex \
            bison \
            gcc-multilib \
            g++-multilib \
            libx11-dev \
            libxext-dev \
            libxi-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxfixes-dev \
            libxxf86vm-dev \
            libxrender-dev \
            libxinerama-dev \
            libgl-dev \
            libsdl2-dev \
            libglu-dev \
            libosmesa6-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libpcap-dev \
            libdbus-1-dev \
            libssl-dev \
            libasound2-dev \
            libpulse-dev \
            libudev-dev \
            libcups2-dev \
            libjpeg-dev \
            libpng-dev \
            libtiff-dev \
            libxml2-dev \
            libvulkan-dev \
            vulkan-tools \
            libvulkan1 \
            mesa-vulkan-drivers \
            mingw-w64 \
            gettext \
            libgettextpo-dev \
            locales \
            language-pack-zh-hans"

          sudo apt install -y $BASE_DEPS

      - name: 安装多媒体和音频依赖
        run: |
          sudo apt update
          sudo apt install -y \
            libunwind-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-good1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            gstreamer1.0-pulseaudio \
            gstreamer1.0-alsa \
            gstreamer1.0-gl \
            gstreamer1.0-qt5 \
            gstreamer1.0-gtk3 \
            libmpg123-dev \
            libopenal-dev \
            libfaad-dev \
            libflac-dev \
            libvorbis-dev \
            libx264-dev \
            libx265-dev \
            libvpx-dev \
            libtheora-dev

      - name: 设置中文语言环境
        run: |
          sudo locale-gen zh_CN.UTF-8
          sudo update-locale LANG=zh_CN.UTF-8
          export LANG=zh_CN.UTF-8
          export LC_ALL=zh_CN.UTF-8

      - name: 构建 Wine WOW64 版本
        run: |
          set -e

          export WINE_BRANCH="${{ github.event.inputs.wine_branch || 'staging' }}"
          export WINE_VERSION="${{ github.event.inputs.wine_version || 'latest' }}"
          export BUILD_DIR="/tmp/build_wine_${WINE_BRANCH}_${WINE_VERSION}"

          echo "开始构建 Wine WOW64 版本..."
          echo "分支: $WINE_BRANCH"
          echo "版本: $WINE_VERSION"

          export LANG=zh_CN.UTF-8
          export LC_ALL=zh_CN.UTF-8
          export LANGUAGE=zh_CN:zh:en_US:en

          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR"
          cd "$BUILD_DIR"

          if [ "$WINE_BRANCH" = "staging-tkg" ] || [ "$WINE_BRANCH" = "staging-tkg-fsync" ]; then
            echo "处理 TKG 系列分支: $WINE_BRANCH"

            if [ "$WINE_BRANCH" = "staging-tkg" ]; then
              git clone https://github.com/Kron4ek/wine-tkg.git wine-tkg
              SOURCE_DIR="wine-tkg"
            else
              git clone https://github.com/Kron4ek/wine-tkg.git wine-tkg -b fsync
              SOURCE_DIR="wine-tkg"
            fi

            cd "$SOURCE_DIR"

            if [ "$WINE_VERSION" != "latest" ]; then
              git checkout "$WINE_VERSION" 2>/dev/null || git checkout "wine-$WINE_VERSION" 2>/dev/null || true
            fi

            if [ -f "VERSION" ]; then
              WINE_VERSION_ACTUAL="$(cat VERSION | tail -c +14)"
            else
              WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
            fi

            COMMIT_HASH=$(git rev-parse --short HEAD)
            BUILD_NAME="wine-${WINE_VERSION_ACTUAL}-${WINE_BRANCH}-wow64"

          elif [ "$WINE_BRANCH" = "staging" ]; then
            echo "处理 Staging 分支"
            git clone https://github.com/wine-mirror/wine.git wine
            SOURCE_DIR="wine"
            cd "$SOURCE_DIR"

            git config advice.detachedHead false

            if [ "$WINE_VERSION" != "latest" ]; then
              git checkout "wine-$WINE_VERSION"
            fi

            WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
            COMMIT_HASH=$(git rev-parse --short HEAD)
            BUILD_NAME="wine-${WINE_VERSION_ACTUAL}-${COMMIT_HASH}-staging-wow64"

            PURE_VERSION=$(echo "$WINE_VERSION_ACTUAL" | sed 's/^wine-//')
            STAGING_VERSION="v${PURE_VERSION}"

            wget -O "wine-staging-${PURE_VERSION}.tar.gz" "https://github.com/wine-staging/wine-staging/archive/refs/tags/${STAGING_VERSION}.tar.gz" || \
            wget -O "wine-staging-${PURE_VERSION}.tar.gz" "https://github.com/wine-staging/wine-staging/archive/refs/tags/v${PURE_VERSION}.tar.gz"

            if [ -f "wine-staging-${PURE_VERSION}.tar.gz" ]; then
              tar -xzf "wine-staging-${PURE_VERSION}.tar.gz"

              if [ -d "wine-staging-${PURE_VERSION}" ]; then
                cd "wine-staging-${PURE_VERSION}/staging"
                chmod +x patchinstall.py
                ./patchinstall.py --all --destdir=../../
                cd "../.."
              elif [ -d "wine-staging-v${PURE_VERSION}" ]; then
                cd "wine-staging-v${PURE_VERSION}/staging"
                chmod +x patchinstall.py
                ./patchinstall.py --all --destdir=../../
                cd "../.."
              fi
            fi

          elif [ "$WINE_BRANCH" = "vanilla" ]; then
            echo "处理 Vanilla 分支"
            git clone https://github.com/wine-mirror/wine.git wine
            SOURCE_DIR="wine"
            cd "$SOURCE_DIR"

            git config advice.detachedHead false

            if [ "$WINE_VERSION" != "latest" ]; then
              git checkout "wine-$WINE_VERSION"
            fi

            WINE_VERSION_ACTUAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "$WINE_VERSION")
            COMMIT_HASH=$(git rev-parse --short HEAD)
            BUILD_NAME="wine-${WINE_VERSION_ACTUAL}-${COMMIT_HASH}-vanilla-wow64"
          else
            echo "未知的 Wine 分支: $WINE_BRANCH"
            exit 1
          fi

          echo "BUILD_NAME=$BUILD_NAME" >> $GITHUB_ENV
          echo "当前源码目录: $(pwd)"
          echo "构建名称: $BUILD_NAME"

          echo "修复 Termux 路径问题..."
          find . -type f \( -name "*.c" -o -name "*.h" -o -name "*.in" -o -name "*.spec" \) -exec grep -l "/tmp" {} \; | xargs sed -i 's|/tmp/|/data/data/com.termux/files/usr/tmp/|g'
          find server -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} +
          find . -name "file.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} +
          find . -name "loader.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} +
          find . -name "server.c" -exec sed -i 's|"/tmp"|"/data/data/com.termux/files/usr/tmp"|g' {} +

          echo "修复 memfd 路径问题..."
          sed -i '/pread( fd, map_addr, size, offset );/a\    \n    /* After falling back to read(), set executable permission if needed */\n    if (vprot \& VPROT_EXEC)\n        mprotect( map_addr, map_size, PROT_READ | PROT_EXEC );' dlls/ntdll/unix/virtual.c

          echo "修复 crypt32 根证书加载..."
          python3 << 'PYTHON_SCRIPT'
          import re

          with open('dlls/crypt32/unixlib.c', 'r') as f:
              lines = f.readlines()

          # 1. 在 CRYPT_knownLocations 数组末尾添加 Termux 路径
          in_array = False
          array_end = -1
          for i, line in enumerate(lines):
              if 'static const char* CRYPT_knownLocations[] = {' in line:
                  in_array = True
              if in_array and line.strip() == '};':
                  array_end = i
                  break

          if array_end != -1:
              lines.insert(array_end, '  "/data/data/com.termux/files/usr/glibc/etc/ca-certificates/cacert.pem",\n')

          # 2. 删除 macOS 代码块
          new_lines = []
          skip_until = -1
          for i, line in enumerate(lines):
              if skip_until > i:
                  continue
              if '#ifdef __APPLE__' in line:
                  depth = 1
                  j = i + 1
                  while j < len(lines) and depth > 0:
                      if '#ifdef __APPLE__' in lines[j] or '#ifndef __APPLE__' in lines[j]:
                          depth += 1
                      elif '#endif' in lines[j]:
                          depth -= 1
                      j += 1
                  skip_until = j - 1
                  continue
              new_lines.append(line)
          lines = new_lines

          # 3. 修改 load_root_certs 函数
          in_func = False
          func_start = -1
          func_end = -1
          brace_count = 0

          for i, line in enumerate(lines):
              if 'static void load_root_certs(void)' in line:
                  func_start = i
                  in_func = True
              if in_func:
                  brace_count += line.count('{')
                  brace_count -= line.count('}')
                  if brace_count == 0 and func_start != -1 and i > func_start:
                      func_end = i
                      break

          if func_start != -1 and func_end != -1:
              new_func = [
                  'static void load_root_certs(void)\n',
                  '{\n',
                  '    unsigned int i;\n',
                  '    const char *cert_path = getenv("WINE_CA_CERT_PATH");\n',
                  '    \n',
                  '    if (cert_path)\n',
                  '        import_certs_from_path(cert_path, TRUE);\n',
                  '    \n',
                  '    if (list_empty(&root_cert_list)) {\n',
                  '        for (i = 0; i < ARRAY_SIZE(CRYPT_knownLocations); i++) {\n',
                  '            import_certs_from_path(CRYPT_knownLocations[i], TRUE);\n',
                  '        }\n',
                  '    }\n',
                  '}\n'
              ]
              lines = lines[:func_start] + new_func + lines[func_end+1:]

          # 4. 删除 WINE_ADDITIONAL_CERTS_DIR 相关代码
          new_lines = []
          skip_next = False
          for i, line in enumerate(lines):
              if 'additional_dir = getenv' in line and 'WINE_ADDITIONAL_CERTS_DIR' in line:
                  skip_next = True
                  continue
              if skip_next and 'import_certs_from_path' in line:
                  skip_next = False
                  continue
              new_lines.append(line)
          lines = new_lines

          with open('dlls/crypt32/unixlib.c', 'w') as f:
              f.writelines(lines)

          print("crypt32 修复完成")
          PYTHON_SCRIPT

          PURE_VERSION=$(echo "$WINE_VERSION_ACTUAL" | sed 's/^wine-//')
          VERSION_MAJOR=$(echo "$PURE_VERSION" | cut -d. -f1)
          VERSION_MINOR=$(echo "$PURE_VERSION" | cut -d. -f2)

          echo "Wine 版本: $WINE_VERSION_ACTUAL"
          echo "纯版本号: $PURE_VERSION"
          echo "主版本: $VERSION_MAJOR, 次版本: $VERSION_MINOR"

          if [ "$VERSION_MAJOR" -gt 9 ] || [ "$VERSION_MAJOR" -eq 9 -a "$VERSION_MINOR" -ge 10 ]; then
            echo "使用 9.10+ 版本的修复方式 (wine_do_not_create_dxgi_manager2.patch)"
            wget https://github.com/afeimod/linbox/raw/main/path/wine_do_not_create_dxgi_manager2.patch
            if [ -f "dlls/mfplat/main.c" ]; then
              echo "找到目标文件 dlls/mfplat/main.c，准备应用补丁..."
              if patch -p1 < wine_do_not_create_dxgi_manager2.patch; then
                echo "✅ 补丁应用成功"
              else
                echo "❌ 补丁应用失败"
                exit 1
              fi
            else
              echo "❌ 错误：目标文件 dlls/mfplat/main.c 不存在"
              exit 1
            fi
          else
            echo "使用 9.10 以下版本的修复方式 (fix_wine9.2_mfplat.sh)"
            wget -O fix_wine9.2_mfplat.sh https://github.com/afeimod/linbox/raw/main/path/fix_wine9.2_mfplat.sh
            chmod +x fix_wine9.2_mfplat.sh
            ./fix_wine9.2_mfplat.sh
            echo "✅ 9.10 以下版本修复完成"
          fi

          mkdir -p build-wow64
          cd build-wow64

          export CROSSCC="x86_64-w64-mingw32-gcc"
          export CROSSCXX="x86_64-w64-mingw32-g++"
          export CFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CXXFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CROSSCFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"
          export CROSSCXXFLAGS="-march=x86-64 -msse3 -mfpmath=sse -O3 -ftree-vectorize -pipe"

          ../configure \
            --enable-win64 \
            --enable-archs=i386,x86_64 \
            --prefix=/tmp/wine-install-wow64 \
            --with-x \
            --with-vulkan \
            --with-alsa \
            --with-pulse \
            --with-freetype \
            --with-fontconfig \
            --with-gstreamer \
            --with-gettext \
            --with-sdl \
            --enable-nls \
            --disable-winemenubuilder \
            --disable-win16 \
            --disable-tests \
            --without-ldap \
            --without-capi \
            --without-oss \
            --without-cups \
            --without-dbus \
            --without-coreaudio \
            --without-gphoto \
            --without-osmesa \
            --without-sane \
            --without-pcap \
            --without-pcsclite \
            --without-udev \
            --without-unwind \
            --without-usb \
            --without-v4l2 \
            --without-wayland

          echo "开始构建支持 Vulkan 和完整 GStreamer 的 WOW64 Wine..."
          make -j$(nproc)
          make install

      - name: 准备打包
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          mkdir -p wine-package/$PACKAGE_NAME
          cp -r /tmp/wine-install-wow64/* wine-package/$PACKAGE_NAME/

      - name: 创建打包文件
        run: |
          PACKAGE_NAME="${{ env.BUILD_NAME }}"
          tar -cJf $PACKAGE_NAME.tar.xz -C wine-package $PACKAGE_NAME
          ls -lh *.tar.xz

      - name: Generate checksums
        run: |
          sha256sum *.tar.xz > checksums.txt
          cat checksums.txt

      - name: Upload Wine WoW64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Wine-${{ github.event.inputs.wine_branch || 'staging' }}-${{ github.event.inputs.wine_version || 'latest' }}-WoW64
          path: |
            ${{ github.workspace }}/*.tar.xz
            ${{ github.workspace }}/checksums.txt
          retention-days: 30

      - name: 发布 Wine 到 GitHub Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'wine-wow64'
        with:
          tag_name: wine-${{ github.event.inputs.wine_branch || 'staging' }}-${{ github.event.inputs.wine_version || 'latest' }}-wow64
          name: Wine ${{ github.event.inputs.wine_branch || 'staging' }} ${{ github.event.inputs.wine_version || 'latest' }} (WOW64 with Vulkan & GStreamer for Termux)
          body: |
            # Wine ${{ github.event.inputs.wine_branch || 'staging' }} ${{ github.event.inputs.wine_version || 'latest' }} - WOW64 with Vulkan & GStreamer for Termux

            ## 版本信息
            - **Wine 分支**: ${{ github.event.inputs.wine_branch || 'staging' }}
            - **Wine 版本**: ${{ github.event.inputs.wine_version || 'latest' }}
            - **架构**: True WOW64 (同时支持 32 位和 64 位 Windows 应用程序)
            - **平台**: Termux (Android)
            - **图形 API**: Vulkan 支持已启用
            - **多媒体**: 完整 GStreamer 支持

            ## 特性
            ✓ 真正的 WOW64 架构
            ✓ 同时支持 32 位和 64 位 Windows 应用程序
            ✓ Vulkan 图形 API 支持
            ✓ 完整的 GStreamer 支持
            ✓ 中文环境支持
            ✓ 应用了关键补丁提升兼容性

            ## 安装说明
            解压后，将 `${{ env.BUILD_NAME }}` 文件夹放置在 Termux 的合适位置，并设置环境变量。

            ## 构建信息
            - 构建时间: ${{ github.event.head_commit.timestamp }}
            - 提交: ${{ github.sha }}
            - 工作流: ${{ github.workflow }}
          files: |
            ${{ github.workspace }}/${{ env.BUILD_NAME }}.tar.xz
            ${{ github.workspace }}/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
