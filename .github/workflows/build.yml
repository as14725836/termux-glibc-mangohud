name: Build MangoHud (aarch64, Termux glibc - PRO)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

env:
  REPO_URL: https://github.com/moze30/MangoHud.git
  LAST_COMMIT_FILE: last_mangohud_commit.txt
  # 修复：使用 runner 本地目录而不是 Termux 路径
  PREFIX: ${{ github.workspace }}/install
  CCACHE_DIR: ${{ github.workspace }}/ccache

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      # =========================
      # 创建安装目录
      # =========================
      - name: Create prefix directory
        run: |
          mkdir -p ${{ env.PREFIX }}/bin
          mkdir -p ${{ env.PREFIX }}/lib
          mkdir -p ${{ env.PREFIX }}/share
          echo "✅ 创建目录: ${{ env.PREFIX }}"

      # =========================
      # Setup ccache
      # =========================
      - name: Setup ccache
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache
          ccache -M 1G
          ccache -z

      # =========================
      # Clone source
      # =========================
      - name: Clone MangoHud
        run: |
          git clone --depth=1 $REPO_URL MangoHud

      # =========================
      # Get version
      # =========================
      - name: Get version
        id: get_version
        run: |
          cd MangoHud
          if git describe --tags --abbrev=0 2>/dev/null; then
            VERSION=$(git describe --tags --abbrev=0)
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "✅ 版本: $VERSION"

      # =========================
      # Install dependencies
      # =========================
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git pkg-config meson ninja-build \
            glslang-tools python3-pip \
            libdbus-1-dev libx11-dev libxext-dev libxrandr-dev \
            libxinerama-dev libxdamage-dev libxfixes-dev \
            libdrm-dev libgl1-mesa-dev libwayland-dev libxkbcommon-dev \
            patchelf ccache

      - name: Upgrade build tools
        run: |
          pip3 install --upgrade pip
          pip3 install --upgrade meson ninja mako
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # =========================
      # Meson configure
      # =========================
      - name: Configure
        run: |
          cd MangoHud
          rm -rf build
          
          meson setup build \
            --prefix="${{ env.PREFIX }}" \
            --libdir=lib \
            -Dbuildtype=release \
            -Doptimization=2 \
            -Db_lto=false \
            -Db_ndebug=true \
            -Dwith_x11=enabled \
            -Dwith_wayland=disabled \
            -Dwith_xnvctrl=disabled \
            -Dwith_dbus=disabled \
            -Dmangoplot=disabled \
            -Dmangoapp=false \
            -Dmangohudctl=false \
            -Dtests=disabled

      # =========================
      # Build
      # =========================
      - name: Build
        run: |
          cd MangoHud
          export CC="ccache gcc"
          export CXX="ccache g++"
          
          NPROC=$(nproc)
          if [ $NPROC -gt 4 ]; then
            NPROC=4
          fi
          echo "使用 $NPROC 个并行任务"
          ninja -C build -j$NPROC

      # =========================
      # Install to prefix
      # =========================
      - name: Install
        run: |
          cd MangoHud
          ninja -C build install

      # =========================
      # 修复启动脚本中的 $LIB 变量
      # =========================
      - name: Fix mangohud script
        run: |
          if [ -f "${{ env.PREFIX }}/bin/mangohud" ]; then
            sed -i 's|/\\$LIB|/lib|g' "${{ env.PREFIX }}/bin/mangohud"
            echo "✅ 已修正启动脚本"
          fi

      # =========================
      # Patch ELF (设置正确的解释器路径)
      # =========================
      - name: Patch ELF
        run: |
          ROOT="${{ env.PREFIX }}"
          # 使用系统的解释器路径（打包后用户需要改成自己的路径）
          INTERP="/data/data/com.termux/files/usr/glibc/lib/ld-linux-aarch64.so.1"
          
          for f in $(find "$ROOT/bin" "$ROOT/lib" -type f 2>/dev/null); do
            if file "$f" 2>/dev/null | grep -q ELF; then
              echo "修补: $f"
              patchelf --set-interpreter "$INTERP" "$f" 2>/dev/null || true
            fi
          done
          echo "✅ ELF 修补完成"

      # =========================
      # 重新打包为 Termux 目录结构
      # =========================
      - name: Repackage for Termux
        run: |
          # 创建 Termux 风格的目录结构
          mkdir -p termux_package/glibc
          
          # 复制文件到 termux 包目录
          cp -r ${{ env.PREFIX }}/* termux_package/glibc/
          
          # 查看打包内容
          echo "打包内容:"
          find termux_package -type f

      # =========================
      # 打包构建产物
      # =========================
      - name: Create tarball
        run: |
          cd termux_package
          TAR_NAME="termux-glibc-mangohud-${{ env.VERSION }}-aarch64.tar.gz"
          
          tar -czvf /home/runner/$TAR_NAME .
          
          echo "TAR_NAME=$TAR_NAME" >> $GITHUB_ENV
          echo "📦 打包完成: $TAR_NAME"
          echo "文件大小:"
          ls -lh /home/runner/$TAR_NAME

      # =========================
      # 验证打包内容
      # =========================
      - name: Verify package
        run: |
          echo "=== 包内文件列表 ==="
          tar -tzf /home/runner/${{ env.TAR_NAME }} | head -30

      # =========================
      # Show ccache stats
      # =========================
      - name: Show ccache stats
        run: ccache -s

      # =========================
      # 上传产物
      # =========================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TAR_NAME }}
          path: /home/runner/${{ env.TAR_NAME }}
          retention-days: 30

      # =========================
      # 发布 Release
      # =========================
      - name: Check if release exists
        id: check_release
        run: |
          if gh release view ${{ env.VERSION }} --repo ${{ github.repository }} 2>/dev/null; then
            echo "release_exists=true" >> $GITHUB_ENV
          else
            echo "release_exists=false" >> $GITHUB_ENV
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        if: env.release_exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: MangoHud ${{ env.VERSION }} (aarch64, Termux glibc)
          body: |
            ## MangoHud ${{ env.VERSION }} for Termux (aarch64 glibc)

            ### 📋 构建信息
            - **版本号**: `${{ env.VERSION }}`
            - **架构**: aarch64
            - **环境**: Termux glibc

            ### 📥 安装方法
            解压到 Termux 的 `/data/data/com.termux/files/usr/` 目录：
            ```bash
            tar -xzvf ${{ env.TAR_NAME }} -C /data/data/com.termux/files/usr/
            ```
          files: /home/runner/${{ env.TAR_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
