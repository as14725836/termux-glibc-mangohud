name: Build MangoHud (aarch64, Termux glibc - PRO)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

env:
  REPO_URL: https://github.com/moze30/MangoHud.git
  LAST_COMMIT_FILE: last_mangohud_commit.txt
  PREFIX: ${{ github.workspace }}/install
  CCACHE_DIR: ${{ github.workspace }}/ccache

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    # 增加超时时间
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Create prefix directory
        run: |
          mkdir -p ${{ env.PREFIX }}/bin
          mkdir -p ${{ env.PREFIX }}/lib
          mkdir -p ${{ env.PREFIX }}/share

      - name: Setup ccache
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache
          ccache -M 2G
          ccache -z

      - name: Clone MangoHud
        run: |
          git clone --depth=1 $REPO_URL MangoHud

      - name: Get version
        id: get_version
        run: |
          cd MangoHud
          if git describe --tags --abbrev=0 2>/dev/null; then
            VERSION=$(git describe --tags --abbrev=0)
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "✅ 版本: $VERSION"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git pkg-config meson ninja-build \
            glslang-tools python3-pip \
            libdbus-1-dev libx11-dev libxext-dev libxrandr-dev \
            libxinerama-dev libxdamage-dev libxfixes-dev \
            libdrm-dev libgl1-mesa-dev libwayland-dev libxkbcommon-dev \
            patchelf ccache

      - name: Upgrade build tools
        run: |
          pip3 install --upgrade pip
          pip3 install --upgrade meson ninja mako
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure
        run: |
          cd MangoHud
          rm -rf build
          
          meson setup build \
            --prefix="${{ env.PREFIX }}" \
            --libdir=lib \
            -Dbuildtype=release \
            -Doptimization=2 \
            -Db_lto=false \
            -Db_ndebug=true \
            -Dwith_x11=enabled \
            -Dwith_wayland=disabled \
            -Dwith_xnvctrl=disabled \
            -Dwith_dbus=disabled \
            -Dmangoplot=disabled \
            -Dmangoapp=false \
            -Dmangohudctl=false \
            -Dtests=disabled

      # =========================
      # 关键修复：增加 swap + 限制并行数
      # =========================
      - name: Build (with swap)
        run: |
          cd MangoHud
          
          # 增加 swap 空间防止 OOM
          echo "=== 增加 Swap 空间 ==="
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "Swap 状态:"
          free -h
          
          export CC="ccache gcc"
          export CXX="ccache g++"
          
          # 使用 2 个并行任务（arm64 runner 内存有限）
          echo "=== 开始编译 (并行数: 2) ==="
          ninja -C build -j2
          
          echo "=== 编译完成，清理 Swap ==="
          sudo swapoff /swapfile
          sudo rm -f /swapfile

      - name: Install
        run: |
          cd MangoHud
          ninja -C build install

      - name: Fix mangohud script
        run: |
          if [ -f "${{ env.PREFIX }}/bin/mangohud" ]; then
            sed -i 's|/\\$LIB|/lib|g' "${{ env.PREFIX }}/bin/mangohud"
            echo "✅ 已修正启动脚本"
          fi

      - name: Patch ELF
        run: |
          ROOT="${{ env.PREFIX }}"
          INTERP="/data/data/com.termux/files/usr/glibc/lib/ld-linux-aarch64.so.1"
          
          for f in $(find "$ROOT/bin" "$ROOT/lib" -type f 2>/dev/null); do
            if file "$f" 2>/dev/null | grep -q ELF; then
              echo "修补: $f"
              patchelf --set-interpreter "$INTERP" "$f" 2>/dev/null || true
            fi
          done

      - name: Repackage for Termux
        run: |
          mkdir -p termux_package/glibc
          cp -r ${{ env.PREFIX }}/* termux_package/glibc/
          echo "打包内容:"
          find termux_package -type f | head -20

      - name: Create tarball
        run: |
          cd termux_package
          TAR_NAME="termux-glibc-mangohud-${{ env.VERSION }}-aarch64.tar.gz"
          tar -czvf /home/runner/$TAR_NAME .
          echo "TAR_NAME=$TAR_NAME" >> $GITHUB_ENV
          ls -lh /home/runner/$TAR_NAME

      - name: Show ccache stats
        run: ccache -s

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TAR_NAME }}
          path: /home/runner/${{ env.TAR_NAME }}
          retention-days: 30
