name: Build MangoHud (aarch64, Termux glibc - PRO)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

env:
  REPO_URL: https://github.com/moze30/MangoHud.git
  LAST_COMMIT_FILE: last_mangohud_commit.txt
  PREFIX: /data/data/com.termux/files/usr/glibc
  CCACHE_DIR: ${{ github.workspace }}/ccache

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      # =========================
      # 1. Checkout
      # =========================
      - uses: actions/checkout@v4

      # =========================
      # 2. ccache (🚀 加速核心)
      # =========================
      - name: Setup ccache
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache
          echo "CCACHE_DIR=${{ env.CCACHE_DIR }}" >> $GITHUB_ENV
          ccache -M 1G
          ccache -z

      # =========================
      # 3. Clone source
      # =========================
      - name: Clone MangoHud
        run: |
          git clone --depth=1 $REPO_URL MangoHud

      # =========================
      # 4. Install deps (优化版)
      # =========================
      - name: Install dependencies
        run: |
          sudo apt-get install -y \
            build-essential git pkg-config meson ninja-build \
            glslang-tools python3-pip \
            libdbus-1-dev libx11-dev libxext-dev libxrandr-dev \
            libxinerama-dev libxdamage-dev libxfixes-dev \
            libdrm-dev libgl1-mesa-dev libwayland-dev libxkbcommon-dev \
            patchelf ccache

      - name: Upgrade build tools
        run: |
          pip3 install --upgrade meson ninja mako

      # =========================
      # 5. Version check
      # =========================
      - name: Get version
        run: |
          cd MangoHud
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev-$(git rev-parse --short HEAD)")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # =========================
      # 6. Meson configure (PRO optimized)
      # =========================
      - name: Configure
        run: |
          cd MangoHud

          meson setup build \
            --prefix=${{ env.PREFIX }} \
            --libdir=lib \
            -Dbuildtype=release \
            -Doptimization=2 \
            -Db_lto=false \
            -Db_ndebug=true \
            -Dwith_x11=enabled \
            -Dwith_wayland=disabled \
            -Dwith_xnvctrl=disabled \
            -Dwith_dbus=disabled \
            -Dmangoplot=disabled \
            -Dmangoapp=false \
            -Dmangohudctl=false \
            -Dtests=disabled

      # =========================
      # 7. Build (🚀 stable + fast)
      # =========================
      - name: Build
        run: |
          cd MangoHud

          export CC="ccache gcc"
          export CXX="ccache g++"

          ninja -C build -j6

      # =========================
      # 8. Install
      # =========================
      - name: Install
        run: |
          cd MangoHud
          ninja -C build install

      # =========================
      # 9. Patch ELF (SAFE ONLY)
      # =========================
      - name: Patch ELF
        run: |
          ROOT=${{ env.PREFIX }}
          INTERP=$ROOT/lib/ld-linux-aarch64.so.1

          for f in $(find $ROOT/bin $ROOT/lib -type f 2>/dev/null); do
            file "$f" | grep -q ELF || continue
            patchelf --set-interpreter "$INTERP" "$f" || true
          done

      # =========================
      # 10. Build speed stats
      # =========================
      - name: Show ccache stats
        run: ccache -s

      # =========================
      # 11. KEEP YOUR ORIGINAL PACKAGING (UNCHANGED)
      # =========================
      - name: 打包构建产物
        run: |
          cd /data/data/com.termux/files/usr

          TAR_NAME="termux-glibc-mangohud-${{ env.VERSION }}-aarch64.tar.gz"

          cat > /tmp/mangohud_files.txt << EOF
          glibc/bin/mangohud
          glibc/lib/mangohud
          glibc/share/vulkan/implicit_layer.d/MangoHud.aarch64.json
          EOF

          tar -czvf /home/runner/$TAR_NAME --files-from=/tmp/mangohud_files.txt 2>/dev/null || true

          echo "TAR_NAME=$TAR_NAME" >> $GITHUB_ENV
