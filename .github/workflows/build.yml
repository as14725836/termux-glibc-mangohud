name: Build MangoHud (aarch64, PRO CLEAN)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

env:
  REPO_URL: https://github.com/moze30/MangoHud.git
  CCACHE_DIR: ${{ github.workspace }}/ccache

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      # =========================
      # ccache
      # =========================
      - name: Setup ccache
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache
          ccache -M 1G
          ccache -z

      # =========================
      # clone
      # =========================
      - name: Clone
        run: git clone --depth=1 $REPO_URL MangoHud

      # =========================
      # deps
      # =========================
      - name: Install deps
        run: |
          sudo apt-get install -y \
            build-essential git pkg-config meson ninja-build \
            glslang-tools python3-pip \
            libdbus-1-dev libx11-dev libxext-dev libxrandr-dev \
            libxinerama-dev libxdamage-dev libxfixes-dev \
            libdrm-dev libgl1-mesa-dev libwayland-dev libxkbcommon-dev \
            patchelf ccache

          pip3 install --upgrade meson ninja mako

      # =========================
      # version
      # =========================
      - name: Version
        run: |
          cd MangoHud
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev-$(git rev-parse --short HEAD)")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # =========================
      # configure (NO PREFIX PATH)
      # =========================
      - name: Configure
        run: |
          cd MangoHud

          meson setup build \
            --prefix=/usr \
            --libdir=lib \
            -Dbuildtype=release \
            -Doptimization=2 \
            -Db_lto=false \
            -Db_ndebug=true \
            -Dwith_x11=enabled \
            -Dwith_wayland=disabled \
            -Dwith_xnvctrl=disabled \
            -Dwith_dbus=disabled \
            -Dmangoplot=disabled \
            -Dmangoapp=false \
            -Dmangohudctl=false \
            -Dtests=disabled

      # =========================
      # build
      # =========================
      - name: Build
        run: |
          cd MangoHud
          ninja -C build -j2

      # =========================
      # install (DESTDIR ONLY)
      # =========================
      - name: Install to pkg
        run: |
          cd MangoHud
          DESTDIR=$PWD/pkg ninja -C build install

      # =========================
      # patch ELF (ONLY pkg)
      # =========================
      - name: Patch ELF
        run: |
          PKG=$PWD/MangoHud/pkg

          for f in $(find $PKG -type f 2>/dev/null); do
            file "$f" | grep -q ELF || continue
            patchelf --set-interpreter /lib/ld-linux-aarch64.so.1 "$f" || true
          done

      # =========================
      # package (NO /data AT ALL)
      # =========================
      - name: Package
        run: |
          cd MangoHud/pkg/usr

          TAR_NAME="termux-glibc-mangohud-${{ env.VERSION }}-aarch64.tar.gz"
          echo "TAR_NAME=$TAR_NAME" >> $GITHUB_ENV

          tar -czvf /home/runner/$TAR_NAME bin lib share
